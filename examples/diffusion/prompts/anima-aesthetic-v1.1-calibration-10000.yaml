c003-p033: >-
  A gardener’s dress changes with the flower beds—mud-brown bodice, seed-packet pockets, skirt embroidered from shoots to full summer blooms. Show an elderly wearer kneeling happily rather than posing.
c003-p034: >-
  Futuristic mourning clothes for a young pilot: matte navy flight suit under a sheer black overskirt, white gloves, one metallic shoulder epaulet removed and held at the side.
c003-p035: >-
