c003-p091: >-
  A young bodyguard attends a child’s tea party in severe black tailoring accessorized with a paper crown, tiny floral apron, and six friendship bracelets. Crouched to fit the table height.
c003-p092: >-
  Explorer clothing for a snail-person: layered waterproof tunic draped around the shell, compass brooch, soft traction wraps, miniature pack lashed high. Side profile crossing one enormous moss stone.
c003-p093: >-
  Full-body editorial image of a tall woman in a dress painted like peeling apartment wallpaper. Quiet pose; each faded floral layer reveals another color as the hem curls away.
c003-p094: >-
  A rural veterinarian cycles in practical lavender coveralls beneath a dramatic inherited opera cape. The bicycle, muddy boots, and billowing crimson fabric share one lively diagonal.
c003-p095: >-
  Ceremonial clothing for an ice fisher combines white quilted volume, red cord knots, carved wooden goggles, and a black apron. Seated compactly above a circular fishing hole.
c003-p096: >-
  1boy, full body, soft build, cropped curls, transparent oversized parka over sunflower pajamas, mismatched slippers, holding a flashlight; pale blue paper, wax-crayon texture, relaxed sleepy posture.
c003-p097: >-
  An avian librarian’s reading gown opens into winglike panels printed with tiny text. She stands on one leg before a plain oxblood backdrop, spectacles attached by a fine gold chain.
c003-p098: >-
  Show a newly promoted station master in a uniform still bearing tailor’s chalk. Crisp green jacket, broad hips, brass watch, polished boots; she practices an authoritative stance beside a mop closet.
c003-p099: >-
  The last runway look is worn by an elderly gardener: enormous skirt of fresh herbs, simple linen bodice, soil-dark gloves, bare gray hair. With each step, rosemary and mint trail scent rather than glitter.
