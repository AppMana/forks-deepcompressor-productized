c005-p006: >-
  Show the royal sword bearer from behind during a procession: shaved head, indigo robes, enormous wrapped blade across narrow shoulders, bare feet stepping over scattered jasmine.
c005-p007: >-
  An apprentice practices drawing a sword without touching the blade. Six translucent failed poses overlap her final smooth motion against a plain ochre training wall.
c005-p008: >-
