  A formal portrait garment woven from family photographs wraps an older refugee in grayscale squares. Only the present-day face and vivid blue slippers appear in color.
c003-p064: >-
  Show a magical-girl costume after ten years of practical revisions: reinforced knees, shorter cape, weatherproof boots, larger pockets, faded ribbons. The adult heroine checks a transit card mid-stride.
c003-p065: >-
  An octopus hat maker models eight unfinished hats at once. Rich brown work apron, striped body, measuring tapes on every arm; cluttered silhouettes radiate from a centered, proud stance.
c003-p066: >-
  A translucent ghost wears layered clothing borrowed from different eras; corset, pilot jacket, pleated skirt, leg warmers, modern sneakers all remain individually visible through one pale body.
c003-p067: >-
  Monochrome full-body image of a stern magistrate whose only decoration is a gigantic embroidered koi swimming up one trouser leg and across the long coat.
c003-p068: >-
  A young shepherd models rain gear made from waxed wool. Wide moss cape, leather knee patches, knit hood with ear openings; she runs downhill while lambs remain offscreen.
c003-p069: >-
  Evening clothes for a muscular mermaid on land: tailored midnight vest, pearl chains, shimmering tail protected by a wheeled velvet cradle. She rolls herself confidently into a ballroom.
