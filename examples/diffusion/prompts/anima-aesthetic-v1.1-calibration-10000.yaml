c005-p046: >-
  A palace champion removes jeweled armor after the parade. Beneath it: compression bandages, soft gray tunic, bruised shoulder, and a wooden sword chosen for evening practice.
c005-p047: >-
  Rainy alley silhouette of a courier defending parcels with an umbrella sword. The steel tip extends from bright yellow fabric; paper packages stay perfectly dry behind her.
c005-p048: >-
  An apprentice stone giant carves a practice sword from a fallen tower. Chisel in thumb-sized fingers, patient face, full-scale human scaffolding around one knee.
c005-p049: >-
  The enchanted blade refuses violence and turns limp whenever swung. Its furious owner holds the ribbonlike metal at arm’s length while a nearby duck looks smug.
c005-p050: >-
  Tight composition around a duel fought entirely under one restaurant table. Polished shoes pivot, narrow blades meet between chair legs, dumplings remain undisturbed above.
c005-p051: >-
  A river patrol officer wears a reed cape and carries a broad wooden sword buoyant enough to serve as a paddle. She stands in a slim boat at foggy sunrise.
c005-p052: >-
  Painted training portrait of a pregnant knight practicing footwork without a weapon. Chalk circles, quilted vest, strong bare feet, sword visible only as a shadow on the wall.
c005-p053: >-
  A teenage blacksmith delivers her first finished blade wrapped in a cheerful flowered blanket. Pride makes her walk rigidly; soot still marks formal white clothes.
c005-p054: >-
  The old sword is too heavy for the child, so a flock of tiny spirits lift the blade from beneath. She guides its path with both hands and astonished care.
c005-p055: >-
  A cactus gunslinger has traded pistols for twin agave swords. Broad hat pierced by new growth, leather vest, tiny pink bloom; harsh flat desert colors.
c005-p056: >-
  An ice-skating swordswoman practices alone on a frozen reservoir. Long blade becomes her balance line, white coat arcs behind, dark cracks map the enormous blue surface.
c005-p057: >-
  At a crowded forge, focus on one ceremonial sword cooling upright in black water. Reflections show eight curious faces distorted around the blade without revealing their bodies.
c005-p058: >-
  A librarian challenges a book-eating monster with a sharpened bookmark. Tiny brass weapon, enormous paper jaws, rolled sleeves, fearless stance atop the return cart.
c005-p059: >-
  Sunrise catches a weary samurai repairing a child’s kite with thread drawn from his sword tassel. Helmet set aside, cropped hair, armor softened by pink paper.
c005-p060: >-
  An underground knight’s blade is a luminous mushroom stalk. Spore light, beetle-shell shield, dark practical cloak; cautious step through roots much larger than the figure.
c005-p061: >-
  Show the exact instant a fencing mask is removed after years. The champion’s face is older than the mural behind her, expression relieved, white hair flattened into a grid.
c005-p062: >-
  A magician swallows a sword and accidentally pulls a flowering branch from the scabbard. Stage audience becomes abstract gold dots around his bewildered full-body bow.
c005-p063: >-
  A blacksmith with a prosthetic right hand teaches a left-handed grip to a nervous recruit. Workshop lesson, blunt wooden blades, warm eye contact, no combat context.
c005-p064: >-
  The coral queen’s sword grows living polyps along its guard. She trims them delicately with garden scissors while floating above a throne of pale shells.
c005-p065: >-
  A wolf warrior’s enormous sword remains strapped down during a village dance. He wears flower garlands over armor and tries to follow much smaller feet.
c005-p066: >-
  Graphic novel panel: narrow bridge, typhoon rain, swordswoman crawling rather than standing, blade wedged between planks as an anchor. Red sash points violently downstream.
c005-p067: >-
  A mirror knight polishes her faceplate until it disappears into the room. Only articulated gauntlets, pale cape, and floating sword reveal where she stands.
c005-p068: >-
  The palace fencing club meets after retirement age. Five elegant figures stretch in the background; foreground an eighty-year-old woman ties red laces with focused hands.
c005-p069: >-
  A child offers a wooden sword to an enormous defeated dragon. Its pupil narrows at the toy, then the claw delicately accepts the challenge.
c005-p070: >-
  Formal side portrait of an executioner who has resigned. Black hood folded under one arm, undecorated blade planted in earth, sunlit face turned toward a distant open gate.
c005-p071: >-
  A tea-house guard’s sword hides inside a bamboo flute. She plays one note beside an open window; the polished edge catches sunset through finger holes.
c005-p072: >-
  Miniature painting of a knight crossing a pomegranate interior. Ruby seeds tower like boulders, juice stains white armor, narrow sword parts translucent membranes.
c005-p073: >-
  The sword chooses a gentle florist. Vines wrap the hilt and pull toward her hands while she backs away holding pruning shears, petals circling puzzled eyes.
c005-p074: >-
  A broad-hipped captain rehearses a ceremonial salute before a cracked mirror. Deep green uniform, plain steel blade, three imperfect reflected attempts, one confident real pose.
c005-p075: >-
  One sword, two shadows: a young guard stands alone at dusk, but the blade casts the silhouette of her missing teacher completing the stance.
c005-p076: >-
  A goose knight charges through laundry day with a butter knife held like a saber. White sheets billow into epic clouds; clothespins scatter beneath armored webbed feet.
c005-p077: >-
  The underwater duelist has weighted boots, bubble-filled scabbard, and ribbonlike hair. She waits upside down beneath a ship, rapier aligned with one descending anchor chain.
c005-p078: >-
  Before battle, an orc mother lets her daughter draw chalk flowers across the broad black blade. Thick green hands steady the weapon; armor rests nearby.
c005-p079: >-
  A blind sword dancer follows bells attached to her own wrists. Gold sound rings map the movement across a dark stage, blade trailing one controlled silver arc.
c005-p080: >-
  Moss has claimed the sleeping guardian. Show a weathered adult seated against temple stone, sword across knees, tiny blue flowers growing from shoulder armor.
c005-p081: >-
  A clockmaker duels time itself: thin rapier points at a giant pendulum, waistcoat flying, hundreds of stopped watches orbiting the narrow workshop.
c005-p082: >-
  Full-length character design for a snow-country sword courier—fur-lined split coat, insulated scabbard, broad skis, signal flags, goggles. She descends while carrying the blade horizontally.
c005-p083: >-
  A tomato farmer discovers the harvest sword is actually useful. One clean swing releases a cascade of ripe fruit without cutting a single vine; his jaw drops.
c005-p084: >-
  Two reflections fence across a puddle while their real owners stand back-to-back, unaware. Street lamps become gold bars in the disturbed dark water.
c005-p085: >-
  Portrait of a sword swallower after rehearsal, red stage paint half removed, long blade safely on the table, expression calm while checking a sore throat.
c005-p086: >-
  A young antelope prince uses curved horns to catch an opponent’s sword. Linen armor stretches with the twist; desert palace banners blur behind his grounded stance.
c005-p087: >-
  A spectral swordsman appears only in steam above a bathhouse pool. Condensation forms the blade, posture, and tired face before dissolving at the ceiling.
c005-p088: >-
  The heroine carries a sword made from every key she has ever lost. Mismatched teeth glitter along the edge; apartment superintendent uniform, skeptical expression, basement corridor.
c005-p089: >-
  A fencing instructor demonstrates restraint by stopping the point against a falling feather. Students remain silhouettes; her relaxed wrist and the hovering white barb stay crisp.
c005-p090: >-
  In a ruined greenhouse, a knight hangs the sword from a branch and begins planting seeds. Broken armor reflects green shoots, rain enters through absent glass.
c005-p091: >-
  A pastry guard wields a long sugar blade that bends in kitchen heat. She races toward the freezer, elaborate frosting armor slowly drooping.
c005-p092: >-
  Show a duelist from the opponent’s shield reflection: distorted determined face, short silver hair, violet jacket, narrow blade approaching from outside the curved mirrored circle.
c005-p093: >-
  An elderly fox swordswoman teaches village children to bow. Her nine tails hold nine wooden practice swords, correcting every student simultaneously beneath plum blossoms.
c005-p094: >-
  The weapon is an absence: a rectangular strip of starless black cuts through bright festival lanterns wherever the quiet swordsman lowers his hand.
c005-p095: >-
  A railway guard uses a ceremonial saber to point out constellations to stranded passengers. Snowed-in platform, warm lantern cluster, blade tip aligned with clear winter sky.
c005-p096: >-
  1woman, full body, tall, shaved sides, weathered face, layered cream armor, indigo sash, left-handed curved sword; rough ink contour, flat rust background, calm stance.
c005-p097: >-
  A tiny armored crab discovers a discarded cocktail sword. It raises the plastic blade above one claw as sunset transforms the beach into a legendary battlefield.
c005-p098: >-
  During peace negotiations, the opposing sword bearers quietly compare calluses behind the delegates. One scarred hand, one jeweled glove removed, mutual recognition at waist level.
c005-p099: >-
  A night gardener trims moonbeams with silver shears shaped like twin swords. Cut fragments fall as pale ribbons across black hedges and her practical rubber boots.
c005-p100: >-
  End with an empty practice hall after dusk. A single wooden sword rocks gently on the floor, a forgotten towel hangs nearby, and firefly light marks the path of the day’s final swing.

c006-p001: >-
  An elderly alchemist measures thunder into blue glass bottles on a farmhouse porch. Rain blows sideways, labels flap loose, and each captured rumble makes the hens glare.
c006-p002: >-
  The spellbook is a sourdough starter. A young kitchen mage feeds the bubbling crock under moonlight while flour sigils crawl slowly across the wooden table.
c006-p003: >-
  Field portrait of a desert chemist collecting mirage samples with a long silver net. Reflected cities slosh inside stoppered jars tied around her waist.
c006-p004: >-
  Three-panel mishap: apprentice adds one red drop; laboratory grows fur; stern teacher enters to find every beaker purring contentedly.
c006-p005: >-
  A crow alchemist sorts buttons by forgotten emotion. Black work apron, brass spectacles, tiny drawers; one pearl button makes the bird unexpectedly homesick.
c006-p006: >-
  No figure appears. Copper coils, chalk triangles, a steaming cup, and wet footprints across the ceiling document the magician’s experiment after it has escaped.
c006-p007: >-
  A broad woman in rolled sleeves repairs a cracked protective circle with masking tape. Violet spirits wait politely on the other side of the improvised boundary.
c006-p008: >-
  The glacier mage knits weather rather than casting it. White yarn leaves her needles as real snow, filling a quiet blue room around thick mittens and patient hands.
c006-p009: >-
  An anxious laboratory slime wears six safety goggles despite having no eyes. It steadies a pipette with translucent pseudopods beside meticulously ordered reagents.
c006-p010: >-
  At a train-station kiosk, a commuter alchemist exchanges one bad memory for a warm pastry. Amber vapor leaves his temple and curls into the vendor’s labeled flask.
c006-p011: >-
  Close study of a botanist-mage grafting a tiny doorway into tree bark. Fine tools, green gloves, concentrated expression; warm miniature lamplight leaks through the seam.
c006-p012: >-
  A child’s first levitation spell lifts only the rug. Family furniture stays put while everyone, seated cross-legged, rises together and tries not to spill soup.
c006-p013: >-
  Underwater laboratory built inside a whale skeleton. The mermaid chemist floats between rib shelves, mixing glowing plankton in a transparent spherical flask.
c006-p014: >-
  A tired necromancer resurrects one houseplant after office hours. Gray cubicle, loosened tie, black candle, single green shoot; keep the miracle deliberately small.
c006-p015: >-
  ink diagram of an eight-armed potion maker at work: grind, pour, weigh, stir, taste, record, extinguish, hold umbrella. Each hand receives a separate annotation.
c006-p016: >-
  The village weather witch has lost her glasses. Tiny localized storms erupt from every misread jar while she squints at labels through hail and sunshine.
c006-p017: >-
  A stone giant studies delicate transmutation at a doll-sized desk. One fingertip hovers over gold dust; enormous body fills a library designed for ordinary scholars.
c006-p018: >-
  Portrait of a forensic mage reading the last light from a broken mirror. Her gloved face repeats in fragments, each reflection showing a different hour.
c006-p019: >-
  A raccoon apothecary conducts business through a night window. Bundles of herbs, tiny scale, red ledger, suspicious customer hand offering three blue feathers.
c006-p020: >-
  Magic lesson on a windy beach: an older teacher draws equations in wet sand while her student chases every symbol before the tide erases it.
c006-p021: >-
  The potion produces honesty for exactly ten seconds. Show two palace alchemists staring at each other in mutual alarm as pink vapor reaches their mouths.
c006-p022: >-
  A blind chemist identifies minerals by the songs they make under a tuning fork. Dark lab, orderly stones, raised notation, silver sound rings around listening hands.
c006-p023: >-
  Flat-color poster of a street mage selling portable shadows from a suitcase. Umbrella-black shapes hang by clips; midday pedestrians remain beyond the crop.
c006-p024: >-
  One enormous snail carries an entire traveling laboratory on its shell: copper chimney, rocking shelves, greenhouse dome, and a sleepy alchemist waving from the door.
c006-p025: >-
  An adult apprentice practices fire magic using a birthday candle. Scarred hands cup the thumb-sized flame, expression reverent, warehouse training hall almost completely dark.
c006-p026: >-
  The palace astronomer distills moonlight through laundry hung on a rooftop. White sheets glow, silver droplets gather in bowls, and her pajamas match the midnight sky.
c006-p027: >-
  A skeptical cat sits inside the summoning circle while the magician appears outside it. Both stare at the chalk geometry, equally offended by the reversal.
c006-p028: >-
  Harvest alchemy turns bruised apples into tiny red suns. An older farmer catches each warm sphere with oven mitts beneath a barn’s dark rafters.
c006-p029: >-
  A young scholar writes with invisible ink, but the letters become moths before drying. Her frustrated hand chases sentences around the green reading lamp.
c006-p030: >-
  In a cramped city bathroom, a water mage repairs a leaking pipe by persuading droplets to queue. Toothbrush cup, pajamas, serious negotiations at two in the morning.
c006-p031: >-
  The salamander metallurgist pours molten gold with bare orange hands. Its fireproof apron is comically oversized; bright liquid reflects in patient black eyes.
c006-p032: >-
  A memory chemist opens a vial labeled FIRST SNOW. The warm laboratory instantly fills with drifting flakes and one child’s distant laughter.
c006-p033: >-
  Full-body character design for a plague doctor who treats curses: white beaked mask, saffron coat, bell-lined boots, moth net, satchel of sealed whispers.
c006-p034: >-
  An exhausted mage uses telekinesis exclusively to fold laundry. Bright socks orbit the sofa while battle staff, crown, and sleeping familiar gather dust nearby.
c006-p035: >-
  Close on a potion surface reflecting its maker as an old woman, though the person leaning above it is sixteen. Her hand hesitates over the final ingredient.
c006-p036: >-
  A mushroom circle functions as a rural chemistry classroom. Frog professor at a bark lectern, beetle pupils, dew-filled test tubes, chalkboard cut from a leaf.
c006-p037: >-
  The alchemist’s prosthetic arm is transparent, carrying colored reagents through internal channels. She rotates the wrist and mixes violet medicine directly in the palm.
c006-p038: >-
  A mountain hermit captures echoes in ceramic bowls. Each vessel holds a faint painted landscape; he listens before choosing which valley to return.
c006-p039: >-
  Comedic overhead view of a spell kitchen after gravity fails: carrots, knives, recipe cards, one furious chef, and a perfectly level pot of soup floating separately.
c006-p040: >-
  A young sand mage builds no castle. Grains assemble into a detailed prosthetic foot around her ankle, then harden into flexible amber glass.
c006-p041: >-
  Laboratory fashion study: elderly trans man in plum robes beneath a stained rubber apron, protective braids, magnifying monocle, pockets organized by danger rather than size.
c006-p042: >-
  Every word the shy oracle speaks appears as a small fish. She cups both hands beneath her mouth while silver predictions swim through the air.
c006-p043: >-
  A bee-sized alchemist operates from inside a sunflower. Petal shelves hold pollen powders, a dewdrop boils over a candle, and striped wings power the fan.
c006-p044: >-
  Snowbound research station where two empty parkas stand upright, animated by their absent mages. Sleeves record notes while invisible occupants argue in fogged breath.
c006-p045: >-
  A river witch barters with the bridge itself. She offers a polished stone; old wooden beams bend down to inspect it over dark water.
c006-p046: >-
  The spell is performed through tap dance. Copper shoes strike geometric sparks around a stocky performer, gradually assembling a protective circle across the theater floor.
c006-p047: >-
  An owl pharmacist compounds dreams under green light. Powdered moon, blue feathers, tiny mortar; its head rotates toward a customer before the body notices.
c006-p048: >-
  Portrait of an apprentice caught tasting a forbidden elixir. Hair floats like seaweed, freckles become stars, and guilty eyes remain entirely ordinary.
c006-p049: >-
  A household exorcist removes one stubborn ghost from a toaster. Yellow gloves, kitchen tongs, black smoke shaped like breakfast, annoyed family silhouettes.
c006-p050: >-
  The desert laboratory has no roof. Glass columns align with constellations while a robed chemist adjusts valves under cold starlight and warm sand wind.
c006-p051: >-
  A magical tailor brews dyes from emotions: blue patience, orange appetite, green envy. Her own gray coat waits undecided on a mannequin.
c006-p052: >-
  Child alchemist, giant round goggles, shaved head, patched red sweater; she proudly presents a lead spoon now transformed into a slightly shinier lead spoon.
c006-p053: >-
  An elderly cloud chemist tests density by sitting on each sample. One collapses beneath him, leaving white vapor and dignified surprise above the floor.
c006-p054: >-
  A minotaur librarian inspects ink that rewrites history overnight. Massive horned silhouette, tiny magnifier, manuscript letters rearranging under dawn.
c006-p055: >-
  Botanical spell rendered as a cutaway diagram: roots drink violet light, stem filters fear, leaves release courage, flower whispers dosage to the waiting herbalist.
c006-p056: >-
  The moon laboratory’s only specimen is a jar of darkness. A brown-skinned researcher opens it one millimeter; stars pour upward across her clear visor.
c006-p057: >-
  A ghost apprentice learns to handle solid glass by wearing knitted mittens. Transparent fingers, red yarn, wobbling beaker, teacher’s encouraging reflection.
c006-p058: >-
  Marketplace alchemy occurs under a striped awning: broken plates exchanged for repaired promises, each invisible mend shown as a thin gold line around customers’ hands.
c006-p059: >-
  A garden mage asks weeds where they came from. Dandelions answer in floating map symbols while she kneels with notebook, muddy skirt, and earnest attention.
c006-p060: >-
  Ink-black ocean fills an alchemist’s flask, complete with tiny storm and ship. He braces the stopper against the pressure as waves strike glass from within.
c006-p061: >-
  A serious young witch calibrates a broom in a bicycle repair stand. Spirit level, spoke wrench, chalk notes; familiar waits wearing a tiny safety helmet.
c006-p062: >-
  The healer’s room contains hundreds of labeled jars, but she chooses a plain orange and peels it. Citrus scent becomes visible gold around the worried patient.
c006-p063: >-
  A penguin chemist transports a volatile red potion across ice on a tea tray. Tuxedo feathers, tiny goggles, careful steps, long crack following behind.
c006-p064: >-
  Formal alchemical portrait where the subject is the furnace. Brick mouth glows, bellows breathe, iron tools rest like folded hands, no practitioner present.
c006-p065: >-
  A young transmutation student turns her exam paper into a white dove, then realizes the professor is a falcon. Both birds freeze above the desk.
c006-p066: >-
  In a flooded archive, a water mage swims between shelves and seals each book inside a bubble. Long braid, weighted spectacles, pages fluttering safely within spheres.
c006-p067: >-
  The village potion brewer is a broad old oak. Bottles hang from branches, sap travels through copper taps, and one face appears faintly in bark.
c006-p068: >-
  An anxious astronomer tries to return a fallen star using kitchen tongs. The tiny blazing object has burned neat holes through three oven mitts.
c006-p069: >-
  A spell for finding lost things reveals everything at once. Keys, socks, letters, rings, and one missing goat orbit the stunned caster in a crowded blue room.
c006-p070: >-
  Desert alchemy at noon: mirrored dishes concentrate light into one white-hot thread, which an armored glassblower winds around a dark ceramic core.
c006-p071: >-
  A fox pharmacist tastes medicine with the tip of one tail. Fur changes color according to bitterness while her paws keep professional notes.
c006-p072: >-
  The young curse breaker works at a call center. Headset, sticky notes, ordinary desk; black vines retreat from the phone as she calmly reads instructions.
c006-p073: >-
  Portrait of a laboratory after a successful invisibility experiment: white coat hanging in midair, spectacles floating, triumphant handwriting appearing across the fogged window.
c006-p074: >-
  A glacier core contains last summer’s sunlight. Researchers in thick blue suits gather as one amber ring melts slowly into their dark field tent.
c006-p075: >-
  The moon witch keeps tides in nested porcelain cups. She pours from ocean to bay to puddle, careful not to wake the sleeping harbor miniature.
c006-p076: >-
  Graphic two-color image of an orc chemist blowing glass. Black profile, white breath, molten orange vessel swelling at the pipe’s end.
c006-p077: >-
  A young alchemist has replaced every ingredient with candy. The cauldron grows crystalline teeth; her delighted familiar ignores the warning label.
c006-p078: >-
  An apartment healer listens to cracks in the walls with a stethoscope. Through wallpaper, tiny golden repair symbols pulse like a calm heartbeat.
c006-p079: >-
  A coral mage cultivates pearls containing weather. One holds lightning, another fog, another miniature blue sky; she sorts them among swaying anemones.
c006-p080: >-
  Magical chemistry class for retired adventurers. Scarred hands raise questions, bifocals fog, one former barbarian takes immaculate notes beside a bubbling lilac flask.
c006-p081: >-
  A blacksmith alchemist forges a key from a whispered secret. Letters glow in the metal, hammer blows erase their sound, dark workshop holds one listening shadow.
c006-p082: >-
  The summoned demon is microscopic. Two enormous horned researchers peer through one lens while the furious red speck shakes a pitchfork on the slide.
c006-p083: >-
  A laundress distills colors from faded clothes. Indigo vapor, rose droplets, lemon crystals; the empty fabric leaves her machine perfectly white.
c006-p084: >-
  Night portrait of a wandering mage whose hat contains an observatory. A tiny telescope protrudes from the brim while constellations rotate under dark felt.
c006-p085: >-
  The antidote must be stirred counterclockwise by a left-handed person. A relieved child volunteer stands on a stool, tongue out, spoon held with heroic seriousness.
c006-p086: >-
  A mantis alchemist writes formulas across its folded wings. Emerald body, six ink brushes, rice-paper desk; each movement reveals and hides part of the equation.
c006-p087: >-
  A city mage grows emergency staircases from red string. She throws one spool upward, and taut threads assemble steps along a burning building’s blank wall.
c006-p088: >-
  Show a potion aging through four seasons in one bottle. Its keeper turns the glass before a window while spring green becomes winter silver around her hand.
c006-p089: >-
  A tiny thundercloud follows the apprentice who created it. She walks home under personal rain, carrying books and apologizing to every dry passerby.
c006-p090: >-
  The village healer is allergic to magic. Every spell makes him sneeze blue sparks, yet his careful bandages and herbal compresses work beautifully.
c006-p091: >-
  Alchemical train carriage where each window shows a different element. The conductor checks boiling water, floating stone, bottled wind, and one seat occupied by fire.
c006-p092: >-
  A witch uses a photocopier to duplicate one protective charm. Hundreds of paper shields jam the office, lifting desks around her embarrassed face.
c006-p093: >-
  Portrait of a memory gardener transplanting a childhood afternoon. Small summer sky held between gloved hands, winter greenhouse, empty pot waiting.
c006-p094: >-
  A bat chemist works upside down; glassware hangs conventionally from the ceiling beneath him. Purple apron, dropper between toes, meticulous nocturnal concentration.
c006-p095: >-
  The potion has separated into courage and caution. Two colored layers refuse to mix while a young hero studies them under a kitchen lamp.
c006-p096: >-
  1woman, alchemist, deep brown skin, silver locs, broad frame, scorched green apron, copper respirator at neck; loose gouache, luminous red reagent, quiet focus.
c006-p097: >-
  A mountain chemist tests whether moonlight freezes. Silver liquid spreads across a black tray, crystallizing into tiny transparent wolves that immediately run away.
c006-p098: >-
  An old familiar teaches its new mage how to draw the circle. The tortoise scratches perfect geometry while the teenager’s chalk lines wobble beside it.
c006-p099: >-
  Empty laboratory at sunrise, experiment complete: one glass rose blooms in a clamp, petals refract the clutter, handwritten note says WATER ME WITH MUSIC.
c006-p100: >-
  Final scene in the apothecary: after closing, every labeled remedy glows a different color while the exhausted owner sleeps beneath the counter, head on folded arms.

c007-p001: >-
  A cargo pilot guides a rust-red freighter through Saturn’s rings using handwritten notes taped over half the instruments. Ice fragments flash across her scratched visor.
c007-p002: >-
  Cockpit designed for an octopus: eight radial controls, water-filled sphere, color-changing status lights. The pilot calmly knits with two arms during autopilot.
c007-p003: >-
  The racing ship has stopped one meter before the finish. Show the elderly pilot outside, helmet off, kicking its tiny rear thruster under a violet stadium sky.
c007-p004: >-
  First solo flight of a moon-born teenager. Her feet cannot reach the pedals, so magnetic boots extend awkwardly; Earth fills the windscreen and her mouth hangs open.
c007-p005: >-
  No pilot visible—only an empty seat rotating slowly, fresh coffee floating in beads, warning displays reflected across a cracked canopy, and one gloved handprint outside.
c007-p006: >-
  A broad rescue flyer squeezes into an antique one-person craft. Knees bracket the controls, orange suit patched, expression joyful as storm clouds open ahead.
c007-p007: >-
  Underwater shuttle cockpit lit by bioluminescent gauges. A blind navigator reads raised currents with both palms while translucent whales pass beyond the pressure glass.
c007-p008: >-
  A sparrow pilots a seed-sized aircraft between skyscraper gardens. Tiny goggles, wing-operated levers, pollen exhaust; gigantic human laundry becomes aerial terrain.
c007-p009: >-
  During hyperspace, the pilot’s freckles stretch into star trails. Tight side portrait, clenched jaw, one eye on a mechanical timer that still uses a kitchen dial.
c007-p010: >-
  Agricultural mech operator at sunset: weathered woman, straw hat inside transparent helmet, green cockpit overalls, enormous robotic hands planting rice seedlings with exquisite care.
c007-p011: >-
  A child discovers the family camper is a dormant starship. Dashboard unfolds around pajamas and slippers; the dog already occupies the copilot seat with suspicious confidence.
c007-p012: >-
  Graphic black-and-orange image of a solar skiff rider standing upright at the mast. Vast light sail curves beyond the frame; tether lines pull every garment sunward.
c007-p013: >-
  The asteroid tug pilot eats noodles while dragging a mountain-sized rock. One chopstick floats away, thrusters glow on three screens, and his expression remains deeply unimpressed.
c007-p014: >-
  A ghost operates the last train between abandoned orbital stations. Transparent uniform, brass controls, empty passenger lights receding through the curved carriage.
c007-p015: >-
  Character sheet for a desert hovercraft courier: cooling scarf, mirrored mask, prosthetic legs locked into pedals, map tattoos, compact water pack, red dust boots.
c007-p016: >-
  Two pilots share one body, each controlling a hemisphere of the craft. Their conjoined shoulders lean differently as storm and clear sky split the windshield.
c007-p017: >-
  Inside a living spacecraft, the navigator comforts the nervous dashboard by stroking its soft membrane. Veinlike maps brighten beneath her hand before launch.
c007-p018: >-
  The pilot is an elderly cat asleep on the console. Autonomous ferry glides between neon towers while one paw rests accidentally on the emergency horn.
c007-p019: >-
  A rookie lands on a planet with grass taller than the ship. She opens the canopy and immediately disappears beneath green blades, leaving only both gloved hands visible.
c007-p020: >-
  Tight cockpit portrait of a dark-skinned racer banking hard. Braided hair lies horizontal, cheek compresses under acceleration, turquoise course gates reflect in gold pupils.
c007-p021: >-
  A maintenance drone believes it is the captain. It wears a paper hat, occupies the central chair, and points one clamp toward stars while actual crew repair wires behind.
c007-p022: >-
  Retro lunar taxi at a crater curb, yellow checker panels dusted gray. The driver leans across three empty seats to hold the door for a tiny alien passenger.
c007-p023: >-
  A pilot in formal wedding clothes escapes the reception aboard a crop-dusting plane. White veil streams from the open canopy over luminous alien wheat.
c007-p024: >-
  Ice-hauler cockpit carved directly into a transparent comet. The bundled operator sees her own distorted reflection repeated through frozen layers around flickering instruments.
c007-p025: >-
  The emergency landing occurs in a shopping arcade. A teenage glider pilot folds silver wings between hanging signs, apologizing through the canopy to startled mannequins.
c007-p026: >-
  A frog test pilot waits atop a bottle-rocket craft. Acorn helmet, red scarf, one webbed foot on ignition; garden hose launchpad at heroic sunrise.
c007-p027: >-
  Portrait of a pilot navigating by smell. Rows of scent vials replace screens; he opens “rain on stone” and banks toward a blue cloud.
c007-p028: >-
  Orbital school bus driver checks every harness before departure. Stocky older android, flower decals, thirty tiny helmets, Earthrise glowing through broad front glass.
c007-p029: >-
  A colony ship’s pilot wakes after two centuries and finds the controls covered in ivy. She trims one switch free while birds scatter under the dome.
c007-p030: >-
  Side cutaway of a mining walker descending underground. Pilot pedals inside the head, gears turn through the neck, drill legs probe luminous crystal strata.
c007-p031: >-
  During a meteor storm, an unflappable grandmother flies one-handed and darns a sock with the other. Red warning light, silver bun, stars breaking outside.
c007-p032: >-
  A young alien tourist rents a human bicycle and mistakes it for an aircraft. Helmet sealed, antennae excited, both feet pedaling furiously down an ordinary hill.
c007-p033: >-
  Full-body view of a zero-gravity courier steering with four ribbon thrusters attached to wrists and ankles. Parcels orbit the torso in a protective ring.
c007-p034: >-
  A pilot guides cloud whales away from a city using a tiny flute through the open cockpit. Blue animals dwarf the craft; music appears as warm spirals.
c007-p035: >-
  The last simulator test is visibly homemade: cardboard planet, painted stars, kitchen chairs. A serious cadet grips toy controls while instructors observe from shadow.
c007-p036: >-
  A rescue capsule splashes into a rooftop pool. Show the pilot’s helmet emerging among inflatable ducks, victory signal reflected in surrounding apartment windows.
c007-p037: >-
  A sentient spacesuit flies without anyone inside. Loose gloves steer by gesture, boots fire small jets, and a family photograph is tucked behind the clear empty visor.
c007-p038: >-
  Mountain skimmer pilot wears thick wool beneath sleek armor. She threads between floating cliffs while prayer flags tied to the dashboard snap in open air.
c007-p039: >-
  The tiny submarine’s entire bridge is one glass marble. A mouse navigator presses paws against it as a colossal goldfish eye fills the surrounding pond.
c007-p040: >-
  Vintage poster advertising a cheerful Venus air route: green cloud decks, cream rocket plane, smiling pilot in coral uniform, turbulence discreetly bending every line.
c007-p041: >-
  A deaf starfighter pilot follows combat through colored vibrations across the seat and gloves. No explosions shown, only concentration and a red pulse arriving from behind.
c007-p042: >-
  The ship controls respond to dance. A long-limbed navigator turns across a circular white floor, each footstep rotating a different constellation outside.
c007-p043: >-
  A scarred veteran teaches three children to fly paper spacecraft in a hangar. Her real fighter remains covered; one folded model catches an improbable blue flame.
c007-p044: >-
  Planetary survey pilot hovering over an ocean of flowers. Clear cockpit underside reveals her face looking down, maps ignored as petals strike the glass.
c007-p045: >-
  An anxious robot attempts parallel parking between two asteroids. Beads of oil form on its metal brow; tiny maneuvering jets fire in contradictory directions.
c007-p046: >-
  A royal barge crosses the upper atmosphere, piloted by a woman in plain work clothes. Gold passengers blur behind; her sunburned hands hold a wooden wheel.
c007-p047: >-
  Black ink cockpit, single red switch. The pilot’s finger hovers above it while every instrument points toward silence and the visor reflects an approaching white shape.
c007-p048: >-
  Full-page illustration of a sand-sail racer leaning nearly horizontal from the cockpit. Turquoise scarf, bronze goggles, triangular vehicle slicing a dune into two waves.
c007-p049: >-
  The pilot arrives late because her spaceship is a stubborn giant beetle. She pulls the reins while six armored legs refuse to leave a flowering tree.
c007-p050: >-
  A compact cargo drone navigates by following migrating butterflies. Screenless nose, patchwork shell, yellow swarm turning around an abandoned solar tower.
c007-p051: >-
  Inside a ship smaller than her body, a giantess pilots using fingertip controls visible through a dollhouse cutaway. Knees outside the open hull, careful smile.
c007-p052: >-
  A hospital transport glides through a lightning storm. Pilot in soft pink scrubs keeps one hand steady while the other shields a sleeping incubator from flickering light.
c007-p053: >-
  The moon racer removes his helmet after losing by one second. Gray curls spring outward, disappointment softens, rival hand offers a thermos from beyond frame.
c007-p054: >-
  An airborne lighthouse keeper pilots the entire tower. Spiral stairs shake behind her chair, lamp beam cuts cloud, coffee remains miraculously level.
c007-p055: >-
  A salamander engineer test-flies a craft powered by its own tail flame. Copper fuselage, glass goggles, delighted orange grin, black smoke spelling accidental loops.
c007-p056: >-
  View through an external maintenance camera: astronaut pilot crawls across the hull midflight, tethered boots, wrench, irritated face reflected in polished panel.
c007-p057: >-
  A retired courier makes one final delivery to the edge of the solar system. Knitted seat cover, faded route badges, lunch tin, dark beyond windshield.
c007-p058: >-
  The spacecraft is controlled by gardening. Pruning one bonsai branch turns left; watering moss increases altitude. The pilot studies the living console during turbulence.
c007-p059: >-
  Child-sized alien captain in an enormous command chair, three booster cushions, jeweled uniform, dangling feet. Crew hands enter only to pass a juice box.
c007-p060: >-
  A pilot with albinism crosses a red-dust planet at noon. Deep visor shadow protects pale face; white rover casts a razor-thin line across the plain.
c007-p061: >-
  The escape pod refuses to launch without a proper goodbye. Its screen displays a blinking heart while the annoyed pilot pats the dashboard and alarms continue.
c007-p062: >-
  An owl aviator flies only at night, navigating a silent wooden glider by moonlit rivers. Feathered hands, leather straps, map clipped upside down.
c007-p063: >-
  Close cockpit comedy: space-truck driver encounters a cosmic traffic jam. Thousands of taillights, floating coffee, deeply tired eyes above a magnificent mustache.
c007-p064: >-
  A young pilot steers through aurora using transparent mechanical wings instead of a ship. Full figure suspended above ice, cables responding to shoulder movement.
c007-p065: >-
  Under a ruined city, a mole navigator drives a drill train by listening through brass tubes. Dusty whiskers, red vest, warm lamps receding underground.
c007-p066: >-
  The fighter has been converted into a flower-delivery craft. Former ace in green overalls threads between towers while bouquets fill every missile rack.
c007-p067: >-
  A jellyfish pilot occupies a dry cockpit inside its own water-filled helmet. Translucent tentacles manipulate holograms; pink light ripples across black space.
c007-p068: >-
  Pilot training through pottery: spinning a clay vessel controls orbital rotation. The student centers both ship and bowl while the instructor catches drifting tools.
c007-p069: >-
  A lunar farmer’s daughter flies a patched crop hopper at dawn. Boots on pedals, helmet covered in stickers, crates of blue vegetables strapped behind.
c007-p070: >-
  Empty alien cockpit discovered in a forest. Seat grown from red fungus, controls pulsing softly, deer cautiously reflected in the curved canopy.
c007-p071: >-
  A masked racing champion signs to fans through the windshield. One gloved hand forms gratitude while the other holds a smoking steering yoke.
c007-p072: >-
  The craft jumps between puddle reflections. A rain-suited pilot skims an urban alley, entering one silver surface and emerging from another farther down.
c007-p073: >-
  Full-body concept for a starship tug operator: heavy magnetic boots, sleeveless pressure jacket, tattooed arms, cable launcher, lunch pouch, practical shaved head.
c007-p074: >-
  A phoenix pilots a fireproof balloon through a blizzard. Red feathers heat the brass basket; melting snow creates a private rainstorm below.
c007-p075: >-
  During landing, gravity returns sideways. Pilot, chair, charts, and potted cactus all lean against one wall while runway lights rotate outside.
c007-p076: >-
  A cave pilot rides a giant bat using a luminous control harness. Stalactites rush past; both rider and animal wear matching protective ear covers.
c007-p077: >-
  The captain is too short to see over the console, but her tall blue antennae relay the view. Determined lower face, elevated periscope tips, tiny formal uniform.
c007-p078: >-
  A wedding photographer pilots a camera drone large enough to sit inside. White ceremony below, spinning lens rig, black formalwear whipping in rotor wind.
c007-p079: >-
  The ship’s map is embroidered across the pilot’s sleeves. She aligns two cuffs, joining constellations into a glowing route over dark fabric.
c007-p080: >-
  A raccoon salvage pilot reverses into a drifting refrigerator. Mechanical claws open, striped tail braces the seat, one paw holds a handwritten shopping list.
c007-p081: >-
  Long horizontal panorama of a solar train driver crossing a sunspot. Black-gold plasma beyond the glass, calm silhouette, white gloves on simple brass controls.
c007-p082: >-
  A teenage hoverboard pilot delivers medicine through flooded streets. Knees bent, orange case overhead, wake reflecting apartment lamps and midnight rain.
c007-p083: >-
  The astronaut returns to find a bird nested in her helmet. She pilots home bareheaded inside the pressurized cabin, cradling eggs through the launch sequence.
c007-p084: >-
  Abstract flight portrait where instruments become circles around one closed eye. The pilot navigates by memory through a starless region, hands invisible.
c007-p085: >-
  A whale-shaped freighter opens its mouth to dock. Tiny pilot visible behind one blue eye, steering toward a city suspended in ocean mist.
c007-p086: >-
  1woman, spaceship pilot, older, deep skin, close gray curls, orange pressure suit tied at waist, transparent gloves, relaxed grin; flat teal cockpit, hard white rim light.
c007-p087: >-
  A clown pilots the funeral shuttle with solemn professionalism. Red nose, black uniform, quiet hands; colorful emergency balloons remain tied beneath the seat.
c007-p088: >-
  The racing course enters an abandoned cathedral in space. Pilot tilts between floating columns, stained-glass light traveling across a scratched white helmet.
c007-p089: >-
  A fox child controls a snowplow mech from a warm cabin. Cocoa mug, wool cap, tiny paws; enormous yellow blade clears a mountain village road.
c007-p090: >-
  Ship powered by collective breath: four pilots exhale into glass tubes in rhythm. Frosty spirals reach the engine while cheeks puff with synchronized effort.
c007-p091: >-
  A one-handed pilot adjusts three controls with elbow, knee, and teeth during reentry. Heat glows outside; his free prosthetic hangs charging behind the chair.
c007-p092: >-
  The cloud taxi driver asks a thunderhead for directions. Open side window, polite hand gesture, map flapping as lightning points toward the next city.
c007-p093: >-
  A garden snail pilots a chrome racing shell. Eye stalks behind tiny visor, exhaust like silver dew, lettuce-leaf pit crew blurred at trackside.
c007-p094: >-
  After touchdown, the pilot discovers the planet is soft. Landing legs sink into pink moss while she leans from the hatch, measuring tape in hand.
c007-p095: >-
  Interior of a lighthouse-shaped spacecraft during artificial night. Pilot sleeps in hammock above controls; automated stars glow across the circular cabin.
c007-p096: >-
  Pencil-and-marker design of a nonbinary test pilot, tall and angular, teal braid, asymmetrical pressure suit, sensor collar, magnetic cane, red-soled boots.
c007-p097: >-
  A time pilot flies backward to avoid a storm. Raindrops rise from canopy, wet hair dries, warning lights unflash, and relief becomes concentration in reverse.
c007-p098: >-
  The smallest rescue craft docks inside a giant robot’s damaged chest. Pilot shines a hand lamp across cathedral-scale gears and one slowly beating mechanical heart.
c007-p099: >-
  A pilot steers by shadow puppets. Gloved hands form birds against a luminous panel, and the ship mirrors their wing shapes through a violet nebula.
c007-p100: >-
  Final flight ends at a rural bus stop. Silver spacecraft parked beside wildflowers, retired captain in plain clothes waiting with one suitcase as dawn commuters approach.

c008-p001: >-
  Noon heat beneath an elevated rail: three teens repair a bootleg air purifier using bicycle fans, aquarium hose, and a cracked civic sensor. No neon anywhere.
c008-p002: >-
  A young courier with a transparent prosthetic leg vaults a market barrier. Orange parcels magnetized to her jacket trail like scales; vendors duck beneath striped awnings.
c008-p003: >-
  Rooftop barber shop at blue hour. One teen braids fiber-optic strands into another’s hair while solar laundry turns slowly above the crowded block.
c008-p004: >-
  Graphic street portrait of a fox-headed DJ carrying obsolete cassette decks across both shoulders. Lime windbreaker, patched shorts, sharp white city shadows, bored amber gaze.
c008-p005: >-
  The neighborhood’s youngest mechanic tunes a robotic pigeon with a spoon. Grease freckles, huge safety glasses, milk crate workbench, sunrise delivery flock waiting on wires.
c008-p006: >-
  During a blackout, apartment children project hand-drawn animations from hacked phones onto a concrete tower. Their shadows become giants between balcony gardens.
c008-p007: >-
  A quiet vending-machine shrine occupies an alley. A schoolboy leaves a dead battery as an offering; blue screens reflect his bowed head and repaired uniform.
c008-p008: >-
  Wheelchair skate crew descending a spiral parking structure, sparks under reinforced rims, loose jackets ballooning, late-afternoon arrows and lane markings forming bold graphic bands.
c008-p009: >-
  An anxious teen sells tiny bottled weather at a subway entrance. Fog, drizzle, and miniature lightning glow inside recycled jars arranged on a folded blanket.
c008-p010: >-
  Close to street level, a robotic stray dog projects a missing-person notice from one eye. Sneakers pause around it; rainwater carries the image across asphalt.
c008-p011: >-
  Two siblings grow mushrooms inside a broken advertising kiosk. Corporate smile peels from the glass while pink caps flourish under repurposed display lights.
c008-p012: >-
  Fashion candid: nonbinary bike messenger, shaved turquoise brows, reflective sari over armored leggings, respirator at hip, yellow helmet covered in handwritten route complaints.
c008-p013: >-
  A ramen stall runs from the open chest of an abandoned construction mech. Young cook leans between rusted plates, steam softening high-rise scaffolds behind.
c008-p014: >-
  After rain, three autonomous umbrellas continue down the sidewalk without owners. A girl in a soaked school coat chases them, laughing beneath dormant billboards.
c008-p015: >-
  The hacker is a grandmother teaching neighborhood teens to solder. Lace curtains, stacked circuit boards, tomato plants, and one holographic manual hovering above the kitchen table.
c008-p016: >-
  A rooftop goalkeeper defends a laundry basket goal while delivery drones interrupt the match. Sunset, tangled antennas, one spectacular leap in oversized magnetic boots.
c008-p017: >-
  Flat red-and-black poster of a young street medic opening a pop-up clinic from her backpack. Foldout stool, diagnostic patches, water packets, calm direct gaze.
c008-p018: >-
  A pigeon steals a glowing earbud and accidentally activates augmented reality. Tiny maps and advertisements orbit its confused head above a crowded train platform.
c008-p019: >-
  Night-market tattoo apprentice tests programmable ink on his own forearm. Small koi swims between old scars while a skeptical cat watches from the sterilizer.
c008-p020: >-
  Solar noon, white concrete, hard shadows. A girl in a homemade cooling cape distributes ice from a wheeled blue chest to elderly neighbors.
c008-p021: >-
  An empty laundromat hosts a secret robot dance battle. Dryer doors pulse color, two small maintenance units spin on tile, security camera looks deliberately away.
c008-p022: >-
  Portrait through scratched bus glass: exhausted student asleep upright, cheek against route display, silver implant behind ear, grocery bag held protectively between both knees.
c008-p023: >-
  A street artist paints over facial-recognition cameras with removable flower decals. Harness, long brush, broad grin; every lens now resembles a sunflower center.
c008-p024: >-
  Under a flood barrier, young fishers cast magnet lines for lost electronics. One pulls up a tiny still-working music player, green river reflected in delighted faces.
c008-p025: >-
  Cyberpunk without chrome: patchwork wool coats, communal battery cart, hand-lettered signs, and teens swapping stored sunlight at a winter market.
c008-p026: >-
  A deaf dancer follows bass through illuminated floor cracks. Red sneakers, loose gray trousers, hands signing lyrics while the crowd becomes vertical smears.
c008-p027: >-
  The courier’s delivery is a living bonsai in a glass helmet. She rides the tram hugging it tightly as mechanical bees circle the tiny tree.
c008-p028: >-
  Two young mechanics repaint a corporate patrol drone like a clownfish. Its weapons are gone; orange fins and bubble projector draw neighborhood children closer.
c008-p029: >-
  Dawn after an all-night LAN party: tangled cables, sleeping bodies, empty noodle cups. One teen remains awake, watching real birds replace pixel stars outside.
c008-p030: >-
  A small antelope girl races self-balancing skates through an open-air bazaar. Fabric ears trail behind, fruit stalls tilt into dynamic streaks, one wheel sparks green.
c008-p031: >-
  Community notice board made from dead screens displays handwritten paper instead. A young volunteer tapes up a missing-cat flyer over flickering luxury ads.
c008-p032: >-
  In summer rain, a teen with vitiligo repairs a leaking roof tarp using magnetic clips. Purple work gloves, bare feet, distant towers blurred to watercolor.
c008-p033: >-
  A street chess game between a child and a vending AI. Bottle caps serve as pieces; blue payment screen shows a deeply worried pixel face.
c008-p034: >-
  Roller-skating librarian returns books through apartment windows. Long coat full of pockets, scanner wristband, midnight street, residents reaching from balconies.
c008-p035: >-
  The gang emblem is a smiling radish. Five gardening-club teens pose beside their illegal median vegetable bed under giant gray traffic pylons.
c008-p036: >-
  Side alley fashion repair: a punk tailor heat-seals a friend’s torn inflatable jacket while both wear respirators decorated with childish stickers.
c008-p037: >-
  A boy collects discarded holograms in butterfly nets. Transparent advertisements fold into bright squares inside his cart as morning shops open.
c008-p038: >-
  An old arcade has become a rain shelter. Stranded students sit inside silent cabinets, their wet shoes lined neatly beneath glowing game marquees.
c008-p039: >-
  Elevated train garden maintained by a robotic goat and its teenage handler. The animal trims weeds; she harvests tomatoes while city traffic flows below.
c008-p040: >-
  Close-up of a courier reading tactile navigation across her palm. Raised blue route lines shift around a burn scar; orange helmet fills the background.
c008-p041: >-
  A student orchestra performs on instruments built from appliance parts. Washing-machine drum, fan-blade harp, kettle horns; pedestrians gather beneath noon flyovers.
c008-p042: >-
  Graffiti animates after midnight and helps sweep the street. Painted hands lift litter into bins while a young muralist naps against the wall.
c008-p043: >-
  A raccoon food-delivery rider studies an impossible apartment tower map. Helmet too large, thermal box, tail curled around one parking meter in frustration.
c008-p044: >-
  Public bath entrance lit by a single repaired sign. Teens leave cybernetic limbs in numbered lockers before joining steam, towels, and ordinary conversation.
c008-p045: >-
  A girl projects constellations beneath the smog so younger children can learn the missing sky. Chalk labels, rooftop blankets, improvised lens balanced on bricks.
c008-p046: >-
  The neighborhood bus is pushed by passengers when its battery dies. Exoskeletons, bare hands, school uniforms, market aprons; shared effort beneath cheerful route lights.
c008-p047: >-
  Fashion portrait under fluorescent grocery aisles: tall cashier after work, braided silver cables, peach eyeliner, patched leather skirt, orthopedic boots, tired magnificent posture.
c008-p048: >-
  A young mechanic coaxes a traffic signal down from its pole like a frightened cat. Red lamp blinking, ladder wobbling, empty dawn intersection.
c008-p049: >-
  In an abandoned phone booth, two siblings operate a tiny radio station. Egg-carton soundproofing, hand-built mixer, city requests scrolling on cracked glass.
c008-p050: >-
  A basketball court painted with solar ink charges during play. At sunset, every footprint and dribble path glows around the final lone shooter.
c008-p051: >-
  The street vendor sells replacement dreams on memory cards, but a skeptical teen asks to preview one. Palm screen shows an ordinary green hillside.
c008-p052: >-
  Three girls repair a neon sign without turning it off. Pink letters reflect across safety goggles while one friend steadies the ladder with augmented arms.
c008-p053: >-
  A robotic heron hunts loose data cables in a flooded plaza. Young children follow barefoot, gathering bright connectors in woven baskets.
c008-p054: >-
  Quiet morning at a capsule hostel. A teen traveler braids hair in a communal mirror while charging a prosthetic hand beside toothbrushes and tea mugs.
c008-p055: >-
  No people: patched delivery bags hang from a fence to dry, indicator lights blinking. Beyond them, hundreds of tiny drones sleep under rain covers.
c008-p056: >-
  A street magician bends obsolete transit cards into real windows. Through each rectangle appears a different coastal landscape; commuters stop beneath gray towers.
c008-p057: >-
  Cybernetic tailor measures a centaur customer in a narrow market lane. Laser tape wraps four legs; fabric samples hang from overhead power cables.
c008-p058: >-
  A young electrician wears a sari stitched with flexible circuit paths. She crouches inside a dark elevator, golden test light tracing the garment’s pattern.
c008-p059: >-
  Skateboard trick across a sleeping cleanup robot. The teen clears its spinning brushes; sunrise turns glass offices pale and almost gentle.
c008-p060: >-
  At the community kitchen, a delivery exosuit peels mountains of potatoes. Its operator, barely visible inside, shares jokes through the open chest hatch.
c008-p061: >-
  A schoolgirl teaches sign language to an advertising avatar. Giant projected hands copy her uncertain movements above a crowded pedestrian crossing.
c008-p062: >-
  Botanical night market where seedlings glow instead of signs. Hooded teens trade cuttings, soil microbes, and handwritten growing instructions beneath violet leaves.
c008-p063: >-
  The rooftop beekeeper wears patched motocross armor. Urban hives hum beside satellite dishes; amber honey fills transparent tubes across his chest.
c008-p064: >-
  A small boy rides inside the transparent head of a retired security robot. One joystick, blanket nest, sticker stars; giant body walks gently through traffic.
c008-p065: >-
  Street portrait in dusty rose daylight: young woman with shaved head, mechanical jaw decorated in blue porcelain, simple white tee, bag of oranges, direct relaxed gaze.
c008-p066: >-
  A fox teen picks electronic locks for neighbors who lost keys. Tool roll, magnifying visor, municipal apartment door, embarrassed family waiting with groceries.
c008-p067: >-
  Under ultraviolet lamps, community volunteers sort counterfeit medicine. Color-coded gloves, determined young faces, handwritten warning posters, sealed bins arranged like bright blocks.
c008-p068: >-
  The old rooftop antenna becomes a harp during wind. Two students tune its cables while laundry, pigeons, and distant traffic supply percussion.
c008-p069: >-
  A courier rests inside the shadow of a moving billboard. Her reflective coat changes advertisements across its folds while she eats a plain rice ball.
c008-p070: >-
  Flooded subway entrance converted into a public pool. Teens dive between old turnstiles, waterproof lights below, lifeguard drone wearing a yellow float.
c008-p071: >-
  Close street scene of a repair kiosk for broken virtual pets. Sad holographic creatures queue with owners; one young technician comforts a pixel turtle.
c008-p072: >-
  A group of students uses a construction laser to project poetry onto fog. Orange safety vests, wet concrete, enormous green words disappearing by dawn.
c008-p073: >-
  Solar-powered wheelchair taxi waiting outside a concert. Driver in silver rain cape checks tire pressure while colorful passengers crowd beneath one canopy.
c008-p074: >-
  An alley cat sleeps on a warm server vent, surrounded by cables and moss. Its collar display cycles through neighborhood messages in quiet blue text.
c008-p075: >-
  The teen boxer trains against an augmented shadow rather than a bag. Rooftop noon, wrapped fists, black silhouette dodging half a second ahead.
c008-p076: >-
  A noodle-shop apprentice wears four robotic arms during dinner rush. Human hands season broth; mechanical hands catch bowls, chop herbs, and pat a crying child.
c008-p077: >-
  Night scene without rain: dusty wind, amber streetlights, cracked screens. A girl carries three sleeping robot dogs home in a shopping cart.
c008-p078: >-
  Community tailor prints emergency blankets into elegant winter coats. Young customers model metallic layers while old sewing machines vibrate beside the fabric unit.
c008-p079: >-
  A cybernetic crow returns lost jewelry to a teen who once repaired its wing. Silver chain between beak and open palm, market crowd softened behind.
c008-p080: >-
  1boy, street dancer, dark skin, compact build, magenta buzz cut, loose sensor jacket, knee braces, bare hands; pale concrete plaza, noon shadows, marker sketch.
c008-p081: >-
  In a stairwell garden, a student reroutes leaking air-conditioner water into tomato pots. Blue hose spirals down ten flights beside hand-painted arrows.
c008-p082: >-
  The public charging tree is crowded after school. Phones, implants, scooters, and one artificial heart connect to glowing branches while teens picnic below.
c008-p083: >-
  A girl paints freckles onto a blank-faced service android before its first day among people. Tiny brush, patient robot posture, warm bakery back room.
c008-p084: >-
  Street-level view of magnetic sneakers walking vertically up a building. The climber carries groceries, skirt hanging sideways, neighbors waving from windows now beneath her.
c008-p085: >-
  A student journalist interviews an escaped billboard model. Both sit on a curb; the luminous avatar flickers in borrowed coat and looks relieved.
c008-p086: >-
  Retro cassette swap under a monorail. Each tape contains neighborhood sounds—rain tanks, kitchens, games, birds—and handmade covers line a folding table.
c008-p087: >-
  A young sanitation crew races before the morning train. Robot brooms, orange skates, trash nets, precise teamwork across an immense tiled platform.
c008-p088: >-
  During smog season, teens embroider replacement sunsets onto window filters. Peach and violet thread glows while the real skyline remains colorless outside.
c008-p089: >-
  An abandoned corporate fountain now irrigates a street orchard. One girl balances on chrome letters to harvest pears above passing scooters.
c008-p090: >-
  Mobile clinic built into an old claw machine. A young nurse reaches through prize hatch with bandages while toy animals watch from upper shelves.
c008-p091: >-
  A robotic fish swims through projected crosswalk light after heavy rain. Schoolchildren guide it toward the river using umbrellas as temporary walls.
c008-p092: >-
  Quiet cyberpunk romance without a couple: two repaired helmets rest together on a balcony rail, their private message lights blinking in alternating rhythm.
c008-p093: >-
  The rooftop choir’s voices power apartment batteries. Teen singers stand among cables and basil pots; charge meters climb with each sustained chord.
c008-p094: >-
  A nonbinary courier swaps a dead navigation implant for a paper map. They unfold it across a noodle counter, astonished by its physical size.
c008-p095: >-
  Daytime festival where hacked maintenance drones carry paper lanterns instead of tools. Children run below their slow formation through concrete courtyards.
c008-p096: >-
  A street mechanic tests an inflatable prosthetic arm by squeezing fruit. Purple sleeve, concentrated face, oranges safe, one unfortunate tomato exploding.
c008-p097: >-
  At midnight, an artificial moon advertisement shuts down. Rooftop teens see real stars for seven seconds and collectively forget their cameras.
c008-p098: >-
  Graphic cross-section of a youth-run neighborhood network: rooftop antenna, laundry-line cables, basement servers, bicycle generator, kitchen radio, every room connected by hand.
c008-p099: >-
  An elderly vendor gives free battery warmth to a shivering stray robot. Steam rises from soup beside them; market shutters close one by one.
c008-p100: >-
  Last bus home. Five exhausted students share one charging cable, heads leaning together beneath soft route lights as the elevated city recedes through scratched windows.

c009-p001: >-
  A court astronomer in deep indigo robes stands beneath a painted ceiling, sleeves embroidered with eclipses. One slipper has come loose during the midnight observation.
c009-p002: >-
  Dressing-room scene before a winter audience: attendants lace a broad queen into silver brocade while she warms bare hands over a plain clay brazier.
c009-p003: >-
  Formal profile of an elderly desert ruler wearing layered white cotton, a turquoise bead veil, and a crown woven from date-palm fiber rather than gold.
c009-p004: >-
  A young page carries the empress’s crimson train across wet courtyard stones. His modest gray uniform disappears beneath fabric reflecting every autumn tree.
c009-p005: >-
  No wearer present. A ceremonial black robe hangs open in a quiet chamber, phoenix embroidery continuing onto the folding screen as if the bird escaped.
c009-p006: >-
  Court portrait of a round-faced child monarch in a collar far too wide, tiny hands gripping the chair, pearl shoes hovering above the floor.
c009-p007: >-
  A palace falconer wears practical leather beneath elaborate green silk. The bird’s wing, her long sleeve, and a windblown banner form three parallel diagonals.
c009-p008: >-
  Ink-and-mineral-color procession: six officials in tall black hats cross a narrow bridge, robes differentiated by cranes, clouds, waves, pines, reeds, and plum blossom.
c009-p009: >-
  The duchess secretly wears riding trousers beneath her rose court gown. One foot on the balcony rail reveals a mud-spattered boot and a conspiratorial smile.
c009-p010: >-
  A gray-haired palace musician adjusts twenty tiny bells sewn into an ochre sleeve. Seated full figure, bare feet, instrument waiting in blue shadow.
c009-p011: >-
  Court attire designed for a penguin ambassador: midnight cape, white chest left uncovered, jeweled collar, embroidered webbed-foot guards, impeccable frontal stance.
c009-p012: >-
  A princess in mourning removes one heavy jet-bead necklace after another. Black layers occupy most of the frame; dawn reaches only her relieved shoulders.
c009-p013: >-
  Full-length fashion plate of a palace courier from a monsoon kingdom—waxed saffron tunic, split riding skirt, high green boots, sealed document belt, broad translucent hat.
c009-p014: >-
  The royal tailor takes measurements while the emperor naps standing up. Gold coat half pinned, attendants stifling laughter, morning light across patterned carpet.
c009-p015: >-
  A court dancer in layered blue gauze pauses before the performance to repair a toe strap. Monumental sleeves pool around an ordinary, concentrated gesture.
c009-p016: >-
  Miniature painting of a moonlit garden audience. The ruler’s ivory robe glows quietly while every noble guest wears a distinct jewel-toned turban and patterned sash.
c009-p017: >-
  An old general attends court in faded campaign armor beneath a new violet mantle. Polished guests blur behind; scratches and repaired straps remain proudly visible.
c009-p018: >-
  A fox prince’s nine tails each carry a different embroidered ribbon signifying rank. His actual robe is plain brown, expression patient during an endless ceremony.
c009-p019: >-
  Close crop on gloved hands fastening a carved wooden brooch at a fur-lined collar. Snowy palace windows and the wearer’s face remain outside the composition.
c009-p020: >-
  Summer court dress for a pregnant queen: breathable layered linen, open sleeves, low jeweled belt, flat sandals. She walks through reed screens carrying state papers.
c009-p021: >-
  A palace gardener has been summoned without time to change. Soil-dark apron covers embroidered formal trousers; one fresh peony is tucked behind his ear.
c009-p022: >-
  Three-quarter portrait of a nonbinary court poet wearing an asymmetric teal coat, pearl forehead chain, ink-stained cuffs, and a sash crowded with tiny handwritten verses.
c009-p023: >-
  Ceremonial clothing for a river spirit consists of transparent robes flowing upward against gravity. Silver fish move inside the sleeves during a treaty signing.
c009-p024: >-
  A young noblewoman practices an official smile before six mirrors. Each reflection shows the same gold gown but a different unsuccessful expression.
c009-p025: >-
  Court hat storage viewed from above: plumes, pearls, folded silk, feather fans, and one sleeping orange cat wearing the smallest coronet.
c009-p026: >-
  A broad palace guard in white lamellar armor receives a ceremonial scarlet cape. She studies its fragile embroidery with more anxiety than any battle.
c009-p027: >-
  Historical dress sketch of an elderly scholar walking in rain—layered hemp robes, black gauze cap, wooden clogs, book case under oil-paper cape.
c009-p028: >-
  The crown princess arrives from sea travel wearing formal pearls over a practical navy coat. Wet braid, salt-stained boots, seasick dignity on marble steps.
c009-p029: >-
  A giraffe courtier bends through three doorways in a high patterned collar and slim brocade coat. Attendants below keep the long hem from snagging.
c009-p030: >-
  Back view of twin royal siblings whose separate capes join into one embroidered map. They walk toward opposite thrones, pulling the landscape gently apart.
c009-p031: >-
  The royal beekeeper’s audience clothes combine a honey-gold gown, structured mesh mantle, black gloves, and a crown with six quiet bees resting on it.
c009-p032: >-
  A court fool off duty sits alone on stone stairs. Bell cap in lap, striped hose, patched velvet, bare tired face turned toward sunrise.
c009-p033: >-
  A mountain king wears no crown, only a tall wool hat, red woven coat, silver chest ornaments, and snow boots. Thin palace air clouds his formal breath.
c009-p034: >-
  Full-body portrait of a wheelchair-using empress in a copper pleated robe tailored around engraved wooden wheels. Long sleeves rest across one hand rim.
c009-p035: >-
  At a spring banquet, an older princess feeds crumbs to sparrows under the table. Elaborate floral skirt conceals the flock; her posture remains officially perfect.
c009-p036: >-
  A palace scribe’s uniform is almost monochrome: cream tunic, ash trousers, white cap. Only the multicolored seals hanging from his belt reveal rank.
c009-p037: >-
  Court portrait painted during a heatwave. Young duke in green velvet attempts composure while attendants fan him and one mastiff sprawls across the cool floor.
c009-p038: >-
  The bride’s ceremonial veil is embroidered with every road to her new home. She holds the map away from her face to study one uncertain fork.
c009-p039: >-
  A ram-headed chancellor wears curled gold horn caps, severe burgundy robes, and tiny spectacles. One hoof points to an overlooked line in the treaty.
c009-p040: >-
  Palace bath attendant in formal audience clothes—simple blue wrap, silver water-drop pins, polished sandals. Steam follows her into the throne room like a cape.
c009-p041: >-
  A child hides inside the hollow train of a monumental coronation robe. Only one eye and a wooden toy sword appear between gold-stitched lions.
c009-p042: >-
  Painted silk screen showing an archer queen at rest. Red riding jacket, black pleated trousers, long bow unstrung, hawk feather caught in her collar.
c009-p043: >-
  An elderly diplomat carries court clothes in a travel chest after the dynasty ends. Plain road cloak, jeweled sleeve visible within, ruined gate behind.
c009-p044: >-
  Dressing a giant takes scaffolding. Tiny tailors pin a dark blue ceremonial sash across a patient stone torso while pigeons occupy the unfinished crown.
c009-p045: >-
  A young courtesan reads beneath layers of plum, coral, and cream silk. The book rests on her broad sleeve; ornate hair remains unfinished and loose.
c009-p046: >-
  Palace winter uniform for a messenger dog: quilted emerald coat, seal pouch, fur-lined boots, red tassel cap. Determined trot through falling snow.
c009-p047: >-
  An official portrait goes wrong when the peacock-feather mantle opens its eyes. The stern magistrate looks sideways as hundreds of blue spots blink.
c009-p048: >-
  A scarred queen receives visiting children in simple white trousers and a sleeveless gold over-robe. She kneels to their height, crown placed on the carpet.
c009-p049: >-
  Court costume rendered as botanical diagram: pomegranate-dyed skirt, flax underlayer, mulberry-silk sleeves, indigo sash, each plant drawn beside the finished garment.
c009-p050: >-
  The prince’s formal collar is a living white swan. It sleeps around his shoulders during council, beak tucked beneath one wing.
c009-p051: >-
  A court physician washes blood from embroidered cuffs before entering the ballroom. Basin reflection, rolled sleeves, quiet face, music indicated by drifting gold notes.
c009-p052: >-
  Full-length portrait of a palace archivist carrying forty keys across layered rust robes. Heavy belt pulls the silhouette sideways as she climbs one step.
c009-p053: >-
  A desert court’s evening procession wears mirrored disks rather than gems. Last sunlight ricochets between white-robed figures walking through blue shadow.
c009-p054: >-
  The young empress has chosen a robe painted by schoolchildren. Crooked suns, purple horses, green faces cover formal silk; courtiers stare while she beams.
c009-p055: >-
  Formal clothing for a merfolk ambassador floats within a portable water sphere: pearl shoulder chains, translucent violet fins, gold ankle rings with no shoes.
c009-p056: >-
  An old palace cook is accidentally awarded nobility. She wears the jeweled red coat over floury work clothes and holds the ceremonial ladle backward.
c009-p057: >-
  Side profile of a queen in a towering black headdress shaped like city walls. Tiny gold windows glow across it as twilight darkens her plain face.
c009-p058: >-
  During a secret lesson, the princess learns to tie her own complicated sash. Diagrams pinned around the mirror; silk everywhere; triumph at one imperfect knot.
c009-p059: >-
  Court portrait of conjoined brothers sharing a single broad crimson robe. Two distinct collars, four sleeves, one embroidered family tree joining at the center.
c009-p060: >-
  A palace cat refuses to move from the emperor’s folded coronation cape. Attendants wait with lint brushes while the animal cleans one paw.
c009-p061: >-
  Historical anime frame: rain catches a young noble running through the market in pale formal layers. Hem gathered high, bare ankle, hair ornaments coming loose.
c009-p062: >-
  A widowed king has replaced every jewel with river stones collected by his children. Gray crown, weathered hands, modest black robe, warm morning portrait.
c009-p063: >-
  The ambassador from a volcanic island wears black glass scales over orange linen. Heat shimmer follows her, gently wilting palace flower arrangements.
c009-p064: >-
  A tailor’s apprentice models the unfinished royal coat because no one else is available. Chalk-marked gold fabric, pinned sleeve, work trousers, nervous posture on dais.
c009-p065: >-
  Formal falcon costume: tiny brocade hood, silver anklets, green chest guard. The bird perches alone before an ancestral mural of human rulers.
c009-p066: >-
  At a midnight council, every official wears sleepwear beneath ceremonial capes. One yawning minister reveals striped pajamas and fuzzy slippers under indigo silk.
c009-p067: >-
  A court dancer’s red skirt contains hidden hand-painted panels visible only during a spin—fish, mountains, storms, and finally a quiet village.
c009-p068: >-
  The young general receives a white feather cloak after victory but wraps it around a shivering stable child. Armor, muddy courtyard, formal observers beyond.
c009-p069: >-
  Portrait of a palace ghost wearing every historical uniform at once. Transparent collars, sleeves, belts, and crowns overlap into a dense chronology around one calm face.
c009-p070: >-
  A turtle minister arrives three days late in impeccable green brocade. Scroll case strapped to shell, tiny square hat, patient attendants asleep beside the council door.
c009-p071: >-
  Courtly riding dress for an older woman: fitted plum jacket, divided gold skirt, black gloves, flat leather boots. She mounts without assistance under spring blossoms.
c009-p072: >-
  A ceremonial robe woven from thin metal rings sounds like rain with every step. The bald priestess walks alone across a silent marble hall.
c009-p073: >-
  The emperor’s official portrait includes his favorite chicken. Blue dragon robe, severe throne, red comb, bird standing proudly on one embroidered shoe.
c009-p074: >-
  A young court translator wears twelve small ear ornaments, each representing a language. Pale gray layers keep attention on the listening profile.
c009-p075: >-
  Folded court garments arranged like a landscape: green robe becomes hills, blue sash a river, pearl pins stars, black hat a distant gate.
c009-p076: >-
  During an eclipse ceremony, the queen’s white cape develops a moving circular shadow. Her face remains illuminated while courtiers kneel around the darkening hem.
c009-p077: >-
  A palace seamstress uses her own body as a mannequin for armor cloth. Brown skin, gray hair, half-finished silver panels, pins held between lips.
c009-p078: >-
  Formal dress for a child from an underwater court: bubble collar, coral-buttoned jacket, pearl shorts, transparent shoes filled with darting minnows.
c009-p079: >-
  An elderly prince has outgrown vanity but not color. Orange turban, striped teal robe, magenta slippers, white beard; relaxed laugh in a rigid portrait chair.
c009-p080: >-
  1woman, court guard, tall, heavy build, brown skin, close curls, burgundy lamellar vest, cream trousers, gold sash, bare sword hand; flat painted archway.
c009-p081: >-
  The winter coronation crown is carved from ice. Attendants carry bowls beneath it while the smiling young ruler’s hair slowly becomes wet.
c009-p082: >-
  A court robe has been turned inside out for repair. Hidden seams, faded maker notes, and bright patches surround the tailor kneeling within its enormous circle.
c009-p083: >-
  A blind queen reads embroidered diplomatic messages with her fingertips. Raised silver thread crosses navy sleeves; one hand pauses over an unexpected joke.
c009-p084: >-
  An equine ambassador wears a long saddlecloth patterned with constellations and bells braided into the mane. Human courtiers appear only as cropped hands offering documents.
c009-p085: >-
  Palace portrait at the edge of revolution: young noble in immaculate cream coat, window open, protest banners reflected across polished buttons.
c009-p086: >-
  A queen and her armor stand separately. She wears simple linen while the empty gold suit bows beside her as a mechanical representative.
c009-p087: >-
  The court botanist’s formal headdress is a living miniature orchard. Tiny branches bloom above her practical face while one ripe pear falls toward the page edge.
c009-p088: >-
  Historical costume study of a messenger crossing a frozen lake—red wool coat, layered skirt-trousers, fur cap, seal tube, iron ice cleats shown in detail.
c009-p089: >-
  A palace librarian uses the ceremonial train as a reading blanket after hours. Gold cloth over bent knees, candle, shelves disappearing into indigo.
c009-p090: >-
  Court attire for a moth duchess: powder-gray wings, black velvet bodice, feathered antenna ornaments, moonstone clasp. She faces a single lamp beyond frame.
c009-p091: >-
  A child king loses one front tooth during the official painting. The portraitist captures his astonished tongue despite horrified ministers and perfect scarlet robes.
c009-p092: >-
  Palace laundry line crossing a private courtyard. Empty sleeves and trousers in royal colors billow like an invisible procession under ordinary sunlight.
c009-p093: >-
  A powerful older empress in a wide green robe demonstrates archery to skeptical courtiers. Silk sleeves tied back with kitchen twine, stance steady.
c009-p094: >-
  Formal portrait of the royal clock keeper wearing a coat sewn with hundreds of tiny watch faces, all displaying different times around one sleepless expression.
c009-p095: >-
  The diplomatic banquet requires blue clothing, so a poor provincial envoy dyes his plain cloak overnight. Uneven indigo hands reveal the effort beneath polished table light.
c009-p096: >-
  A young noble returns from exile in a patched traveling coat over old ceremonial silk. He pauses outside the palace gate, invitation folded but unopened.
c009-p097: >-
  Illustrated inventory of a queen’s winter accessories: fur-lined fan, heated rings, pearl hand warmer, snow spectacles, embroidered boot hooks, each shown beside her bundled silhouette.
c009-p098: >-
  An old court painter has included herself accidentally in a mirror. Tiny figure in plain brown dress contrasts with the monumental jeweled family she records.
c009-p099: >-
  A peasant ambassador wears borrowed court clothes over muscular farm shoulders. Sleeves too narrow, boots too soft, posture dignified, wheat seed caught in the collar.
c009-p100: >-
  After the last ceremony, crown and embroidered robe lie on a wooden bench. The ruler has walked barefoot into the garden, visible only as a small white figure among trees.

c010-p001: >-
  Before anyone arrives, morning sun crosses thirty empty desks and one forgotten red mitten. Chalk dust hangs above yesterday’s unfinished equation.
c010-p002: >-
  A new student follows the wrong uniformed crowd and ends up in marching-band rehearsal. Backpack, indoor shoes, stunned face, brass instruments rising around her.
c010-p003: >-
  Rain cancels sports day, so children race handmade paper boats along the flooded track. Umbrellas become colorful spectator stands under gray school walls.
c010-p004: >-
  Adult literacy class at night: a mechanic traces the first line of a poem with one grease-marked finger while coworkers quietly read beside him.
c010-p005: >-
  A corgi hall monitor wears an orange sash and carries late slips in a mouth pouch. One stern eyebrow confronts two muddy shoeprints.
c010-p006: >-
  During chemistry lab, the quietest student’s experiment grows a tiny cloud. It rains only over her notebook while everyone leans closer.
c010-p007: >-
  The classroom aquarium has escaped. Wet gravel, open lid, trail of water through the doorway; students crawl beneath desks searching for an ambitious octopus.
c010-p008: >-
  Lunch on the roof with no faces shown: crossed legs, shared rice, orange peels, sketchbook, hearing-device case, shadows touching across warm concrete.
c010-p009: >-
  A teenage welder lifts her mask to inspect the first clean seam. Blue sparks fade around proud eyes; workshop classmates remain behind safety curtains.
c010-p010: >-
  School photograph for an alien exchange student whose body changes color with nerves. Formal gray backdrop cannot hide waves of pink, teal, and yellow.
c010-p011: >-
  Two children discover their snow-day announcement was wrong. They stand alone at the gate in heavy coats, thermoses packed, immaculate white playground beyond.
c010-p012: >-
  A blind student maps the old campus through raised clay tiles. Classmates press miniature trees, stairs, and railings into place around her exploring hands.
c010-p013: >-
  Music practice after sunset: one trombone slide extends through an open window, accidentally lifting the hat of a passing cyclist below.
c010-p014: >-
  A small ghost attends history class and recognizes herself in the textbook. Transparent hand raised, page open, teacher suddenly speechless.
c010-p015: >-
  The art teacher poses a dented kettle instead of flowers. Twenty radically different painted versions cover easels while the real object reflects the entire room.
c010-p016: >-
  A broad-shouldered girl repairs her wheelchair tire during recess. Friends hold tools and snacks; jump-rope shadows cross the sunlit ground.
c010-p017: >-
  One classroom belongs to moth children. Lamps replace windows, powdery wings fold behind desks, and the teacher writes nocturnal constellations on black paper.
c010-p018: >-
  A student falls asleep in the library and wakes with tiny handwritten notes braided through his hair. No one admits responsibility.
c010-p019: >-
  Agricultural school exam: identify seedlings by touch while blindfolded. Muddy greenhouse, concentrated hands, one goat attempting to eat the answer row.
c010-p020: >-
  The substitute teacher is a retired dragon. Reading glasses balance on the snout; smoke curls from one nostril whenever spelling goes wrong.
c010-p021: >-
  Under the gym bleachers, two rival captains quietly mend the same torn team banner. Needles, tape, bruised knees, muffled cheers above.
c010-p022: >-
  A shy child presents a volcano model that produces real snow instead. White flakes fill the classroom while the cardboard mountain remains bright red.
c010-p023: >-
  Early-morning bus interior: sleeping students tilt in different directions, instrument cases and sports bags fill the aisle, sunrise flickers through trees.
c010-p024: >-
  Flat-color poster for bicycle safety class. Tiny frog students in helmets practice hand signals on leaf-shaped bikes across a chalk garden course.
c010-p025: >-
  A teenager reads beneath a desk during mathematics. The hidden fantasy book projects a miniature blue forest across her shoes and the teacher’s approaching shadow.
c010-p026: >-
  School cafeteria worker remembers every child’s favorite fruit. She slides a pear toward one anxious new face amid trays, steam, and noon noise.
c010-p027: >-
  Empty classroom during a thunderstorm. Curtains blow horizontally, papers escape an open window, and a model skeleton appears to hold its hat.
c010-p028: >-
  A young mechanic attends remote lessons from inside a giant robot’s knee. Tablet balanced on wiring, pencil behind ear, city repair visible through open armor.
c010-p029: >-
  The class pet is a cloud in a glass terrarium. Two children feed it mist with spray bottles; a tiny rainbow forms against the lid.
c010-p030: >-
  Formal debate club collapses when the podium rolls away. The speaker pursues it down a ramp without losing her argument or raised hand.
c010-p031: >-
  A deaf drummer leads morning assembly through floor vibrations. Bare hands, bright sticks, students feeling the rhythm through polished wood.
c010-p032: >-
  At recess, an elderly student in a community language course trades snacks with a seven-year-old from the neighboring classroom. Both label foods for each other.
c010-p033: >-
  Sewing-class close-up: nervous boy guides floral cloth beneath the machine while his first crooked seam becomes unexpectedly beautiful.
c010-p034: >-
  A fox student waits outside the principal’s office, tail betraying every emotion. Muddy soccer ball, bitten permission slip, polished corridor.
c010-p035: >-
  The astronomy club cannot see stars, so they map reflections in city windows. Rooftop tripods point sideways toward a dark glass tower.
c010-p036: >-
  After a paint fight, students must clean the studio. Multicolored mop water, exhausted laughter, one untouched white uniform standing bewildered at the door.
c010-p037: >-
  A tiny giant attends an ordinary school after a growth spell. Desk strapped to shoulders like a tray, classmates seated around one enormous ankle.
c010-p038: >-
  Lunchbox still life tells the story: rice face squashed, note from home, broken chopstick, traded cookie, one ladybug investigating the orange slice.
c010-p039: >-
  Two friends practice signing beneath the stairwell, hands illuminated by sun stripes. Their spoken-language classmates pass as soft motion outside the quiet alcove.
c010-p040: >-
  Woodshop instructor demonstrates a hand plane. Long curl rises from cedar like ribbon, safety-goggled students reflected along the polished blade.
c010-p041: >-
  A robot child’s first pencil drawing uses too much pressure and tears the paper. Metal fingers freeze; teacher offers thicker charcoal from beyond frame.
c010-p042: >-
  School nurse treating a scraped dragon knee. Scale tweezers, enormous bandage roll, patient smoke rings, children peering around the doorway.
c010-p043: >-
  A student brings an umbrella to class on a clear day because a private raincloud follows him. Small puddle under desk, dry books protected overhead.
c010-p044: >-
  In the corridor display case, trophies have been replaced by repaired objects: mended chair, fixed radio, patched kite, each labeled with the student team.
c010-p045: >-
  A girl with four arms attempts synchronized handwriting practice. Each hand develops a different personality across four lined notebooks.
c010-p046: >-
  The class observes a solar eclipse through colanders, leaves, pinholes, and one cracked biscuit. Crescent shadows scatter across delighted uniforms.
c010-p047: >-
  Night-school culinary exam during a power failure. Headlamps illuminate dough, older students knead by feel, ovens remain warm in the dark.
c010-p048: >-
  A homesick exchange student opens her locker to find it filled with folded paper versions of local birds made by anonymous classmates.
c010-p049: >-
  Playground after rain with no people. Swings drip, hopscotch chalk dissolves, one red ball rests inside a perfect mirror puddle.
c010-p050: >-
  A young centaur learns to navigate stairs using a new lift. Friends ride beside her, school bags piled high, triumphant arrival at the library floor.
c010-p051: >-
  Biology lesson held in a tide pool. Rolled trousers, magnifying jars, windblown worksheets; an octopus quietly steals the teacher’s red pen.
c010-p052: >-
  The strict principal secretly practices dance in an empty gym. Formal shoes beside sneakers, gray suit jacket flying, basketball hoops in afternoon shadow.
c010-p053: >-
  A child’s presentation consists entirely of one enormous leaf. She stands behind it, visible through insect holes, while classmates lean forward.
c010-p054: >-
  School garden harvest carried through halls: baskets of purple carrots, muddy gloves, trailing vines, beetle passengers, proud students ignoring polished floors.
c010-p055: >-
  An anxious student tests a handmade hearing device during choir. Sound appears as warm colored bands; her expression changes when individual voices separate.
c010-p056: >-
  Four-panel comic: late student runs to class, shoe breaks, custodian repairs it, both arrive wearing matching improvised tape laces.
c010-p057: >-
  Classroom for young merfolk held inside a public pool. Waterproof slates, floating desks, teacher’s tail curling around a submerged globe.
c010-p058: >-
  During a fire drill, one rabbit child rescues the class plant. Yellow vest, pot held overhead, orderly line across cold morning pavement.
c010-p059: >-
  A vocational class rebuilds a wind turbine blade inside the hangar. Students appear tiny along its white curve, paint marks and tools forming a diagram.
c010-p060: >-
  The new uniform rule permits one personal alteration. Show thirty backs leaving assembly, each collar, patch, braid, pin, and stitch telling a different story.
c010-p061: >-
  A child writes the wrong answer with such beautiful calligraphy that the teacher hesitates. Red pen above sweeping black ink, both hands visible.
c010-p062: >-
  School sports field shared with migrating cranes. Practice pauses as white birds land among cones; goalkeeper lowers the ball in silence.
c010-p063: >-
  A teenage baker delivers breakfast to an early exam. Paper bag fogs the classroom window, nervous classmates reach for warm rolls.
c010-p064: >-
  Philosophy class taught by an old tortoise beneath a tree. Students have grown up and returned with children; the teacher is midway through one sentence.
c010-p065: >-
  An empty art locker has become a tiny mouse academy. Chalkboard matchbox, bottle-cap desks, pencil-shaving maps, lesson interrupted by opening door.
c010-p066: >-
  The school’s oldest computer wakes during cleanup. Green text greets a former student now teaching, whose reflection appears beside her younger yearbook portrait.
c010-p067: >-
  Costume workshop before the play: armor made from cereal boxes, dyed sheets, cardboard crowns. One serious child tests a tape-hinged dragon wing.
c010-p068: >-
  A student with albinism paints the sun from beneath a broad shade canopy. Warm yellow canvas, cool blue skin shadow, classmates scattered across grass.
c010-p069: >-
  Noon detention turns into origami lesson when the teacher folds the warning notice. Paper cranes multiply across desks; stern expressions soften.
c010-p070: >-
  A goat eats the attendance sheet during rural school assembly. Teacher lunges, children point, flag continues rising with complete ceremonial dignity.
c010-p071: >-
  Chemistry notebook shown as an illustrated landscape: formulas become rivers, molecule diagrams mountains, margin doodle student hiking through unfinished homework.
c010-p072: >-
  A wheelchair user and friend test a homemade desk ramp for the class hamster. Both cheer as tiny wheels descend successfully.
c010-p073: >-
  In heavy snow, school remains open for one child who walked there. Teacher and student build the whole day around hot tea and one shared book.
c010-p074: >-
  A young alien practices facial expressions using library flashcards. Six eyes attempt “surprised” while the librarian demonstrates patiently.
c010-p075: >-
  The soccer team launders muddy uniforms in the science lab after hours. Beakers measure soap, jerseys hang from gas taps, goalkeeper guards the door.
c010-p076: >-
  Pen-and-watercolor portrait of a retired carpenter attending drawing class: broad hands, tiny pencil, bifocals, first self-portrait taped proudly behind him.
c010-p077: >-
  The class snowman has enrolled. Scarf, backpack, pebble buttons, bucket beneath chair collecting meltwater as spring sunlight advances.
c010-p078: >-
  Hallway race filmed from floor height: indoor shoes, socks, dropped papers, one rolling apple, teacher’s slippers approaching around the corner.
c010-p079: >-
  A student uses augmented glasses to translate the blackboard, but the device labels everything as types of soup. Confusion spreads across her notes.
c010-p080: >-
  1girl, school workshop, brown skin, long braid, green coveralls, safety visor raised, welding gloves, prosthetic left foot; relaxed full-body chalk study.
c010-p081: >-
  At graduation rehearsal, caps fly too early and become trapped in a flowering tree. Formal lines dissolve into ladders, laughter, and improvised climbing.
c010-p082: >-
  A tiny thunder god struggles in meteorology class. Personal cloud hides the chart while classmates offer fans, towels, and encouraging notes.
c010-p083: >-
  School kitchen garden at dawn, no students yet. Automatic sprinklers arc over labeled beds; one scarecrow wears yesterday’s forgotten graduation gown.
c010-p084: >-
  A boy reads aloud to the class pet snake. The animal coils into punctuation shapes around his trembling arm as confidence grows.
c010-p085: >-
  The library book return becomes a portal for exactly one minute. Students and librarian hold a rope around one brave hand reaching into blue wind.
c010-p086: >-
  Fashion-design exam using only discarded umbrellas. Ribs become skirts, translucent panels become sleeves, rain still dripping across runway desks.
c010-p087: >-
  A young boxer teaches gentle stretching to the poetry club after both rooms are double-booked. Gloves beside notebooks, mixed group following awkwardly.
c010-p088: >-
  Portrait day catches the janitor reflected in every polished trophy. Students pose formally; her small repeated figure keeps working behind them.
c010-p089: >-
  A robot teacher learns that stickers improve motivation. By afternoon, its entire metal chest is covered in stars given back by delighted children.
c010-p090: >-
  Outdoor mathematics uses shadows to measure trees. Children hold strings and rulers while one impatient dog disrupts every triangle.
c010-p091: >-
  After final exams, handwritten formulas are washed from classroom windows. Soap turns equations into white rivers over a bright summer courtyard.
c010-p092: >-
  A shy drummer practices on stacked textbooks in an empty music room. Dust jumps with every beat; sunset bars move across the improvised kit.
c010-p093: >-
  School infirmary during festival day: costume wings, masks, tails, and one papier-mâché moon crowd around a child with a simple bandaged ankle.
c010-p094: >-
  A raven student trades shiny answers for lunch snacks until the teacher asks for reasoning. Black feathers puff; stolen notes scatter across desk.
c010-p095: >-
  Classroom lights reflected in a student’s dark window after everyone leaves. Her hand erases the board slowly while city evening appears beneath chalk.
c010-p096: >-
  A child brings grandparents for family-history day; three generations compare identical ears, different uniforms, old photographs, and one shared nervous smile.
c010-p097: >-
  The horticulture class grows chairs from willow. Half-living furniture, woven branches, green leaves; students sit carefully to test the first finished seat.
c010-p098: >-
  School crossing guarded by a gentle stone giant. Children tie bright safety flags around one finger while traffic waits beneath his outstretched arm.
c010-p099: >-
  A late-afternoon classroom becomes an ocean through projected light. Empty desks lie under moving blue waves; one child stays to watch paper fish cross the ceiling.
c010-p100: >-
  Last day before vacation: windows open, curtains breathing, cleaned desks, stacked chairs, one handwritten promise on the board—SEE YOU WHEN THE CICADAS STOP.

c011-p001: >-
  Early kitchen with nobody awake: rice cooker breathing steam, two chipped bowls warming beside it, rain tracing the dark window above a sleeping herb pot.
c011-p002: >-
  A grandmother and teenage grandson untangle yarn together on the floor. Orange cat occupies the impossible central knot while both pretend this is helpful.
c011-p003: >-
  Tiny mouse apartment inside a wall clock. Matchbox bed, thimble stove, family socks drying between gears, pendulum passing through the breakfast room.
c011-p004: >-
  After the night shift, a woman eats toast over the sink in wool socks. Dawn finds the one clean corner of her crowded studio.
c011-p005: >-
  A capybara family soaks in a tiled bath with yuzu floating around them. Folded towels, fogged mirror, one infant asleep on its mother’s head.
c011-p006: >-
  Warm overhead view of a mended quilt covering three generations on the sofa. Only feet, hands, tea cups, and one page-turning arm emerge.
c011-p007: >-
  The household robot learns to peel an orange. Metal fingertips, curling rind, intensely focused display face, elderly owner guiding from beyond the crop.
c011-p008: >-
  An empty bedroom during afternoon wind: unmade blue sheets, open sketchbook, striped curtain billowing inward, mobile planets rotating above a narrow bed.
c011-p009: >-
  A large troll sits cross-legged at a tiny sewing machine, hemming curtains for his cottage. Floral fabric spills through the doorway into snow.
c011-p010: >-
  Domestic portrait of two roommates dyeing each other’s hair over the bathtub. Green gloves, purple foam, old towels, laughing reflections blurred by steam.
c011-p011: >-
  The fox child has built a blanket fort under the dining table. Flashlight stars cover the ceiling; adult paws leave sliced apples at the entrance.
c011-p012: >-
  No humans: slippers aligned by the door, wet umbrellas dripping into a blue bucket, grocery receipt on the floor, apartment light waiting beyond.
c011-p013: >-
  A retired knight washes dishes while still wearing one armored gauntlet. Soap bubbles cluster over steel; his granddaughter dries plates in a paper crown.
c011-p014: >-
  Winter morning in a one-room house. An elderly man darns red socks beside the stove while five hens watch through the open doorway.
c011-p015: >-
  A jellyfish family lives in hanging glass lamps. They pulse softly over dinner, tentacles passing bowls between spheres without spilling seawater.
c011-p016: >-
  Close domestic still life: half-squeezed toothpaste, small and large toothbrushes, hearing aids charging in a shell dish, first sunlight across green tile.
c011-p017: >-
  A young father learns to braid his daughter’s cloud hair. Vapor escapes every elastic and gathers as a tiny storm above the bathroom mirror.
c011-p018: >-
  Sunday laundry in a rooftop apartment: broad woman hangs white sheets, prosthetic arm holding clothespin basket, pigeons stepping through warm rectangles of light.
c011-p019: >-
  The dragon uses one claw to turn a fragile storybook page. Child asleep against the scaled belly, fireplace reduced to a gentle orange strip.
c011-p020: >-
  A narrow hallway crowded by framed family portraits, each figure older toward the kitchen. Present-day twins run through carrying a birthday cake together.
c011-p021: >-
  Quiet illustration of an old dog waiting beside the oven. Bread rises behind glass; one gray muzzle rests on folded paws beneath the warm indicator light.
c011-p022: >-
  A tiny witch repairs socks by animating needles, but they form a union. She negotiates at the kitchen table while unfinished laundry listens.
c011-p023: >-
  Household altar at blue dawn: fruit, photograph, fresh water, one toy train, incense thread curling around a child’s careful hands.
c011-p024: >-
  An adult mermaid lives in a bathtub apartment. She reads beneath hanging plants, tail curled around a breakfast tray, shower curtain painted like open sea.
c011-p025: >-
  The power fails during dinner. Family faces vanish, but soup steam, candle, reflective spoons, and joined hands create a small golden island.
c011-p026: >-
  A rabbit baker naps at the table while dough continues rising around one floury cheek. Kitchen timer, carrot-patterned apron, quiet noon.
c011-p027: >-
  View from inside a refrigerator: teenager in pajamas searching for leftovers, blue light, sleepy eyes, cat reaching upward from below.
c011-p028: >-
  An old apartment radiator becomes a winter clothesline. Mittens, orange peels, damp scarf, and a lizard stretched luxuriously along the warm pipe.
c011-p029: >-
  Two women assemble flat-pack furniture without instructions. One holds a mysterious extra plank; the other studies a table already leaning sideways.
c011-p030: >-
  The bonsai gardener eats breakfast beside a tree older than the building. Toast crumbs, tiny pruning shears, pale sun, city roofs through thin curtains.
c011-p031: >-
  A bear family’s narrow kitchen has paw-worn cabinets and enormous honey jars. One cub stands on three cookbooks to wash a spoon.
c011-p032: >-
  Domestic scene in paper collage: striped sofa, green wall, red lamp, curled-up reader, sleeping dog, angular shadows, no faces necessary.
c011-p033: >-
  After moving in, an older couple eats noodles from boxes amid unopened crates. One framed moon picture is already hung perfectly level.
c011-p034: >-
  The young mechanic cleans her prosthetic foot at the entryway while rain ticks on metal. Slippers wait, kettle whistles, muddy work boot drips nearby.
c011-p035: >-
  A ghost keeps folding the same towel incorrectly. Morning bathroom, translucent hands, patient living roommate demonstrating corners for the hundredth time.
c011-p036: >-
  Empty nursery before the child arrives: assembled crib, yellow moon lamp, stacked cloth animals, one unfinished wall star penciled but unpainted.
c011-p037: >-
  A crow household decorates its mantle with keys, foil, buttons, and one wedding photograph. Black wings arrange every treasure by brightness.
c011-p038: >-
  Close on an elderly hand teaching a younger hand to crimp dumpling edges. Flour lines, green filling, mismatched nail polish, bamboo board.
c011-p039: >-
  The apartment’s tiny balcony holds an impossible orchard. A child waters miniature pear trees while city traffic glows far below.
c011-p040: >-
  A night-shift nurse sleeps through vacuuming. Robot cleaner gently routes around blanket, tea cup, and one bare foot hanging from the sofa.
c011-p041: >-
  Winter dinner for a centaur family requires a very low table. Steam rises between four folded legs, knitted blankets, and shared red bowls.
c011-p042: >-
  The cat has claimed the freshly ironed uniform. A student stands in underwear, iron still steaming, negotiation clearly unsuccessful.
c011-p043: >-
  A young man paints his grandmother’s nails at the sunlit kitchen table. Her powerful weathered hands hold still above newspaper and peeled tangerines.
c011-p044: >-
  Rainy-window still life with no subject: open novel face-down, round glasses, cooling tea, sprig of rosemary in a bottle, wool chair cushion indented.
c011-p045: >-
  A snow spirit visits a heated apartment and begins melting. Friends improvise a basin, fan, ice packs, and one oversized beach umbrella indoors.
c011-p046: >-
  The family portrait is taken by timer. Everyone runs into place except the turtle grandfather, still halfway across the rug with calm determination.
c011-p047: >-
  Morning hair routine for a horned child. Parent threads ribbons around each branch while cereal grows soggy and school clock advances.
c011-p048: >-
  A broad older woman stretches beside a sunny bed, flowered pajamas, gray braid, one knee brace, sleepy orange dog copying every pose.
c011-p049: >-
  Interior of a submarine home after work. Boots at the hatch, kettle magnetic to stove, porthole fish, damp coats, socks floating near ceiling.
c011-p050: >-
  A family of sentient candles shares one saucer for the night. Different flame colors, pooled wax blankets, matchbox books stacked nearby.
c011-p051: >-
  The child has decorated a robot parent with temporary tattoos. Metal arms now carry flowers, dinosaurs, stars, and one crooked heart over the battery panel.
c011-p052: >-
  Tiny domestic disaster: soup boils over while two roommates video-call a recipe expert. Steam obscures screen; houseplant leans away from the stove.
c011-p053: >-
  At dusk, an elderly vampire opens every curtain because the light is finally safe. Dust becomes gold around plain furniture and delighted pale hands.
c011-p054: >-
  A fox mother repairs school uniforms beside an open window. Three tails hold thread spools while the fourth child sleeps under the fabric pile.
c011-p055: >-
  Apartment entry cutaway: mail slot, shoe rack, umbrella, key bowl, bicycle wheel, dog leash, wall marks recording twelve years of growing children.
c011-p056: >-
  A young woman with albinism waters plants by moonlight to protect her skin. White leaves, blue room, dark watering can, city stars.
c011-p057: >-
  The giant’s cottage ceiling is too low. He cooks breakfast seated on the floor, knees framing stove, tiny yellow apron tied around one wrist.
c011-p058: >-
  A robot dog dreams while charging. Small projected rabbits run across the wall; sleeping child curls beside the warm metal body.
c011-p059: >-
  Sunday mending circle in the courtyard: neighbors patch coats, nets, toys, and one umbrella while shared tea occupies the center.
c011-p060: >-
  No people appear in the family kitchen, only four lunches labeled in different handwriting, shoes by the door, and sunrise alarm blinking.
c011-p061: >-
  A teenage witch hides spell ingredients among ordinary pantry jars. Moon dust beside flour, dragon salt beside sugar, familiar asleep in bread basket.
c011-p062: >-
  Domestic portrait of an older trans man shaving at a fogged mirror. Soft morning robe, silver scars, one careful line cleared through condensation.
c011-p063: >-
  A small whale lives in the apartment ceiling like a blue cloud. Family hangs laundry beneath its drifting belly; droplets feed floor plants.
c011-p064: >-
  The toddler refuses socks. Parent, grandparent, and patient dog each hold one escaped striped sock around a sunny nursery.
c011-p065: >-
  Night reading beneath a quilt with a flashlight. Only two eyes, book pages, crumbs, and the pointed ear of a secret cat are illuminated.
c011-p066: >-
  A retired astronaut keeps houseplants in old helmets. She trims basil inside one visor while making tea in a compact apartment kitchen.
c011-p067: >-
  The household’s one magical object is a rug that shakes off dust itself. Everyone lifts feet as it ripples proudly through Saturday cleaning.
c011-p068: >-
  An elderly couple practices ballroom steps between sofa and dining table. Slippers glide, radio glows, framed photographs watch from crowded shelves.
c011-p069: >-
  A salamander child dries wet mittens by hugging them. Warm orange body under oversized sweater, puddle, patient parent holding cocoa.
c011-p070: >-
  Empty living room after a party: paper garland sagging, cushions everywhere, half cake, sleeping balloons, first pale morning line under curtains.
c011-p071: >-
  A one-handed baker teaches his daughter to tie an apron using teeth, elbow, and laughter. Floury kitchen, bread cooling behind.
c011-p072: >-
  The old cat knows exactly where winter sunlight lands. Show its route through three warm rectangles across the apartment, ending on folded laundry.
c011-p073: >-
  A family of tree spirits eats soup from wooden bowls without a table. Roots intertwine beneath moss floor; fireflies provide gentle ceiling light.
c011-p074: >-
  At midnight, a student calls home from the hallway to avoid waking roommates. Blanket over shoulders, vending tea, quiet smile at the phone.
c011-p075: >-
  Rain leaks into one bucket beside the bed. Instead of frustration, two siblings float paper boats in it under a patched ceiling.
c011-p076: >-
  A mermaid grandmother knits waterproof socks for her human grandchildren. Yarn floats in an aquarium parlor; needles move above a powerful green tail.
c011-p077: >-
  The refrigerator door displays a household history: drawings, bills, photo strips, medicine schedule, takeout menus, dried leaf, magnet missing one letter.
c011-p078: >-
  A gentle minotaur folds fitted sheets perfectly. Laundry room, horn-friendly headphones, neat stacks, tiny human roommate staring in awe.
c011-p079: >-
  Flat-color bedtime scene: brown-skinned child, yellow pajamas, prosthetic arm on charging stand, purple moon outside, one storybook still open.
c011-p080: >-
  A widow cooks her late partner’s soup from memory. Empty second chair, worn recipe card turned face down, kitchen filling with familiar steam.
c011-p081: >-
  The family’s pet cloud refuses a bath. It hides under the ceiling, raining lightly while children approach with towels and rubber ducks.
c011-p082: >-
  Tiny balcony breakfast above a vast city. One chair, one person, one pigeon, sliced pear, folded newspaper, millions of windows kept unfocused.
c011-p083: >-
  A young father repairs a toy train after bedtime. Magnifying glasses, kitchen table, sleeping child’s hand visible around the doorway edge.
c011-p084: >-
  Domestic life inside a giant hollow pumpkin: curved orange walls, seed-shaped windows, leaf rugs, mouse family baking bread near the stem chimney.
c011-p085: >-
  An older woman irons a funeral shirt while watching comedy. Tears and laughter coexist; television light blue, iron steam warm, room otherwise quiet.
c011-p086: >-
  A robot and houseplant have traded places for sunlight. Metal body stands in the window holding pot overhead; chair waits beneath leaves.
c011-p087: >-
  Four roommates label leftovers with increasingly dramatic warnings. Refrigerator shelf resembles a diplomatic border, except one raccoon ignores every sign.
c011-p088: >-
  A schoolchild polishes grandfather’s old boots for a ceremony. Small hands, huge black leather, newspaper floor, elderly feet resting nearby in slippers.
c011-p089: >-
  The bath is too full of bubbles to locate anyone. Three hair tops, one rubber submarine, a dog’s nose, and a reaching hand break white foam.
c011-p090: >-
  A blind woman organizes spices by textured lids. Close kitchen shelf, fingertips moving confidently, colored powders glowing under afternoon sun.
c011-p091: >-
  Snow piles against a cottage door from outside. Through the window: soup, socks, sleeping fox, book, and two people playing cards by stove light.
c011-p092: >-
  The old android has begun forgetting recipes. Its granddaughter writes measurements directly onto metal forearms while both prepare dumplings.
c011-p093: >-
  Houseboat morning seen through cutaway walls: one person asleep, one making coffee, plants tilting, laundry overhead, river fish beneath floorboards.
c011-p094: >-
  A child trims an enormous sheep inside the living room. Wool fills furniture like snowdrifts; the sheep’s face remains serene above the mess.
c011-p095: >-
  Evening medicine ritual without sadness: patterned pill organizer, sliced apple, warm lamp, cheerful radio, older hands dancing briefly before sitting.
c011-p096: >-
  1woman, cozy apartment, muscular build, dark skin, gray tank top, plaid pajama pants, fuzzy socks, watering one stubborn cactus; loose marker and peach light.
c011-p097: >-
  A bat family begins breakfast at sunset. Fruit bowls, upside-down chairs, school bags hanging from ceiling hooks, orange sky below the window.
c011-p098: >-
  The room has been cleaned except for one fortress of boxes left for the cats. Two cardboard windows glow with watchful green eyes.
c011-p099: >-
  Quiet portrait of a man learning to cook alone: open video recipe, chopped onion, apron tied wrong, smoke alarm covered with a towel.
c011-p100: >-
  End with a dark apartment facade. One by one, windows warm; silhouettes cook, stretch, argue, feed pets, water plants, and pull curtains for the night.

c012-p001: >-
  A bridge inspector hangs beneath a vast red span, tapping one rivet while morning traffic passes unaware above her silver helmet.
c012-p002: >-
  Night librarian drives a tiny lift between towering shelves. Green lamp, return cart, gray braid, one owl patron waiting on the top floor.
c012-p003: >-
  A deaf emergency dispatcher reads vibration patterns across a blue console, hands poised, calm face reflected in dozens of city call lights.
c012-p004: >-
  The municipal tree surgeon is a sturdy squirrel in orange coveralls. Rope harness, tiny saw, clipboard, enormous old elm treated with grave respect.
c012-p005: >-
  Close on a watch repairer testing a spring. Magnifier, steady dark fingers, pale workbench; the tiny coil casts a shadow like a spiral staircase.
c012-p006: >-
  A school custodian paints over scuffs after everyone leaves. Roller, radio, moonlit corridor, one preserved child-height handprint carefully outlined instead.
c012-p007: >-
  Portrait of a forensic botanist sorting seeds from a flooded suitcase. White gloves, tired eyes, stainless table, green evidence growing despite disaster.
c012-p008: >-
  A pregnant ferry mechanic works beneath the engine in a rolling seat. Copper tools, protective belly pad, river light shaking across the oily ceiling.
c012-p009: >-
  No workers visible inside the bakery before dawn. Mixers turn, dough rests, oven lights glow, and flour footprints stop at an open back door.
c012-p010: >-
  Mountain mail carrier skis downhill with three insulated bags and a red flag. Long braid, snow goggles, one letter held above powder spray.
c012-p011: >-
  An octopus court stenographer transcribes eight speakers simultaneously. Ink pots circle the desk; each tentacle uses a distinct handwriting style.
c012-p012: >-
  The night-shift veterinarian examines a hedgehog no bigger than her palm. Huge empty clinic, mint scrubs, magnifying lamp, patient breathing.
c012-p013: >-
  City gardener replaces dead median flowers under harsh noon. Reflective vest, prosthetic hand, hose, buses streaking behind tender new roots.
c012-p014: >-
  A weathered fisher repairs nets beside an office tower lobby aquarium. Work clothes and corporate marble meet through the transparent blue wall.
c012-p015: >-
  Character sheet for a volcano guide: heat cloak, gas meter, spare masks, rope, red helmet, water pack, ash gaiters, emergency whistle.
c012-p016: >-
  The accountant is a dragon who hoards perfectly balanced ledgers instead of gold. Tiny spectacles, green visor, claws on calculator, immaculate receipt mountains.
c012-p017: >-
  A locksmith opens a door forgotten for a century. Ear pressed to brass mechanism, gray suit dusty, warm forest light appearing through the first crack.
c012-p018: >-
  Overhead image of a pastry team assembling one enormous wedding cake. Ladders, piping bags, sugar flowers, hands at different levels, no faces needed.
c012-p019: >-
  A wheelchair-using news photographer crosses wet pavement backward, camera raised, silver wheel rims reflecting protest banners outside the crop.
c012-p020: >-
  A young sign painter letters the final curve from a scaffold. White overalls, red brush, blue storefront, afternoon shadow hiding most of the word.
c012-p021: >-
  The public pool lifeguard is a seal in yellow sunglasses. Whistle, rescue float, impeccable posture, one flipper pointing sternly at a running child.
c012-p022: >-
  A rural midwife rides home after sunrise on a tired bicycle. Empty medical bag, muddy skirt, wildflowers, relieved shoulders beneath a faded coat.
c012-p023: >-
  Subterranean train engineer listens to rails with a brass horn. Mole face, navy cap, warm tunnel lamps, distant vibration shown as orange rings.
c012-p024: >-
  A projectionist repairs torn film during the screening. Hands splice frames under red light while moving ocean images cross his white shirt.
c012-p025: >-
  Full-body portrait of a sanitation worker wearing ceremonial-looking reflective gear at blue dawn. Broom becomes a silver diagonal across an empty plaza.
c012-p026: >-
  A nurse teaches an elderly robot to use a cane. Hospital garden, metal knees, patient arm, matching cautious steps along yellow tactile paving.
c012-p027: >-
  The lighthouse lens cleaner stands inside concentric glass rings. Cloth, harness, orange coveralls; ocean fractured into hundreds of small horizons.
c012-p028: >-
  A blacksmith shoeing a centaur client works at waist height. Red sparks, lifted hoof, polite conversation, apprentice holding an enormous tea cup.
c012-p029: >-
  Portrait of a glacier researcher drilling a core in whiteout. Only blue parka, red auger, and dark sample cylinders remain visible against snow.
c012-p030: >-
  The museum guard practices sketching after closing. Uniform cap beside notebook, dinosaur skeleton posing overhead, one security camera angled toward the drawing.
c012-p031: >-
  A frog traffic engineer tests a miniature intersection on a desk. Toy cars, timed lights, rolled plans, one webbed hand stopping gridlock.
c012-p032: >-
  During harvest, an older combine operator eats lunch in the open cab. Wheat to horizon, thermos, boots, dust, mechanical shadow cooling one small rectangle.
c012-p033: >-
  The costume dresser has thirty seconds to replace a broken clasp. Teeth hold pins, actor’s jeweled back fills frame, backstage hands converge.
c012-p034: >-
  A harbor diver welds below a ship at night. White arc illuminates bubbles, barnacles, gloved profile, and chains disappearing into black water.
c012-p035: >-
  Flat-color portrait of a female bus driver on break: broad shoulders, plum uniform, bare feet on dashboard, orange peeled in one spiral.
c012-p036: >-
  A crane operator guides steel through fog from a glass cabin above the city. Thermos, family photo, gloved hand, cable vanishing downward.
c012-p037: >-
  The professional dream archivist labels a jar while its contents try to escape. Purple smoke hands, neat shelves, unimpressed white coat.
c012-p038: >-
  A young barber cuts an elderly giant’s hair from a moving scaffold. Silver locks fall like ropes across the sunlit town square.
c012-p039: >-
  Freight clerk at a lunar warehouse checks crates of blue fruit. Magnetic boots, paper manifest, Earth small through the loading-bay window.
c012-p040: >-
  Two carpenters test a newly built chair. One sits, one watches the joint, sawdust floats; their expressions become relieved simultaneously.
c012-p041: >-
  An animal-control officer persuades a baby griffin out of a chimney. Thick gloves, soot, fish treat, enormous worried wings filling the kitchen.
c012-p042: >-
  The village dentist treats a crocodile outdoors. Folding chair, mirror on long handle, assistants holding jaws, patient tears from one eye.
c012-p043: >-
  Night baker delivers bread by rowboat through flooded streets. White apron under raincoat, baskets high, apartment windows waiting with ropes.
c012-p044: >-
  A train conductor discovers a sleeping child in the last carriage. Green uniform, punched tickets, warm lights, gentle hand lowering the announcement microphone.
c012-p045: >-
  Portrait of a professional mushroom identifier surrounded by nearly identical specimens. Round glasses, field stains, three reference books, one very suspicious red cap.
c012-p046: >-
  The town clock cleaner works inside a transparent face. Huge hands pass around her harness while pigeons observe from gilded numerals.
c012-p047: >-
  A sign-language interpreter stands beside an opera stage, hands illuminated in a narrow pool while singers blur into red motion behind.
c012-p048: >-
  Deep-sea cable technician rides a tiny yellow submersible. Robotic arms splice glowing lines across dark seabed, curious squid clustering around work lights.
c012-p049: >-
  An old cobbler fits boots to a young minotaur. Horns duck beneath low ceiling, leather scraps, foot measuring tool, patient concentration.
c012-p050: >-
  City window washer eats noodles fifty stories up. Bucket, safety ropes, reflected clouds, chopsticks held steady above moving traffic.
c012-p051: >-
  A palace food taster has lost her sense of taste. She studies soup by color, steam, texture, and the chef’s increasingly nervous face.
c012-p052: >-
  The postal sorting room includes letters for ghosts. Transparent envelopes float toward a gray-haired clerk who stamps each with moonlight.
c012-p053: >-
  A young physical therapist helps a dragon fold a healing wing. Clinic hangar, soft straps, scale diagrams, enormous careful movement.
c012-p054: >-
  Professional portrait of a desert well inspector descending by rope. White headwrap, blue tools, circular sky shrinking above stone walls.
c012-p055: >-
  A rabbit tailor adjusts a bear’s formal jacket. Ladder, chalk, pin cushion, patient brown client occupying nearly the entire fitting room.
c012-p056: >-
  In a quiet morgue for broken machines, a technician cleans one robot face before recycling. Soft cloth, labeled parts, respectful blue light.
c012-p057: >-
  The orchestra librarian wheels stacks of sheet music through rehearsal. Flying pages, musicians’ legs, small determined figure beneath enormous instruments.
c012-p058: >-
  A smokejumper packs a parachute after returning. Soot-black hands smooth white fabric, red hair damp, empty station floor, noon silence.
c012-p059: >-
  A public fountain technician works waist-deep among bronze fish. Wrench above water, reflective vest inflated, tourists visible only as shadows.
c012-p060: >-
  Fashion editor at a rural sheep shearing. Immaculate black suit, muddy boots, clipboard, windblown wool samples held against sunlight.
c012-p061: >-
  The professional mourner goes home laughing at a joke on the bus. Black veil lifted, tired makeup, grocery bag, evening commuters.
c012-p062: >-
  A bridge toll keeper for migrating spirits accepts coins, buttons, memories, and flowers. Tiny booth, endless fog, neat handwritten receipts.
c012-p063: >-
  Full-body concept for an avalanche forecaster: layered red shell, snow probe, radio harness, climbing skins, data goggles, weathered face.
c012-p064: >-
  A plumber repairs a mermaid palace pipe. Copper wrench, air helmet, floating tool belt, royal fish watching through coral arches.
c012-p065: >-
  The office plant caretaker tends five hundred cubicle ferns at dawn. Water cart, green apron, silent monitors, leaves reflecting window light.
c012-p066: >-
  A young tattoo artist covers an old burn scar with a night-blooming garden. Client’s relaxed shoulder, blue ink, careful gloved hands.
c012-p067: >-
  The book conservator opens a flood-damaged atlas. Pages stand like warped landscapes; small brushes and weights form rescue equipment around it.
c012-p068: >-
  A park ranger releases a repaired robotic deer. Dawn meadow, open transport crate, metal hoof touching real grass, both figures cautious.
c012-p069: >-
  The night market accountant counts coins while performers pack up. Lanterns extinguish one by one across round spectacles and orderly ledgers.
c012-p070: >-
  A broad woman pilots a sidewalk snowplow before sunrise. Pink knit cap, yellow machine, clean path winding through untouched blue drifts.
c012-p071: >-
  Professional tea blender compares leaves by scent. Hundreds of labeled drawers, silver hair, nose ring, one tiny scale balanced on fingertips.
c012-p072: >-
  A rabbit courtroom sketch artist draws faster than proceedings. Charcoal ears, ink-stained paws, pages of increasingly dramatic human expressions.
c012-p073: >-
  The glacier post office serves one researcher. Clerk in wool uniform slides a postcard through frosted glass while blizzard covers the mailbox.
c012-p074: >-
  A crane veterinarian examines a wing by holding it toward dawn. White feathers, green gloves, dark clinic, patient golden eye.
c012-p075: >-
  Train upholstery repair happens overnight. Rows of seats open like blue mouths while one worker stitches a long red seam down the carriage.
c012-p076: >-
  A young firefighter tests smoke alarms in a haunted house. Ladder, clipboard, sheet ghosts patiently waiting their turn beneath decorative cobwebs.
c012-p077: >-
  City beekeeper removes honeycomb from a traffic-signal box. Amber bees, red light, white suit, stopped bicycles watching below.
c012-p078: >-
  The professional mapmaker draws roads that do not yet exist. Giant floor paper, bare feet, ruler, distant construction lights through warehouse doors.
c012-p079: >-
  A repair diver works inside an aquarium after closing. Sharks pass above while she tightens a tunnel bolt under blue maintenance lamps.
c012-p080: >-
  1man, florist, older, compact build, brown skin, silver beard, green work vest, red spectacles, pruning shears; full-body gouache beside buckets.
c012-p081: >-
  A sound engineer records one snowflake landing. Mountain microphone array, padded hood, breath held, vast white space around a black glove.
c012-p082: >-
  The school-crossing guard is a retired superhero. Ordinary orange vest over faded armor boots, stop sign raised, cape now a rain poncho.
c012-p083: >-
  A child-care worker braids six kinds of nonhuman hair before school. Feathers, clouds, tentacles, vines, patient hands, crowded mirror.
c012-p084: >-
  Professional diver retrieves wedding rings from a city canal. Muddy water, metal detector, yellow rope, one gold glint in her palm.
c012-p085: >-
  The municipal moon painter retouches the crescent from a ladder. White overalls against navy sky, paint roller, stars protected by drop cloth.
c012-p086: >-
  A blacksmith tunes bells rather than blades. Hammers, suspended bronze, listening dog, each strike shown as a different colored circle.
c012-p087: >-
  Portrait of an archivist cataloging smells. Tiny stoppered bottles, handwritten descriptions, careful nose, one shelf labeled AFTER RAIN.
c012-p088: >-
  A carpenter adapts a kitchen for a wheelchair user. Measuring tape, lowered counter mockup, client testing reach, warm unfinished wood.
c012-p089: >-
  The mountain rescue dog writes its report by stepping on large floor keys. Snowy fur, red harness, exhausted handler asleep beside console.
c012-p090: >-
  A lighthouse cook serves breakfast during a storm. Plates slide, kettle swings, one hand braces the table while the other flips an egg.
c012-p091: >-
  A young train cleaner finds a forgotten violin. Empty carriage, blue dawn, instrument case open, one tentative bow stroke across the aisle.
c012-p092: >-
  The professional cloud sculptor trims a cumulus over city rooftops. Silver shears, safety tether, white clippings dissolving as rain.
c012-p093: >-
  A hospital laundry worker folds hundreds of identical sheets but pauses over one embroidered child’s blanket. Green machines blur behind.
c012-p094: >-
  Court translator for animals listens to a furious goose during zoning talks. Headphones, notes, stern officials, feathers everywhere.
c012-p095: >-
  A solar-panel washer crosses a desert roof at sunrise. Blue squeegee, reflected sky, long shadow, rows turning gold one by one.
c012-p096: >-
  A prosthetic technician fits a new running blade to an elderly athlete. Workshop track, calipers, relaxed conversation, first careful standing step.
c012-p097: >-
  Professional portrait of a night soil scientist, headlamp, purple gloves, sample jars, muddy knees, constellations over dark field plots.
c012-p098: >-
  The village bell ringer is a small bat. It pulls the rope upside down while sunrise enters the tower and sleepers stir below.
c012-p099: >-
  A letterpress operator cleans ink from metal type after the final newspaper. Black apron, red rag, empty headline forms, machines cooling.
c012-p100: >-
  End of shift at the harbor: cranes folded, forklifts parked, safety helmets lined on hooks, one worker’s lunch note still taped inside a locker.

c013-p001: >-
  A cellist begins alone on a floating wooden platform at dawn. Mist hides the audience; her red coat and one low note ripple the lake.
c013-p002: >-
  Backstage, an elderly drummer tapes two cracked fingers before the encore. Sequined jacket, hearing aids, sweat, crowd light leaking beneath curtain.
c013-p003: >-
  Frog jazz quartet inside a teacup: leaf saxophone, matchstick bass, acorn drums, dew-drop piano. Steam becomes smoky club atmosphere.
c013-p004: >-
  The singer’s microphone fails, so ten thousand people lean forward. She removes her shoes, steps to the edge, and continues without amplification.
c013-p005: >-
  Empty concert hall before rehearsal. One violin lies beneath a single work light, red seats disappear upward, dust follows a silent bow-shaped draft.
c013-p006: >-
  A blind pianist maps the unfamiliar instrument with both hands while stage crew wait. Gold tactile markers, dark hall, one patient breath before sound.
c013-p007: >-
  Rooftop punk show during a summer blackout. Battery-powered amps, laundry lines, candlelit windows, four teenagers playing toward the surrounding apartments.
c013-p008: >-
  A whale sings beneath an underwater amphitheater. Merfolk musicians hold glass horns; blue pressure waves bend kelp curtains around them.
c013-p009: >-
  Close on the bassist during a joyful mistake. Her hand lands on the wrong fret, eyebrows rise, bandmate laughter reflects in polished wood.
c013-p010: >-
  Street performer in a wheelchair loops violin phrases under a railway arch. Silver wheels, orange scarf, passing train adds one immense rhythmic chord.
c013-p011: >-
  The conductor is a tiny white bird standing on the score. Its wings cue brass and strings while musicians watch with absolute seriousness.
c013-p012: >-
  A teenage singer wears school uniform beneath a borrowed gold cape. At the first note, stage fright leaves her shoulders but not clenched hands.
c013-p013: >-
  Hand-painted poster of an orc opera diva in crimson armor, mouth open, spear-shaped spotlight, roses thrown upward from an unseen audience.
c013-p014: >-
  Festival percussion played on cooking pots after instruments are delayed. Chefs, children, grandparents, silver lids, warm evening dust, delighted crowd.
c013-p015: >-
  A robot choir recharges between songs. Heads bowed, cables trailing to floor sockets, soft blue status lights moving in breathlike synchronization.
c013-p016: >-
  The guitarist breaks a string and keeps playing with five. Tight stage crop, copper curls, bitten lip, broken wire drawing a wild silver curve.
c013-p017: >-
  Moonlit recital for one sleeping fox. A young flutist sits on shrine steps; red leaves, bare feet, animal curled beneath the music stand.
c013-p018: >-
  A broad older woman plays a tiny ukulele in a vast arena. Lavender suit, white hair, solitary warm spotlight, audience phone lights like stars.
c013-p019: >-
  No musicians visible—only shadows of moving bows crossing a translucent paper screen while rain drums irregularly on the roof.
c013-p020: >-
  A deaf dancer performs the song through sign beside the vocalist. Their synchronized hands occupy center stage in alternating violet and amber light.
c013-p021: >-
  Snail marching band crosses a wet garden path. Shell drums, blade-of-grass trumpets, tiny blue uniforms, reflections doubling the procession in puddles.
c013-p022: >-
  After the final chord, a pianist remains frozen over the keys. Confetti lands on black sleeves; her grandmother stands alone in the front row.
c013-p023: >-
  A desert nomad orchestra tunes instruments to the wind. Fabric canopies, bowed strings, clay flutes, sand moving as visible staff lines.
c013-p024: >-
  The child conductor has lost her baton. She leads with a bright pencil while the orchestra watches its pink eraser with disciplined attention.
c013-p025: >-
  Close-up of a throat singer beneath northern lights. Frost in beard, fur collar, green sky bands echoing the layered sound over snow.
c013-p026: >-
  A houseplant has grown through the abandoned piano. At noon, wind presses leaves onto keys and performs for an empty ruined theater.
c013-p027: >-
  Two rivals share one microphone during a duet they never rehearsed. Red and blue stage clothes, wary side glances, voices joining as pale gold.
c013-p028: >-
  A mouse sound engineer balances on sliders larger than her body. Headphones, clipboard, amber control booth, cat singer visible through glass.
c013-p029: >-
  Brass band plays from balconies across a narrow street. Different households, pajamas and uniforms, sunset laundry, music meeting above traffic.
c013-p030: >-
  An adolescent dragon’s first trumpet solo produces smoke rings between notes. Formal black jacket, scorched music, teacher shielding eyebrows.
c013-p031: >-
  Full-body character art of a traveling kora player: indigo layers, calabash instrument, anklet bells, worn sandals, wind crossing open grass.
c013-p032: >-
  The opera stage floods as planned, but one prop boat escapes. Singers continue waist-deep while stagehands chase it behind painted waves.
c013-p033: >-
  A jazz pianist plays inside a late-night laundromat. Rotating machines provide circular blue light; three waiting customers become the audience.
c013-p034: >-
  Elderly sisters perform a drum duet at a village festival. Matching red headbands, powerful arms, gray braids, paper lanterns shaking overhead.
c013-p035: >-
  A coral orchestra performs without air. Shell percussion, current-driven strings, fish moving through notation projected across dark water.
c013-p036: >-
  Portrait of a stagehand secretly singing harmony behind the curtain. Black work clothes, coil of rope, mouth near the fabric, spotlight missing her entirely.
c013-p037: >-
  The violin is carved from ice and shrinks during the performance. Musician in white gloves races the melt beneath a warm amber light.
c013-p038: >-
  A young man with a stutter raps flawlessly before a small community-center crowd. One fist holds the cable; relief arrives between lines.
c013-p039: >-
  Mechanical orchestra wound by one elderly clockmaker. Brass birds, drum automata, tiny strings; he bows from the workbench as gears finish together.
c013-p040: >-
  The singer removes elaborate makeup between two songs while still onstage. Mirror, towel, quiet audience, natural face emerging under plain white light.
c013-p041: >-
  A fox busker plays accordion under falling snow. Red case holds coins and bread; tail wraps both boots between songs.
c013-p042: >-
  Graphic concert image built from four colors: black silhouettes, coral drums, teal smoke, yellow hands raised from the floor.
c013-p043: >-
  A pregnant saxophonist leans into one long note. Green evening dress, flat shoes, band blurred, circular spotlight around grounded posture.
c013-p044: >-
  Concert inside a giant bell. Musicians stand along bronze walls, every note shakes dust downward, audience listens outside beneath the rim.
c013-p045: >-
  The shy harpist’s strings extend into actual moonbeams. She plucks carefully while a rooftop audience sits wrapped in blankets.
c013-p046: >-
  A robot drummer loses an arm mid-song; the detached limb continues playing independently. Both exchange surprised display faces without missing tempo.
c013-p047: >-
  School orchestra after the power fails. Phone flashlights illuminate scores, rain darkens windows, acoustic music fills the gym without speakers.
c013-p048: >-
  Full-stage panorama of a one-person band crossing a bridge: drum backpack, knee cymbals, shoulder horns, wheeled piano, patient dog collecting coins.
c013-p049: >-
  A mermaid singer performs from a round tank at a desert festival. Water glows turquoise; audience scarves stream in hot wind.
c013-p050: >-
  Portrait from behind the timpani: mallets raised, conductor tiny in distance, bronze bowl reflecting the percussionist’s concentrated eyes.
c013-p051: >-
  Ghost musicians return to an abandoned ballroom once a year. Transparent formalwear, dusty instruments, moonlit dancers visible only in mirrors.
c013-p052: >-
  A child plays one enormous temple drum. Whole body leaves the ground with each strike, red tassels and autumn leaves jumping together.
c013-p053: >-
  The famous diva sings to an empty rehearsal seat reserved for her late teacher. Plain clothes, unlit hall, voice shown as soft blue thread.
c013-p054: >-
  Crow rock band on electrical wires. Bottle-cap guitars, black feather mohawks, sunset city, sparks supplying stage effects.
c013-p055: >-
  During a quiet song, the audience’s umbrellas open as rain begins. Singer in yellow remains dry beneath the expanding multicolored canopy.
c013-p056: >-
  An old carpenter performs rhythm with hand tools. Plane, mallet, saw, chisel; workshop apprentices join until furniture dust becomes golden haze.
c013-p057: >-
  A singer with vitiligo wears no costume, only simple navy cloth. Projected constellations align across her skin and continue onto the dark backdrop.
c013-p058: >-
  The orchestra pit contains actual water. Frog musicians float on lily pads beneath actors’ feet, reeds and strings following stage drama above.
c013-p059: >-
  Tight backstage image of a drummer vomiting from nerves, then reaching for sticks. Friend holds hair, crowd chants beyond concrete wall.
c013-p060: >-
  A snow leopard cellist plays at a mountain station while travelers wait for the delayed train. Case open, scarf trailing, flakes settling on strings.
c013-p061: >-
  Three conjoined sisters sing separate harmonies around one shared breath. Simple white dresses, circular microphones, dark stage without decoration.
c013-p062: >-
  The instrument is a building: windows become keys, elevators slide as valves, rooftop musician conducts apartment lights across night.
c013-p063: >-
  A young drummer signs the count-in with glowing sticks for her deaf bandmates. Four poised figures, black floor, colored vibration panels.
c013-p064: >-
  Portrait of an exhausted street singer on the last subway. Guitar case between knees, sequins under coat, humming quietly to a sleeping child.
c013-p065: >-
  The pianist wears six rings that generate different weather. Snow, warm rain, wind, lightning, fog, sunlight gather above corresponding keys.
c013-p066: >-
  Rural festival stage built on a truck. Grandmother sings, toddlers dance, cab headlights glow, wheat field replaces auditorium.
c013-p067: >-
  A bat choir hangs upside down in a cathedral vault. Sheet music clips inverted, moon through stained glass, conductor standing conventionally below.
c013-p068: >-
  A trumpet player performs underwater inside a bubble. Notes emerge as gold fish; audience on shore sees only widening rings.
c013-p069: >-
  The lead guitarist is eighty-two and wears orthopedic shoes with silver stage armor. Low stance, joyful snarl, grandchildren operating lights.
c013-p070: >-
  Empty festival field the next morning. Mud, broken bracelet, flattened grass, silent speakers, one guitar pick shining in sunrise.
c013-p071: >-
  A young singer forgets lyrics and the crowd supplies them. Her relieved face fills the screen while thousands of mouths continue below.
c013-p072: >-
  A mechanical organ grows from forest roots. Wind pumps wooden pipes; deer gather among ferns as no human musician appears.
c013-p073: >-
  Stage costume sheet for a nonbinary pop violinist: mirrored jacket, split skirt-trousers, sensor bow, flat boots, hearing protection, blue braided cable.
c013-p074: >-
  The percussionist plays rain gutters during a storm. Rooftop pipes, tin buckets, bare feet, lightning illuminating an accidental neighborhood concert.
c013-p075: >-
  A tiny choir performs inside a snow globe. Red scarves, white stage, one audience child holding the sphere close to her ear.
c013-p076: >-
  A blind oud player turns toward a single cough in the audience. Warm wood, patterned carpet, listening smile, concert hall otherwise black.
c013-p077: >-
  Two drummers compete across a canyon using echoes. Distant red and blue figures, birds rising, rock walls carrying visible sound rings.
c013-p078: >-
  A singer made of smoke requires constant stage fans. Gray body bends through colored light while technicians keep the silhouette from dispersing.
c013-p079: >-
  Before her first note, an older trans woman adjusts the microphone to a new height. Burgundy gown, silver throat scar, steady hand, quiet club.
c013-p080: >-
  1girl, bass player, dark skin, shaved head, broad frame, white suit, red socks, vintage instrument; low-angle marker drawing under cyan stage light.
c013-p081: >-
  A violin duet between human child and household robot. One uses a fine wooden bow, the other a magnetic arc; kitchen audience applauds from chairs.
c013-p082: >-
  The marching band crosses a shallow river. Brass bells reflect sky, uniforms rolled to knees, drum kept dry above four heads.
c013-p083: >-
  A famous pianist arrives late and plays in travel clothes. Suitcase beside bench, train ticket on keys, snow still melting from shoulders.
c013-p084: >-
  Firefly orchestra in a glasshouse at night. Each insect flashes one note while a gardener conducts with a watering wand.
c013-p085: >-
  A metal vocalist whispers the final song. Black leather, huge silent crowd, one pale spotlight making restraint more intense than screaming.
c013-p086: >-
  Portrait of a luthier hearing her new instrument played publicly. She stands behind the audience, work apron under formal coat, tears caught in glasses.
c013-p087: >-
  The cat walks across the synthesizer during a solemn electronic set. Random rainbow notes, performer frozen, audience delighted.
c013-p088: >-
  A mountain flute player performs into fierce wind. Sound blows backward as blue ribbons, coat and hair pointing toward the valley.
c013-p089: >-
  Concert poster showing only hands: drumsticks, bow, mallets, pick, conductor fingers, signed lyrics, audience palms, all converging around white space.
c013-p090: >-
  A merfolk percussionist strikes suspended air bubbles. Each sphere produces color before bursting; dark ocean becomes temporary stage lighting.
c013-p091: >-
  The singer’s dress is woven from audience requests. Handwritten paper strips trail across the floor as she chooses one for the encore.
c013-p092: >-
  An elderly janitor plays grand piano after closing. Mop leaned against gold instrument, empty theater, work gloves placed neatly on bench.
c013-p093: >-
  A fox child busks terribly but bravely. Crooked violin bow, red hat, one supportive pigeon, coins arranged by a proud parent offscreen.
c013-p094: >-
  The band performs inside a moving train carriage. Guitar strap braced, drummer seated on luggage, passengers swaying through green countryside.
c013-p095: >-
  A young monk rings bowls filled to different water levels. Temple courtyard, blue dusk, concentric sound ripples disturbing reflected stars.
c013-p096: >-
  Full-length gouache of an accordionist with prosthetic right hand, cream shirt, wide navy trousers, orange suspenders, joyful stepping pose.
c013-p097: >-
  During the solo, a butterfly lands on the saxophone bell. Musician lowers volume gradually while yellow wings vibrate in warm light.
c013-p098: >-
  A robotic orchestra discovers improvisation. Perfect rows break apart, colored status lights flicker, metal bodies lean toward one another.
c013-p099: >-
  The singer walks offstage into rain without changing costume. Sequins darken, makeup runs, distant applause becomes soft gold behind the door.
c013-p100: >-
  Final image from beneath the stage: floorboards vibrate, dust falls, cables sway, and the musicians above exist only as moving pools of colored light.

c014-p001: >-
  A broad elderly woman dances barefoot in her kitchen while soup simmers. Floral dress, gray braid, one spoon raised, evening radio beyond frame.
c014-p002: >-
  Wheelchair dancer spins through shallow water, silver rims cutting twin circles across a flooded theater under hard blue light.
c014-p003: >-
  Two cranes court at dawn among rice fields. Long legs, folded wings, mist; their mirrored steps form a quiet natural duet.
c014-p004: >-
  Rehearsal studio after everyone leaves: rosin dust preserves a day of turns, jumps, falls, and corrections as overlapping footprints without bodies.
c014-p005: >-
  A child imitates laundry snapping in rooftop wind. Yellow shirt, red clothespins, improvised leaps between white sheets and city sky.
c014-p006: >-
  Close on a dancer’s hands describing rain while the rest of her body disappears into black. Silver finger caps leave delicate vertical trails.
c014-p007: >-
  A minotaur performs an unexpectedly delicate solo in a narrow pottery shop. Hooves avoid fragile bowls; linen skirt follows each careful pivot.
c014-p008: >-
  Street dance battle during a power cut. Only sneaker lights, bracelets, and phone screens reveal bodies moving across the dark square.
c014-p009: >-
  Three ghosted poses show a deaf boy feeling rhythm through a wooden floor, from cautious heel touch to full airborne release.
c014-p010: >-
  Rain turns the courtyard into a mirror beneath two umbrella dancers. Red and green canopies orbit while faces remain hidden.
c014-p011: >-
  A tiny mouse ballerina practices on a piano keyboard. Each landing sounds a note; pink ribbon tangles around black and white keys.
c014-p012: >-
  The retired boxer learns tango, shoulders initially rigid. His partner waits through one missed step until guarded hands soften.
c014-p013: >-
  Dance costume made from newspaper lifts into readable headlines during a turn. Young performer, bare feet, pale gallery, pages becoming wings.
c014-p014: >-
  An octopus dances alone inside a cylindrical tank, eight arms tracing separate colored ribbons while museum visitors become blurred silhouettes.
c014-p015: >-
  A farm worker steps across irrigation channels with bundles of seedlings. Ordinary labor aligns into accidental choreography seen from above.
c014-p016: >-
  Graphic black silhouette of a pregnant dancer leaning backward, one hand supporting the belly, orange sun disk balanced behind her curve.
c014-p017: >-
  Two children practice a festival dance from memory behind the shrine. Wrong hand positions, falling leaves, whispered corrections, no audience.
c014-p018: >-
  The robot was designed for welding, not waltzing. Heavy feet dent the studio floor while its human partner laughs through a careful turn.
c014-p019: >-
  A fox dancer’s nine tails lag behind each spin at different intervals, forming a spiral from crimson through pale gold.
c014-p020: >-
  Motion-study page of an older cane user turning the mobility aid into a rhythmic partner. Ink line, teal accents, five sequential stances.
c014-p021: >-
  Underwater ballet among suspended furniture. Dancers push from chairs and tables, hair floating, long dresses opening like anemones.
c014-p022: >-
  A school janitor moonwalks while polishing the hallway. Buffer machine, yellow caution sign, reflected shoes, student audience around corner.
c014-p023: >-
  Mountain dance performed in thick winter layers. Boots stamp snow into geometric patterns while scarves carry the faster movement overhead.
c014-p024: >-
  A paper doll tears free from its folding tab and dances across a drafting table. Flat red dress gains volume only in motion.
c014-p025: >-
  Tight crop on exhausted feet after rehearsal: taped toes, one prosthetic blade, scattered hairpins, floor marked by chalk arrows.
c014-p026: >-
  A traditional fan dance inside a subway carriage. Commuters make room; white fans unfold between poles as tunnel lights strobe gently.
c014-p027: >-
  The dragon’s body is too long for the ballroom. Head bows inside, tail completes the dance outside through open windows.
c014-p028: >-
  A young dancer with albinism rehearses beneath an ultraviolet canopy. White costume absorbs lavender shadow; sunlit park remains distant.
c014-p029: >-
  Full-body gouache of a stocky tap dancer in copper shoes, striped trousers, sleeveless vest. Dust jumps from each board under warm stage lamps.
c014-p030: >-
  A flock of starlings matches one lone rooftop dancer’s arms. Human silhouette and black cloud separate, join, then reverse directions at sunset.
c014-p031: >-
  Two rivals dance across opposite sides of a paper screen. Their shadows argue, imitate, and finally align without faces meeting.
c014-p032: >-
  The ballerina’s tutu is a living white mushroom. It releases spores with every turn, transforming rehearsal light into a silver haze.
c014-p033: >-
  A grandmother teaches hand gestures to three generations around a hospital bed. Seated dance, patterned blankets, laughter, careful wrists.
c014-p034: >-
  Urban dancer balances on a narrow bollard while traffic becomes colored horizontal streaks. Teal coat, orange soles, completely still upper body.
c014-p035: >-
  A frog chorus performs synchronized leaps between lily pads. Overhead view, circular ripples, one late jumper creating comic asymmetry.
c014-p036: >-
  Rehearsal begins with falling. Ten students practice safe rolls across a vast white floor; bodies form a wave rather than individual poses.
c014-p037: >-
  A masked performer dances with her own detached shadow. Noon courtyard, blue costume, black silhouette reaching half a step ahead.
c014-p038: >-
  Harvest festival stomping grapes in long skirts. Purple splashes, linked arms, bare feet, old and young bodies sharing one rhythm.
c014-p039: >-
  The child cannot hear the music but follows colored ribbons tied to classmates’ wrists. Her green ribbon finds the beat last, then leads.
c014-p040: >-
  A crane-mounted camera follows dancers running across salt flats. Tiny figures, mirrored sky, fabric trails, horizon almost erased.
c014-p041: >-
  One-legged swordswoman practices a slow ceremonial dance, blade used as balance line. Quiet courtyard, scarlet sleeve, deliberate grounded control.
c014-p042: >-
  A cat interrupts formal choreography by crossing the stage. Every dancer adjusts without breaking character; black tail becomes accidental lead.
c014-p043: >-
  Apartment neighbors dance on separate balconies during quarantine. Different ages, clothes, and styles join through one radio broadcast.
c014-p044: >-
  The sea itself performs: foamy wave edges resemble white sleeves, dark rocks become heads, and sunset tide completes a vast dancer silhouette.
c014-p045: >-
  A teen practices popping in a mechanic shop. Robotic arms on racks mirror his joint isolations under flickering work lights.
c014-p046: >-
  Dance duet between giant and child shown from knee height. One enormous bare foot responds carefully to two tiny red shoes.
c014-p047: >-
  A wind-up porcelain dancer continues after the music box breaks. Key slowing, chipped blue dress, final pose held against dusty attic light.
c014-p048: >-
  Contemporary solo in a field of tall grass. Performer’s low movement disappears below green blades, visible only through ripples and one raised hand.
c014-p049: >-
  A wedding guest with a cane is first onto the empty floor. Plum suit, white sneakers, relatives watching as he invents a joyful shuffle.
c014-p050: >-
  Motion captured as embroidery: red thread maps a dancer crossing black fabric, knots marking impacts, loose ends showing unfinished gestures.
c014-p051: >-
  An elderly couple practices one tiny step at a bus stop. Shopping bags, winter coats, approaching headlights, private rhythm.
c014-p052: >-
  A young mermaid learns a land dance using a wheeled tail cradle. Studio mirrors, patient instructor, fins fluttering with effort.
c014-p053: >-
  Ritual dance around a broken satellite in the desert. Reflective robes, bare feet, solar panels catching moonlight, no visible musicians.
c014-p054: >-
  A scarecrow dances only when wind arrives. Empty autumn field, patched sleeves lifted, crows holding ribbons from the hat.
c014-p055: >-
  The dancer’s costume contains pockets of colored powder. Each impact releases a different cloud, building an abstract portrait around her.
c014-p056: >-
  Schoolgirls rehearse in a narrow hallway because the gym is occupied. Lockers constrain elbows; their synchronized feet remain exact.
c014-p057: >-
  A huge bear performs folk steps with a tiny tambourine. Flower crown, embroidered vest, mountain village ring giving generous space.
c014-p058: >-
  Close profile of a flamenco dancer pausing between movements. Red comb, sweat, open mouth, one hand still curved in the edge of frame.
c014-p059: >-
  A robot learns softness by dancing with falling feathers. Gray industrial room, heavy hands, white down never crushed.
c014-p060: >-
  Four dancers wear skirts painted as phases of the moon. Circular arrangement, overhead camera, black floor becoming a lunar calendar.
c014-p061: >-
  A child copies fish through aquarium glass. Her blue arms and their silver bodies move together while visitors pass unobserved.
c014-p062: >-
  The choreographer watches from a hospital wheelchair while the company rehearses her unfinished piece. Notebook, oxygen tube, fierce pointing hand.
c014-p063: >-
  Shadow-puppet dance performed by six hands behind linen. Birds, deer, waves, and one human figure transform without visible puppeteers.
c014-p064: >-
  A subway cleaner finds abandoned ballet shoes and tests one careful turn. Uniform, mop, empty platform, train wind lifting coat.
c014-p065: >-
  Fire dancers use no flame; orange fabric and sunset create the illusion. Hilltop silhouettes, broad arcs, dry grass bending.
c014-p066: >-
  An ant colony dances around a sugar crystal, viewed as grand overhead choreography. Black bodies form rings across white tile.
c014-p067: >-
  A dancer with a prosthetic arm paints movement in the air using a brush attachment. Indigo ink curves continue beyond the page margins.
c014-p068: >-
  The prince practices peasant steps in secret, jeweled coat thrown over a hay bale. Stable child corrects his stiff knees with blunt gestures.
c014-p069: >-
  Winter lake skaters dance beneath the ice rather than above. Transparent blue surface, flowing white clothes, bubbles trailing each submerged turn.
c014-p070: >-
  A street crew performs with grocery carts. Wheels become percussion, fluorescent aisles turn into lanes, night cashier applauds behind glass.
c014-p071: >-
  Full-body ink sketch of a heavyset dancer mid-jump, knees high, loose black tunic, bare feet, white paper, one coral brush accent.
c014-p072: >-
  A fox mask hangs in empty space while the invisible dancer moves. Bells, footprints, and swirling leaves reveal the unseen body.
c014-p073: >-
  Mother and toddler dance during laundry folding. One sock on each hand, basket drum, midday bedroom chaos.
c014-p074: >-
  A lighthouse beam becomes a partner for the night keeper. She turns through its circle atop the tower, coat and white light crossing dark sea.
c014-p075: >-
  Dance rehearsal on a ship in heavy weather. Performers lean with the deck, mirrors tilt, balance exercise becomes survival choreography.
c014-p076: >-
  A snail dancer’s movement takes all day. Four panels show the same elegant curve from dawn dew through sunset shadow.
c014-p077: >-
  Young monks practice a lion dance with an actual sleepy lion. Red costume draped over golden back, mismatched feet, temple courtyard laughter.
c014-p078: >-
  A solo performer wears hundreds of small mirrors. Audience fragments slide across the body during each turn, making spectators part of costume.
c014-p079: >-
  Rural rain dance ends exactly as clouds open. Participants stop, startled, then laugh beneath sudden water and streaming painted faces.
c014-p080: >-
  1man, dancer, elderly, dark skin, bald, strong build, white shirt, wide rust trousers, suspenders; sweeping charcoal gesture on pale yellow.
c014-p081: >-
  A ballet class for young monsters: slime at barre, horned child stretching, ghost unable to touch floor, patient human teacher.
c014-p082: >-
  The dancer moves between rotating doors in a glass lobby. Reflections multiply red coat and black boots into a circular ensemble.
c014-p083: >-
