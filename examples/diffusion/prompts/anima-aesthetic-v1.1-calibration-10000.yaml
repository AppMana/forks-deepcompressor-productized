# Hand-authored Anima Aesthetic 1.1 calibration corpus.
# No prompt in this file may be generated, expanded, or paraphrased by code.

c001-p001: >-
  Rain has just stopped. Beneath the striped awning of a closed flower stall, an elderly weather observer tips her chin toward a clearing sky; silver curls escape her hood, three glass barometers hang from her belt, and watery green reflections tremble across her thoughtful face.
c001-p002: >-
  Cropped at the collarbones: a sleepless arcade technician with tangerine hair, one eyebrow shaved into two clean notches, cobalt coveralls tied at the waist, and the faint violet glow of a circuit tester reflected in tired brown eyes. Leave the background blank cream.
c001-p003: >-
  Character portrait, three-quarter view — an ivory clay guardian whose repaired cracks are joined with turquoise lacquer. A sprig of rosemary grows from one shoulder; its broad stone hands cradle a single warm egg close to its chest.
c001-p004: >-
  At the far end of a ferry cabin, a young cellist sits alone between rows of empty blue seats. Her concert jacket is still immaculate, but one stocking is torn and seawater darkens the hem; sunrise slides across the window and catches the stubborn set of her mouth.
c001-p005: >-
  No scenery, no props, only the face and unruly mane of a black lion wearing a delicate gold monocle. His expression combines royal patience with unmistakable embarrassment, rendered in clean anime linework with two flat colors and a tiny crimson accent.
c001-p006: >-
  Make the viewer feel slightly too close to a masked beekeeper removing one glove with her teeth. Honey freckles the clear veil, loose coils of hair press against the mesh, and late-summer light turns the whole square composition amber without revealing what lies beyond her shoulders.
c001-p007: >-
  A vertical fantasy illustration follows a lanky marsh postman from muddy boots to the bundle of sealed letters balanced overhead. Reeds and distant water are suggested by four loose ink strokes; most of the page belongs to his patched rain cape and delighted, gap-toothed grin.
c001-p008: >-
  The last apprentice in a mountain observatory has fallen asleep upright, cheek resting against a brass star chart. Frost feathers the round window behind him. His cropped hair, ink-stained ear, and carefully mended uniform deserve more attention than the telescope.
c001-p009: >-
  solo, adult woman, powerful build, shaved head, ochre wrap dress, heavy ceramic earrings, relaxed stance, direct gaze; graphic poster treatment with broad ultramarine shadow, rough paper grain, and one curling line that suggests smoke without showing its source.
c001-p010: >-
  An anxious household robot waits for an important guest. Its pear-shaped copper body has been polished unevenly, a handwritten welcome card trembles between three pincers, and the small display where a face should be shows a hesitant pixel smile against an otherwise empty doorway.
c001-p011: >-
  Seen through the oval mirror of a dim tailor shop, an older gentleman pins a fresh white carnation to his plum suit. The portrait includes only his reflection, the green lining of the jacket, and a row of colored threads dissolving into darkness.
c001-p012: >-
  She is halfway through laughing when the picture is taken: a freckled bicycle messenger with rain-flattened bangs, mismatched gloves, and a chipped front tooth. Crop away the bicycle and city; keep the motion in her shoulders and the wind tugging a yellow receipt from her pocket.
c001-p013: >-
  Beneath six layers of ceremonial fabric stands a tiny desert monarch who looks thoroughly bored. Embroidered constellations overwhelm the child’s silhouette, while bare feet, a crooked paper crown, and one sideways glance quietly puncture the formality.
c001-p014: >-
  Study of a nocturnal moth scholar, nonhuman but gentle: feathery antennae arch beyond the frame, spectacles magnify four curious eyes, and charcoal wings fold like an academic robe. A reading lamp creates a precise lemon-yellow circle over the desk; everything else vanishes into indigo.
c001-p015: >-
  Begin with her hands—broad palms marked by years of rope work—then let the eye climb to a harbor pilot’s weathered face. Salt-white braids, a faded orange scarf, and a calm half smile are enough; omit the sea entirely.
c001-p016: >-
  A young shrine custodian pauses after sweeping, shown from behind as she turns at the sound of a bell. The nape of her neck, one wind-loosened ribbon, and copper leaves caught in the broom carry the portrait; stone steps blur into a pale gray wash.
c001-p017: >-
  Painted like an intimate anime film still, a broad-shouldered baker kneels beside an open oven at four in the morning. Flour clouds his dark forearms, tiny round glasses fog in the heat, and his expression changes from concentration to wonder as the first loaf rises.
c001-p018: >-
  A crown made of spoons, a coat lined with grocery receipts, apple-green spectacles, and the serene posture of an official portrait: depict the eccentric keeper of a traveling kitchen as if these improvised regalia were completely ordinary.
c001-p019: >-
  Waist-up portrait of a river spirit during drought. Her translucent blue hair has receded to a few floating strands; smooth stones show through her shoulders, and both hands protect a thumb-sized pool where one silver minnow continues to circle.
c001-p020: >-
  A square, nearly monochrome close-up of a teenage fencer immediately after defeat. Sweat beads along the blunt edge of her protective mask, which is lifted just enough to expose furious eyes and a lower lip she is trying not to let tremble.
c001-p021: >-
  Afternoon finds a heavyset mushroom forager leaning against a birch trunk, laughing privately at something in his field guide. Scarlet cap, mossy apron, wicker straps, rosy cheeks; use soft colored-pencil texture and allow the forest to remain only scattered flecks.
c001-p022: >-
  Her face is absent. Portray an anonymous winter traveler entirely through a snow-crusted hood, breath cloud, red mitten, and the brass key held toward the viewer. Beyond that hand, the composition should dissolve into unpainted paper.
c001-p023: >-
  A retired magical-girl heroine studies the old transformation compact in her palm. She wears reading glasses and a comfortable gray cardigan over faded battle scars; morning laundry brightens the balcony behind her, making the moment affectionate rather than tragic.
c001-p024: >-
  Design a youthful cave cartographer with close-cropped white hair, enormous listening ears, and a cape stitched from discarded survey maps. A single headlamp throws sharp upward shadows, revealing wonder instead of fear as she hears an unseen underground river.
c001-p025: >-
  The composition resembles a postage stamp: profile of a solemn crane-headed diplomat in a midnight kimono, beak crossed by a thin old scar, red seal suspended from the neck. Fine wave engraving fills the border; the center stays quiet and pale.
c001-p026: >-
  An exhausted nurse drinks vending-machine tea during a hospital night shift. Do not beautify the fatigue: show the crease left by her mask, flyaway hair, practical shoes, and shoulders slowly unclenching under sterile mint light.
c001-p027: >-
  Heroic framing for an utterly nonheroic task—a young mechanic stands atop a stool, reaching into a ceiling vent with a screwdriver between her lips. Her prosthetic left arm is covered in childish dinosaur stickers; dust sparkles around a look of fierce concentration.
c001-p028: >-
  Old sea-green wallpaper, one wooden chair, nothing more. A tall person in a perfectly cut black suit sits backward on the chair, chin on folded arms; their violet eye makeup is immaculate, their expression unreadable, their bare feet relaxed.
c001-p029: >-
  Portrait of a fox cub who believes it is a train conductor. The oversized navy cap keeps slipping over one eye, a punched ticket is clamped proudly in its teeth, and soft steam curls through a station suggested by blurred blocks of maroon and gold.
c001-p030: >-
  Through a scratched helmet visor we meet an asteroid gardener: middle-aged, brown skin, short salt-and-pepper twists, a nose reddened by cold. Reflections show rows of seedlings floating in a greenhouse, but the quiet satisfaction in her eyes remains the center.
c001-p031: >-
  A painterly bust of a blind swordsmith listening to cooling metal. His soot-dark face turns slightly toward the blade outside the frame; long earlobes carry iron rings, and a narrow band of forge orange separates him from dense charcoal shadow.
c001-p032: >-
  She has dressed for a ball that ended decades ago. Porcelain buttons, sea-foam tulle, faded lipstick, and a magnificent cloud of white hair surround an old ghost who floats above a dusty floor, smiling as though the music has just resumed.
c001-p033: >-
  Close on the hands and muzzle of a capybara tea master. One paw steadies a tiny celadon bowl while the other lifts a bamboo whisk; serious dark eyes, damp tawny fur, and a single camellia complete the calm horizontal portrait.
c001-p034: >-
  A nonbinary rooftop falconer faces into hard spring wind, linen shirt snapping behind a lean silhouette. Their gloved arm extends beyond the crop after releasing the bird, leaving only an empty jess, wind-reddened cheeks, and exhilaration aimed toward open sky.
c001-p035: >-
  Imagine a school photograph from a floating city. The student is a shy blue-skinned giant who has folded almost double to fit the tiny chair; cloud-patterned uniform, carefully combed hair, knees outside the frame, and a bashful smile against mottled studio cloth.
c001-p036: >-
  One long horizontal brushstroke becomes the brim of a wandering magician’s hat. Beneath it, render a narrow face with sun spots, a chipped moon earring, and eyes closed against golden dust; leave the rest suggestive, airy, and unfinished.
c001-p037: >-
  At a crowded night market, everyone else has become streaks of color. Hold one fish vendor perfectly still in focus: rolled sleeves, scale-speckled apron, sturdy red glasses, and a patient expression as she presents an enormous silver carp toward the lens.
c001-p038: >-
  formal bust, elderly android archivist, translucent skull casing, paper labels tucked among glowing memory coils, velvet museum uniform, slight stoop, kind mechanical eyes; symmetrical black background interrupted by a narrow column of dusty window light.
c001-p039: >-
  A very small witch occupies the lower corner of an enormous white page. Her pointed hat is patched with bus tickets, both arms wrap around a drowsy orange cat larger than she is, and their overlapping silhouettes form one cozy uneven triangle.
c001-p040: >-
  Depict a competitive swimmer before the starting horn, not after victory. Water beads on a shaved scalp, mirrored goggles hide the eyes, shoulder muscles are loose but ready, and turquoise lane reflections cross deep brown skin in trembling bands.
c001-p041: >-
  A wandering bookbinder poses in a doorway with a wooden press strapped like a backpack. He has a soft belly, windburned cheeks, ink-blue fingernails, and dozens of loose page markers fluttering from his patched coat like tiny banners.
c001-p042: >-
  Only moonlight and profile: an antlered forest guardian lowers her head so fireflies can settle along velvet branches. Fine white line describes the nose and eyelashes; nearly every other feature disappears into a velvety field of green-black.
c001-p043: >-
  The portrait is a messy desktop seen from above. Between opened notebooks and orange peels, a graduate alchemist has fallen asleep with one cheek on her sleeve; chemical doodles glow faintly around short lavender curls, and a cracked mug reads TRY AGAIN.
c001-p044: >-
  Give an aging punk drummer the dignity of a royal painting. Spiked gray hair, hearing aids, tattooed forearms, battered sticks crossed over a burgundy waistcoat; a dark red curtain and one severe overhead light, but an irrepressible grin ruins the solemnity.
c001-p045: >-
  A snow leopard courier peers around a blue parcel stacked higher than its head. The spotted tail provides balance, leather satchels bulge with letters, and the animal’s narrowed eyes suggest that the mountain delivery route has become personally insulting.
c001-p046: >-
  The camera catches a novice astronaut upside down inside a cramped capsule, braids floating in every direction. She reaches for a runaway pencil with one socked foot while trying to maintain an official, composed expression for the mission log.
c001-p047: >-
  Portrait in six pieces of broken mirror: an adult stage magician removing makeup after a failed show. Each shard reveals something different—a tired green eye, silver sideburn, trembling mouth, loosened bow tie, burned cuff, and finally a laugh beginning.
c001-p048: >-
  A shy minotaur florist fills the frame from horn to apron. Tiny blossoms have been woven around one chipped horn, his huge fingers tie a pink ribbon with improbable care, and blurred buckets of greenery create a cool, damp halo.
c001-p049: >-
  Under the harsh light of a laundromat, a roller-derby captain repairs her own torn jacket. Show broad knees, bruised knuckles, copper buzz cut, and the needle held close to her face; spinning machines behind her become pale circular abstractions.
c001-p050: >-
  sepia ink, side profile, young desert astronomer wearing a wrapped linen hood and one elaborate brass ear cuff; no stars, no telescope, just windblown sand crossing the page and a pupil dilated by something magnificent outside the image.
c001-p051: >-
  An old tortoise librarian stands upright behind a return desk, shell converted into a rolling bookcase. Half-moon spectacles balance low on the beak; one claw stamps a due date while the other shelters a sleeping mouse patron.
c001-p052: >-
  Frame a tattoo apprentice through the ring of an unlit magnifying lamp. Her shaved sides reveal botanical practice marks behind one ear, disposable gloves are still clean, and she rehearses a confident smile before the first client enters.
c001-p053: >-
  A wind-up prince sits on the edge of his display box after closing time. Painted rosy cheeks have chipped, one gilded knee is exposed as gears, and the paper palace printed behind him bends outward where he has begun to escape.
c001-p054: >-
  Portrait of a woman who repairs umbrellas, viewed from floor level between hanging canopies. Only her upside-down face, strong hands, and pencil tucked through a loose bun appear among translucent reds, lemons, and rainy blues.
c001-p055: >-
  The youngest member of a volcanic survey team wears an enormous silver heat suit with the visor raised. Soot freckles his round face, eyebrows are singed unevenly, and he holds a fresh black stone as carefully as a found bird.
c001-p056: >-
  A dignified white goose in a moss-green waistcoat has been painted beside an ancestral portrait too large to show. One webbed foot rests on a stack of legal documents, the neck curves into an elegant question mark, and the gaze is openly skeptical.
c001-p057: >-
  Mid-turn, mid-sentence, mid-stride: capture a deaf theater director signing instructions across an empty rehearsal hall. Silver rings flash on expressive fingers; her long checked coat fans outward, and warm work lights leave the face partly in shadow.
c001-p058: >-
  Render the moon’s night janitor as a compact, practical woman in orange overalls. She leans on a crater broom, helmet tucked beneath one arm, regarding the blue Earth with the same weary affection one gives a room that will never stay clean.
c001-p059: >-
  Head-and-shoulders image of an amphibious palace cook, emerald gills fluttering, pearl apron pinned over a plum tunic. Steam fogs the lower half of the frame; above it, enormous amber eyes judge a sauce with grave professional concern.
c001-p060: >-
  Her wheelchair is visible only as a glinting wheel behind layered skirts. Focus instead on the street violinist’s closed eyes, shaved temple, flying bow arm, and crimson scarf; paint the noon crowd as translucent blocks that never quite touch her silhouette.
c001-p061: >-
  A child-sized salvage diver has just surfaced with an object no one expected: a perfectly dry paper bird. Wet curls cling to the copper helmet ring, gloved hands make a careful cradle, and gray waves occupy only a thin strip at the bottom.
c001-p062: >-
  Draw an intimate kitchen-table portrait of a grandmother teaching herself to solder. Floral blouse, magnifying goggles, steady dark hands, a radio opened like a puzzle, and one blue spark reflected in a look of delighted defiance.
c001-p063: >-
  A solemn mountain goat wears the bell and embroidered sash of a village mayor. Snow crystals dust the beard; one horn is blunt from age, and the low viewpoint gives absurd civic grandeur to a creature chewing a document corner.
c001-p064: >-
  Backlit by a projection screen, a film preservationist holds a strip of damaged animation to one eye. The frame becomes a tiny colored window across her otherwise silhouetted face, revealing one miniature dancing figure and a tear caught on her cheek.
c001-p065: >-
  A broad portrait made from torn-paper shapes: deep-brown dancer, cropped silver hair, lemon leotard under an oversized navy work shirt, one bare foot lifted behind. The pose is loose and private, as though stretching alone before anyone arrives.
c001-p066: >-
  Show the underground queen during an ordinary migraine. She has removed the obsidian crown and rests it upside down beside a cup of mint tea; luminous cave moths dim themselves while her massive braided hair spills over a plain kitchen chair.
c001-p067: >-
  A coral-skinned mechanic from a flooded city bites back a curse while untangling copper wire from a neck frill. Tool harness, waterproof eye paint, one missing front tooth; tight crop with rippling caustic light and no explanatory machinery.
c001-p068: >-
  The entire canvas is fog except for a mountaineer’s red hood and the dark oval of a face. Ice crusts the eyelashes, a cracked compass touches the lower lip, and the eyes look left toward a route that the viewer cannot see.
c001-p069: >-
  Playful magazine-cover composition featuring an elderly pigeon racer in immaculate cream trousers. Two stopwatches, a cobalt bomber jacket covered in hand-sewn badges, wind-lifted mustache, and the triumphant posture of someone whose bird has already vanished beyond the crop.
c001-p070: >-
  A sentient candle has burned down to a thumb-high figure in a wax robe. It stands bravely on a saucer, holding a sewing-needle rapier; the flame above its head leans in an unseen draft, casting one disproportionately heroic shadow.
c001-p071: >-
  Within a greenhouse crowded by giant leaves, isolate the face of a botanist with vitiligo and round safety glasses. Condensation softens everything except her sharp smile and the tiny frog balanced, unnoticed, on top of her head.
c001-p072: >-
  A blacksmith’s daughter poses for her first guild credential, shoulders squared too rigidly. Her formal collar cannot hide an old soot mark, one braid has come undone, and nervous fingers hover just outside the official blue backdrop.
c001-p073: >-
  Use a low, circular composition like the bottom of a well. Looking down into it is a middle-aged spelunker with a crooked helmet lamp, blunt bangs, sunburst earrings, and an expression shifting from professional curiosity to open astonishment.
c001-p074: >-
  The portrait belongs to the coat as much as its wearer: hundreds of hand-mended patches map the journeys of a quiet itinerant healer. Only their weathered nose, warm eyes, and two dark hands appear between folds of indigo, ochre, and faded rose.
c001-p075: >-
  A palace guard on lunch break balances a towering fruit sandwich over polished armor. He is enormous, bald, and cross-eyed with concentration; a single crumb hangs in the air, while the ceremonial corridor is reduced to two austere gold lines.
c001-p076: >-
  Soft graphite drawing of a horned girl reading beside a radiator, knees pulled under an oversized sweater. One horn is covered with knitted cozies, the other supports a drying sock, and there is no magic beyond the improbable comfort of the arrangement.
c001-p077: >-
  A weathered rescue pilot faces the camera after removing her oxygen mask. Wind has pressed white hair flat on one side, the bridge of her nose is bruised, and an emergency-orange reflection cuts across a face caught between relief and unfinished worry.
c001-p078: >-
  In a dark aquarium tunnel, a young man in formal mourning clothes watches rays pass overhead. Their moving blue shadows replace all facial detail except one wet cheek and the goldfish-shaped pin clutched in his fist.
c001-p079: >-
  comic close-up, furious red panda noodle vendor, flour on whiskers, striped headband slipping, wooden ladle raised like a judge’s gavel; energetic speed marks stop abruptly at the edge of a tiny, perfectly arranged bowl.
c001-p080: >-
  Portray a librarian of forbidden dreams without books or shelves. She wears a black sleep mask pushed onto silver curls, dozens of labeled keys at the throat, and one luminous moth escaping from between pursed lips into empty violet space.
c001-p081: >-
  An adolescent scarecrow sits for a portrait after the harvest. Straw protrudes from a borrowed green blazer, crows have decorated the shoulders with blue bottle caps, and the painted burlap smile contrasts with shy hands folded carefully in the lap.
c001-p082: >-
  The image is caught through a steamed café window. Inside, a scarred chef with a rose tattoo closes the register, forehead resting briefly against cool glass; outside reflections overlay her face with buses, bicycle lamps, and drifting evening drizzle.
c001-p083: >-
  A miniature opera singer stands atop a walnut music box, dressed in extravagant black feathers. Her mouth is open on an enormous note, one arm reaches beyond the painted proscenium, and nearby dust motes become a golden audience.
c001-p084: >-
  A calm portrait of a young man with albinism braiding his waist-length hair before dawn prayers. The only colors are warm brown hands, cool lavender shadow, and a narrow orange horizon seen through an undecorated room.
c001-p085: >-
  Give the recycling-center supervisor four arms and no glamour. Two sort glass, one checks a clipboard, the last holds a half-eaten pear; practical boots, reflective vest, close-set eyes, and a mountain of colored bottles blurred into festive bokeh.
c001-p086: >-
  A sheepdog in a red rain cape occupies the driver’s seat of an abandoned tractor. Mud stipples the muzzle, one paw rests solemnly on the wheel, and the straight-ahead gaze makes this feel less like a joke than a hard-earned rural portrait.
c001-p087: >-
  Overexposed summer close-up: a teen with a hearing implant, wet black curls, sunburned nose, and one dandelion held beneath the chin. White sky erases the setting; tiny airborne seeds and a half-suppressed sneeze provide all the motion.
c001-p088: >-
  In the corner of a vast throne room, an empress secretly darns her own sock. Heavy jade robes pool around a simple wooden hoop; her shaved head bears a maplike birthmark, and concentration makes imperial ceremony elsewhere in the hall irrelevant.
c001-p089: >-
  A clockwork rabbit boxer waits between rounds, brass ears bent asymmetrically. Oil darkens the towel over narrow shoulders, one glass eye is cracked, and a tiny human trainer’s hand enters the frame only to offer water.
c001-p090: >-
  Treat this as a costume plate with handwritten margin notes: coastal lighthouse keeper, seventy years old, indigo wool layers, cork-soled boots, storm lantern, pockets full of sea glass. The central figure looks away impatiently while annotations explain every repair.
c001-p091: >-
  At sunset, a dark-skinned archer removes the elaborate competition ribbons from her hair one by one. No bow is shown. The close portrait rests on loosened shoulders, aching fingers, copper light, and the private relief of no longer being watched.
c001-p092: >-
  A floating jellyfish child peers from inside a transparent school helmet filled with seawater. Bubbles catch in lavender tentacles, a lunchbox hangs from the chin strap, and the worried round face asks whether the first day will be survivable.
c001-p093: >-
  Block-print portrait of a stocky woodcutter leaning sideways under a sleeping fawn. Simplify coat, beard, and pine branches into rough umber shapes; reserve pale untouched paper for the animal’s spots and the man’s unexpectedly tender eyes.
c001-p094: >-
  Focus on a masked potter at the instant a vessel collapses between her hands. Instead of frustration, her visible eye shows delighted surprise; wet clay ribbons buckle across the foreground, and turquoise studio walls tilt playfully with the motion.
c001-p095: >-
  A once-famous dragon slayer now runs a quiet shoe-repair kiosk. She is short, muscular, and middle-aged, with a burn scar crossing one eyebrow; her old scale armor serves as a work apron while she threads a child’s tiny yellow boot.
c001-p096: >-
  1girl, asymmetrical bob, brown skin, oversized translucent raincoat, orange ear protectors, pockets stuffed with folded maps, standing at ease; loose marker rendering, cropped below the knees, thin mint outline, and no environmental clues.
c001-p097: >-
  A monastery cook tastes broth by touching one blue finger to his tongue. His six eyes close in sequence as the flavor registers, while steam curls around a shaved lavender head and the rough linen collar of a very ordinary apron.
c001-p098: >-
  Photograph-like anime candid of an older woman asleep on the last subway, chin lifted, grocery bag secured between sensible shoes. Fluorescent panels wash the carriage nearly colorless; one bouquet of purple onions and her peaceful face hold the frame together.
c001-p099: >-
  The young cloud shepherd is visible only from the chest up, emerging through the flock like a swimmer. Damp curls, sun-browned skin, chipped whistle, and a quilted vest fade at their edges into soft white vapor under a startling cobalt sky.
c001-p100: >-
  Final portrait in this set: an unnamed museum cleaner stands before a wall of blurred gold frames after everyone has left. She has a long silver braid, lime-green sneakers, tired wrists, and an open, curious expression as her mop becomes a temporary dance partner.

c002-p001: >-
  Extreme close-up as a child realizes the “stone” in her palm has begun to hatch. Her pupils widen toward the tiny crack; reflected gold light and one held breath do all the storytelling.
c002-p002: >-
  A bulldog’s face fills the square image during a thunderstorm: lower lip quivering, raincoat hood cinched too tightly, brave eyes fixed on someone just outside the frame.
c002-p003: >-
  Crop from brow to chin. A masked duelist has won, yet tears slip beneath the lacquered cheek guard; triumph, grief, and disbelief coexist without a visible battlefield.
c002-p004: >-
  Two grease-marked fingers lift a mechanic’s safety goggles. Behind them, her eyes cross toward a tiny screw stuck precisely to the center of her forehead.
c002-p005: >-
  Nearly abstract macro view of an ancient dragon waking: one amber iris opens between overlapping charcoal scales, its slit pupil reflecting a distant figure holding a birthday cake.
c002-p006: >-
  The punchline lands offscreen. Show an elderly judge fighting a laugh—compressed lips, watering eyes, one raised eyebrow—while her powdered wig slips almost imperceptibly sideways.
c002-p007: >-
  soft close crop, young vampire, pointed ears turning crimson, eyes lowered, one nervous fang caught on the lip; pale lilac field, thin pencil line, no gothic scenery.
c002-p008: >-
  A rabbit kit presses its nose against aquarium glass. On the other side, unseen except as rippling blue light, something enormous makes both ears stand perfectly upright.
c002-p009: >-
  Capture the instant before a sneeze ruins a royal ceremony. The prince’s jeweled face paint remains impeccable; nostrils flare, lashes squeeze shut, and a single feather trembles under his nose.
c002-p010: >-
  Through a cracked phone screen, a courier hears welcome news. Pixel fractures divide her exhausted face into shards, but the smile reaches every fragment.
c002-p011: >-
  A sea otter discovers its favorite shell is empty. Wet whiskers, paws frozen mid-tap, round eyes narrowing with forensic suspicion; calm turquoise water offers no explanation.
c002-p012: >-
  Only half of the singer’s face appears beyond a red velvet curtain. Her visible eye is closed, lipstick smudged, and a trembling inhale precedes the first note.
c002-p013: >-
  Ink-brush close-up of a furious monk whose anger is directed at a mosquito perched between his brows. Preserve spiritual dignity everywhere except the crossed eyes.
c002-p014: >-
  A porcelain automaton tries to wink for the first time. One painted lid closes correctly; the other rotates sideways, exposing tiny gears and an expression of mechanical alarm.
c002-p015: >-
  Frame the reflection inside a soup spoon: the chef tastes a broth that perfectly recreates home, and stern concentration softens into startled, private longing.
c002-p016: >-
  A wolf with frost-silver fur bares its teeth, not in aggression but to let a field medic examine one painfully chipped canine. Pride and embarrassment sharpen the blue gaze.
c002-p017: >-
  manga close crop, goalkeeper after the impossible save, cheek flattened against muddy grass, eyes squeezed shut, ecstatic shout, loose turf suspended above the panel border.
c002-p018: >-
  An older woman opens a letter written in her own childhood handwriting. Keep the page unreadable; let recognition travel from knitted brows to a small, incredulous smile.
c002-p019: >-
  A tiny forest spirit peers through the hole in a maple leaf. Its acorn-cap hat, bead-black eyes, and pursed mouth form a perfect portrait inside the ragged opening.
c002-p020: >-
  Seen at water level, a swimmer surfaces beside the camera and gasps into cold sunrise. Droplets cling to lashes; effort gives way to sheer delight.
c002-p021: >-
  Close on a stage villain backstage, still wearing terrifying skull makeup while carefully applying a bandage to a paper cut. His offended pout undermines every menacing contour.
c002-p022: >-
  The camera is inside the mailbox. A postal worker opens the door and finds it crammed with glowing moths; warm surprise illuminates her face from below.
c002-p023: >-
  A ginger cat has bitten a lemon. Wrinkled muzzle, flattened ears, accusatory green eyes; render the disastrous realization with lavish painterly seriousness.
c002-p024: >-
  Sideways composition of a girl listening through the apartment wall, one cheek pressed against faded wallpaper. Her expression shifts when a lullaby begins next door.
c002-p025: >-
  His spectacles have fogged at the crucial moment. An elderly detective peers over the white lenses, lower eyelid twitching, as the blurred culprit apparently walks straight past.
c002-p026: >-
  An astronaut’s first view of home after years away exists only as blue reflected across the visor. Beneath it, weathered eyes crease into silent relief.
c002-p027: >-
  The hamster mayor receives terrible budget news. Cheeks remain full of sunflower seeds, one monocle drops, and both tiny paws grip the podium outside the crop.
c002-p028: >-
  Focus on a dancer biting one gold hairpin between her teeth while fixing a complicated bun. Determination, haste, and stage fright gather in the mirror-facing gaze.
c002-p029: >-
  A blind cave salamander meets sunlight for the first time. Its translucent face tilts upward, gills flare pink, and warmth glows through delicate skin.
c002-p030: >-
  Head tilted back, mouth open, an exhausted firefighter laughs in unexpected rain. Soot breaks into black rivers across her face; the helmet brim catches silver drops.
c002-p031: >-
  A young king listens while his crown is removed. Without the gold weight, deep tension leaves the jaw and his face suddenly looks its actual age.
c002-p032: >-
  Graphic red-and-cream close-up of a rooster realizing dawn has arrived before he is ready. One eye snaps wide; feathers point in every direction.
c002-p033: >-
  Her opponent offers a hand from beyond the panel. The wrestler’s bruised face moves from suspicion to respect, conveyed through a loosening brow and one reluctant grin.
c002-p034: >-
  Show a stone gargoyle trying not to cry. Rain runs everywhere, making the single tear impossible to identify except for the embarrassed softness around carved eyes.
c002-p035: >-
  A musician hears one string go flat during the quietest passage. Macro framing on ear, temple, and widening eye; the offending vibration appears as a crooked blue line.
c002-p036: >-
  Beneath a beekeeper veil, a bee lands on the tip of a child’s nose. Crossed eyes and a disciplined attempt at stillness create gentle tension.
c002-p037: >-
  Tight profile of an orc tailor snapping a thread with one tusk. Thick fingers hold exquisite lace near the mouth; satisfaction lifts the scarred cheek.
c002-p038: >-
  A snowman watches the first spring drop fall from its own carrot nose. Pebble eyes cannot move, so give the melting mouth an eloquent, philosophical curve.
c002-p039: >-
  The tea is far too hot. A dignified ambassador maintains formal eye contact while steam escapes his nostrils and one tear gathers against protocol.
c002-p040: >-
  Cropped behind a translucent rain hood, a teenager spots a lost dog across traffic. Shock becomes recognition; neon streaks bend over the plastic around her face.
c002-p041: >-
  A small owl wakes in daylight, pupils shrinking to pinpoints. Fluffed facial feathers and a look of profound personal betrayal fill the frame.
c002-p042: >-
  Comic-panel close-up: pirate captain, magnificent eyeliner, missing tooth, bitten coin, instant regret. The “gold” bends like chocolate between her teeth.
c002-p043: >-
  At the finish line, a runner realizes she has tied with her oldest rival. Sweat, disbelief, then a sideways smile aimed beyond the crop.
c002-p044: >-
  One green eye peers through bandages as a recovering giant sees a sprouting plant on the windowsill. The visible brow lifts with careful hope.
c002-p045: >-
  A raccoon caught stealing noodles freezes mid-slurp. Broth shines on whiskers; both paws hover, and the long noodle connects its guilty face to an unseen bowl.
c002-p046: >-
  Render an intimate lipstick touch-up during an evacuation drill. Siren-red light pulses across the mirror while the office manager steadies one hand and refuses panic.
c002-p047: >-
  A young necromancer’s spell produces a daisy instead of a skull. Violet eyes stare down, baffled; the flower’s yellow reflection warms an otherwise severe face.
c002-p048: >-
  The horse leans into a familiar palm, eyelid drooping and lower lip slack. Close enough to see dust in short summer hair and trust in the softened muzzle.
c002-p049: >-
  A chef smells smoke, but not from her kitchen. Her pleasant expression vanishes one muscle at a time as orange light grows beyond the frame.
c002-p050: >-
  flat colors, severe crop, blue-skinned office demon hearing praise for the first time; tiny horns, loosened tie, stunned pupils, blush spreading all the way to pointed ears.
c002-p051: >-
  An old sailor recognizes a constellation hidden by city light for forty years. Telescope eyepiece rings one watering eye; wonder wrinkles the entire surrounding face.
c002-p052: >-
  A baby elephant attempts to hide behind its own ear. One bright eye and the tip of a nervous trunk remain visible against wrinkled gray folds.
c002-p053: >-
  Through a jeweler’s loupe, the viewer meets a watchmaker who has found an impossible landscape inside the mechanism. Magnified iris, steady brow, reflected miniature mountains.
c002-p054: >-
  She bites her medal to satisfy the photographers, then discovers it is actually delicious. The athlete’s staged grin collapses into delighted confusion.
c002-p055: >-
  A paper-mâché moon hangs inches from the actor’s face. He has forgotten the next line; panic shines beneath theatrical silver freckles while the cardboard prop smiles serenely.
c002-p056: >-
  An axolotl barista peers over a cup whose foam portrait resembles him exactly. External gills rise like pink question marks around a pleased, puzzled face.
c002-p057: >-
  Capture a child learning to whistle: pursed lips, puffed cheeks, furrowed concentration. A nearby canary, visible only as one yellow blur, appears judgmental.
c002-p058: >-
  Tight diagonal image of a courier shouting into mountain wind. Scarf crosses the mouth, ice catches in lashes, and the unheard message strains every feature.
c002-p059: >-
  A koi prince presses his face above the pond surface to inspect snowfall. Water magnifies the lower half; orange scales meet white flakes at the rippling boundary.
c002-p060: >-
  The violinist opens one eye after the final note and finds the hall empty. Her bow remains raised; surprise is quieter than disappointment.
c002-p061: >-
  Macro portrait of a snail emerging after rain, antennae extended toward a strawberry. Its tiny mouth opens with operatic amazement; droplets turn the garden into colored prisms.
c002-p062: >-
  A librarian suppresses a scream when a spider descends onto her glasses. Keep the face composed below the nose; let both eyes reveal the emergency.
c002-p063: >-
  From inside a cupboard, show an insomniac reaching for a midnight mug. Refrigerator-blue light, tangled hair, one closed eye, and immediate shame at the clattering dishes.
c002-p064: >-
  A bronze statue hears birds nesting in its hollow crown. Though the face cannot change, a sparrow’s reflected movement makes the oxidized eyes seem newly gentle.
c002-p065: >-
  Close crop on a boxer receiving unexpected kindness from an opponent who reties her loosened braid. Bruised brow relaxes; the unseen hands enter softly from above.
c002-p066: >-
  A pufferfish inflates at the sight of its own reflection, then looks offended that the rival did likewise. Round composition, tiny fins, enormous indignation.
c002-p067: >-
  The apprentice mage mouths “oh” as gravity reverses. Loose curls, earrings, and chalk dust all rise while her face remains centered in stunned stillness.
c002-p068: >-
  A grandmother tastes her grandson’s first terrible soup. Kind eyes, heroic swallow, lips searching for a survivable compliment; patterned kitchen tiles blur behind her.
c002-p069: >-
  Under ultraviolet light, hidden constellations appear across a courier’s freckles. She sees them in a compact mirror and forgets to breathe.
c002-p070: >-
  A seal balances a teacup on its nose with grave concentration. One whisker twitches; distant applause reflects as warm points inside glossy black eyes.
c002-p071: >-
  Draw the moment an actor removes a monster mask and discovers another smaller mask underneath. His visible ears redden while one hand hesitates at the second edge.
c002-p072: >-
  A little witch peers over an enormous spellbook, eyebrows singed into commas. Green smoke clears to reveal an expression equal parts pride and concern.
c002-p073: >-
  Only the face of a subway conductor remains sharp as tunnel lights alternate gold and black. She has just seen someone familiar on an impossible platform.
c002-p074: >-
  A chameleon tries to lie. Its mouth smiles confidently while each eye looks elsewhere and embarrassed coral color spreads across emerald scales.
c002-p075: >-
  Portrait fragment: cracked lips drinking water after a desert crossing, trembling fingers around a tin cup, closed eyes reflecting white relief.
c002-p076: >-
  A royal portrait painter realizes the empress is making a ridiculous face. Show the artist’s struggle for professionalism, brush hovering beside an uncontrollable grin.
c002-p077: >-
  Close on a moth emerging from its cocoon at night. Damp wings remain folded; fuzzy antennae lift toward moonlight with exhausted, solemn concentration.
c002-p078: >-
  The old goalkeeper removes a mud-caked glove and sees a marriage proposal written on the palm. Weathered face, missing eyebrow, absolute astonishment.
c002-p079: >-
  A robot’s single camera lens attempts to focus through tears made of coolant. Warning icons flicker around a reflected reunion just outside view.
c002-p080: >-
  At a silent auction, a woman recognizes her own lost childhood drawing. Catalog held beneath her mouth, shoulders cropped away, memory arriving visibly through the eyes.
c002-p081: >-
  The wolf pup howls for the first time and startles itself. Ears snap back, mouth stays round, pale breath hangs against night.
c002-p082: >-
  Beneath ornate stage makeup, a dancer notices one eyelash coming loose. Intensely crossed eyes and rigid composure turn the glamorous close-up into comedy.
c002-p083: >-
  A fisherman holds a pearl near his ear and hears surf from a vanished ocean. Salt-lined face softens; the tiny sphere contains blue moving light.
c002-p084: >-
  Tight crop, bald woman, strong nose, chipped gold tooth, tears of laughter, deep crow’s-feet; loose charcoal rubbed by hand, one stripe of turquoise pastel.
c002-p085: >-
  A red fox wakes beneath falling cherry petals, one blossom stuck to its tongue. Sleepy amber eyes slowly cross toward the unexpected pink taste.
c002-p086: >-
  The potion label says COURAGE. After one sip, the timid knight’s pupils blaze—then his face puckers because it tastes overwhelmingly of vinegar.
c002-p087: >-
  A child sees bioluminescent plankton on her fingertips. Everything beyond fingers, cheek, and enormous reflected blue specks disappears into coastal darkness.
c002-p088: >-
  Close-up of an elderly tailor threading a needle despite shaking hands. When the thread finally passes through, fierce concentration cracks into triumph.
c002-p089: >-
  A crow examines a shiny button, turning it until a tiny human face appears in reflection. Curiosity sharpens the black eye; oil-slick feathers fill the rest.
c002-p090: >-
  During a formal portrait, the general’s newborn sneezes offscreen. Her battle-hardened expression melts instantly; only a small reaching hand enters the lower corner.
c002-p091: >-
  An underwater singer releases one note as a silver bubble. Her teal face distorts behind it, eyes closed, floating hair framing a perfect circle.
c002-p092: >-
  The beekeeper recognizes the queen among thousands. Macro framing catches awe in one visible eye while striped bodies crawl harmlessly across the veil.
c002-p093: >-
  A stone-faced detective opens a lunchbox packed with tiny smiling rice bears. Stern eyebrows remain fixed; the mouth betrays gratitude.
c002-p094: >-
  Extreme profile of a sprinter awaiting the gun: jaw loose, nostril flared, one bead of sweat traveling backward along the cheek in stadium wind.
c002-p095: >-
  A young dragon attempts its first smoke ring. Cheeks balloon, nostrils glow, and the crooked gray loop inspires disproportionate pride.
c002-p096: >-
  Framed by hanging laundry, an old neighbor hears music from the courtyard below. One eye closes to place the melody; a forgotten clothespin rests between her lips.
c002-p097: >-
  A frog prince waits for a kiss, then notices the approaching person has a cold. Hope turns to alarm across one glossy green face.
c002-p098: >-
  The climber reaches the summit and finds a vending machine. Windburn, cracked goggles, bewilderment; its bright buttons reflect across both lenses.
c002-p099: >-
  A sleepy child whispers a secret into the ear of a colossal plush bear. Close enough to see flattened fur, tiny fingers, and the seriousness of confidential news.
c002-p100: >-
  End on a face half-lit by dawn: an adult who stayed awake beside a sick animal hears the first healthy purr. Exhaustion loosens into relief before any smile fully forms.

c003-p001: >-
  A tall seamstress crosses an empty tram depot in a coat assembled from obsolete route maps. Full figure, long stride, red boots; folded paper districts lift behind her like restless feathers.
c003-p002: >-
  fashion plate: compact older man, lemon three-piece suit, translucent rain cape, silver walking stick, spotless white sneakers; strict front pose surrounded by handwritten fabric swatches.
c003-p003: >-
  Barefoot on black sand, a broad woman wears a gown woven from pale fishing nets and green sea glass. Wind pulls the train horizontally while she calmly repairs one knot.
c003-p004: >-
  A teenage beekeeper models practical spring layers beside a single wooden hive: cropped canvas jacket, wide trousers, mesh hood thrown back, striped socks, and yellow gloves clipped at the hip.
c003-p005: >-
  Show an android diplomat descending marble stairs in asymmetric ceremonial tailoring. One half is matte ivory pleats; the other exposes cobalt joints beneath a transparent structured sleeve.
c003-p006: >-
  An elderly skateboarder waits under a flyover wearing a plum sari over knee pads and scuffed high-tops. Her silver braid nearly reaches the board; relaxed contrapposto, concrete-gray background.
c003-p007: >-
  Layered winter outfit for a fox-headed courier: quilted indigo coat, orange harness, four letter bags, wrapped paws, tail protected by a buttoned sleeve. Side view while climbing into wind.
c003-p008: >-
  A shy giant tries formalwear tailored from midnight velvet. The jacket fits beautifully, but ankles and wrists extend beyond the sample-room screen; capture the fitting pins and apologetic stoop.
c003-p009: >-
  In one continuous ribbon of coral fabric, dress a dancer from shoulder to ankle. The material loops through open air as she balances on one foot, body forming the quiet center of its turbulence.
c003-p010: >-
  Streetwear portrait beneath flat noon light: freckled bike mechanic, stocky build, cropped teal overalls, striped compression socks, tool-belt chain, grease-dark clogs, arms loose after work.
c003-p011: >-
  A raven aristocrat attends a garden party in a high-collared cream suit. Glossy wings replace sleeves; fitted trousers end above polished claw guards, and one fallen petal is inspected with disdain.
c003-p012: >-
  Full-length back view of a night-shift nurse leaving the hospital. Her ordinary navy scrubs disappear beneath an enormous hand-knit sunrise shawl; tired shoes step into genuine morning color.
c003-p013: >-
  Children’s-book styling for a mushroom rain ensemble: round cap hat, spotted poncho, russet bloomers, moss-green boots. The small wearer leaps over one puddle while a basket swings overhead.
c003-p014: >-
  An androgynous violinist wears a sharply cut black tailcoat with a pale pink lining visible only in motion. Catch the bow, coat hem, and long skirt-trousers at the peak of a turning step.
c003-p015: >-
  Desert workwear designed for an eight-armed archaeologist—wrapped linen, shaded utility vest, separate tool belts, knee-high sand gaiters. Each hand performs a different careful task around one half-buried tile.
c003-p016: >-
  The outfit is almost entirely pockets. A round-faced child stands proudly in an olive explorer suit packed with chalk, apples, string, feathers, and one drowsy hamster peeking from the chest.
c003-p017: >-
  A retired opera star waters balcony plants in an old crimson stage gown, rubber gardening boots, and a faded tour sweatshirt. Full body, domestic morning, grandeur made comfortable.
c003-p018: >-
  Minimal editorial composition: dark-skinned model in a geometric white dress, square shoulders, circular hip panels, triangular hem; one cobalt glove and a hard shadow provide the only color or setting.
c003-p019: >-
  A snow leopard mountaineer tests a new climbing suit fitted around powerful feline anatomy. Slate fabric, chartreuse seams, tail harness, soft crampon boots; crouched pose on a plain technical backdrop.
c003-p020: >-
  At a roadside melon stall, an elderly traveler wears sun-faded layers gathered across decades: striped tunic, patched lilac trousers, straw cape, red scarf, and immaculate pearl earrings.
c003-p021: >-
  Depict a young prince escaping a banquet in stocking feet. Brocade jacket unbuttoned, jeweled sash dragging, formal skirt gathered in both hands; his abandoned shoes remain by the bright doorway.
c003-p022: >-
  A robust ceramicist turns slowly in a clay-stained wrap jumpsuit so the garment can be seen from every angle. Three ghosted poses share the same warm studio page.
c003-p023: >-
  Insect couture without human anatomy: a mantis stands upright in an emerald fan-shaped cape and tiny gold collar, forelegs folded elegantly, wings patterned like stained glass behind the silhouette.
c003-p024: >-
  A modest school uniform customized by years of repair—mended elbows, embroidered constellations, mismatched buttons, lengthened hem. The lanky student stretches to catch a train strap, showing every alteration.
c003-p025: >-
  Full-body portrait of a moon mechanic wearing silver insulated trousers and a tomato-red cardigan over the pressure layer. Helmet at her feet, wrench in back pocket, Earthlight outlining short curls.
c003-p026: >-
  An older trans woman poses outside her corner shop in a mint trouser suit, patterned head wrap, sensible loafers, and gold bangles stacked to the elbows. Neighborhood posters make a loose graphic frame.
c003-p027: >-
  The cape is alive: dozens of small blue moths settle into a garment whenever the wandering magician stands still. Show him mid-step as the hem dissolves into flight.
c003-p028: >-
  A chubby teenage drummer chooses festival clothes in front of a mirror—wide red hakama, sleeveless black shirt, wrapped wrists, glitter socks. Depict both uncertain front and confident reflection.
c003-p029: >-
  Clothing study for a river ferryman whose body is made of reeds. Waxed apron, braided-rope belt, broad sun hat, sandals tied around rootlike feet; pose with pole against blank parchment.
c003-p030: >-
  Make a ball gown from emergency blankets. A scarred rescue captain wears the crinkled silver volume with orange webbing and steel-toe boots, standing unapologetically beneath warehouse lights.
c003-p031: >-
  A little boy in his grandfather’s oversized cream suit walks down a hallway like a runway. Rolled sleeves swallow his hands, belt loops twice, paper crown steady; serious expression, enormous shadow.
c003-p032: >-
