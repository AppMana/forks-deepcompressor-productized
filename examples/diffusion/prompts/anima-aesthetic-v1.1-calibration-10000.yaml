  A rescue camel kneels in a sandstorm to shelter lost travelers. Red harness lights, white robes gathered against its broad side.
c020-p076: >-
  Hospital robot carries six IV poles while nurses push patients. Metal arms, transparent bags, emergency lights, controlled corridor movement.
c020-p077: >-
  A carpenter braces a collapsing home with a dining table. Family crawls out; wedding photos slide across tilted wall.
c020-p078: >-
  The mountain ranger uses sign language across a canyon to guide stranded climbers. Orange sleeves visible through fog, responses from tiny hands.
c020-p079: >-
  A mermaid rescues a drowning fire spirit. Water hands cradle tiny flame inside an air bubble without extinguishing it.
c020-p080: >-
  1woman, rescue pilot, older, dark skin, short gray curls, red flight suit, prosthetic right leg, helmet under arm; windblown full figure.
c020-p081: >-
  A dog digs beneath earthquake debris until one human hand appears. Dusty paws, red vest, handler kneeling, sunbeam entering crack.
c020-p082: >-
  During a festival crush, a stilt walker lifts children above the crowd. Long striped legs, lanterns, calm hands passing them toward balcony.
c020-p083: >-
  A robot gardener rescues seedlings from sudden frost. Heat lamps open like wings while metal body shields fragile green rows.
c020-p084: >-
  The old swimmer dives from a ferry to retrieve a stranger’s medicine bag. Gray sea, clothes left on deck, white wake below.
c020-p085: >-
  A child lowers lunch to a trapped construction worker through a pipe. Yellow note, red apple, darkness answering with one grateful hand.
c020-p086: >-
  Rescue at an animal hospital blackout: staff use phone lights, incubator batteries, warm towels, and their own bodies to protect newborns.
c020-p087: >-
  A snowman melts itself to free flowers trapped in unexpected ice. Carrot nose, shrinking arms, colorful petals rising through water.
c020-p088: >-
  The village potter forms replacement roof tiles during a storm. Wet clay, community kiln, neighbors carrying fresh pieces overhead.
c020-p089: >-
  A young astronaut catches a tumbling colleague with one boot tether. Earth below, gloved hands inches apart, white suits crossing.
c020-p090: >-
  Forest fire rescue shown from inside a rabbit burrow. Animals stream past roots while firefighter’s masked face appears at the entrance.
c020-p091: >-
  A one-eyed tugboat captain steers beneath a collapsing pier to reach swimmers. Green coat, wooden wheel, black beams falling around red boat.
c020-p092: >-
  The giantess lifts an entire flooded bus onto dry ground. Knees in water, passengers at windows, city rain on enormous shoulders.
c020-p093: >-
  Rescue workers use a piano as a stretcher after the theater roof falls. Black instrument, white dust, musician holding injured hand.
c020-p094: >-
  A fox paramedic treats a hedgehog without removing quills. Tiny blue gloves, bandage strips, roadside grass, ambulance bicycle.
c020-p095: >-
  An old witch reverses the river for seven seconds. Villagers pull a child from exposed stones before water returns in silver walls.
c020-p096: >-
  A robot with no waterproofing crosses rain to carry a human battery pack. Sparks at joints, package dry under metal chest.
c020-p097: >-
  The last trapped miner is located by a flower growing toward his breath. Rescue team follows the bent stem through black tunnel.
c020-p098: >-
  A deaf child alerts swimmers to a silent tsunami alarm by waving a red towel from the pier. People turn toward retreating sea.
c020-p099: >-
  After the rescue, responders sit on a curb sharing oranges. Dirty gear, wet blankets, sunrise, no one posed heroically.
c020-p100: >-
  Final frame: empty red life ring swings from a wet rope above calm water, distant boat returning with every passenger aboard.
