  A moonlit full-length portrait of two garments on one person: rigid ceremonial shell opening at the back to reveal soft striped sleepwear. The exhausted ambassador has already kicked off one official shoe.

c004-p001: >-
  A bus ticket unfolds into hundreds of luminous paper cranes around a weary student. Their wings stitch a cobalt battle coat directly over her school cardigan while commuters remain asleep.
c004-p002: >-
  transformation sequence, three uneven panels: muddy gardener raises a seed; roots braid into boots; sunflower armor blossoms overhead. Keep soil under her nails throughout the radiance.
c004-p003: >-
  An older magical heroine activates a tarnished compact in her grocery-store uniform. Silver ribbons repair the frayed knees first, then become practical armor around a body that remembers every pose.
c004-p004: >-
  Underwater, a shy diver’s bubbles flatten into mirrored scales. Fins of stained-glass light extend from her elbows as the oxygen hose turns into a long white sea serpent.
c004-p005: >-
  The spell begins in one untied shoelace. Scarlet thread climbs a sprinter’s leg, loops around the torso, and knots itself into a streamlined comet uniform before the starting gun.
c004-p006: >-
  A moon rabbit pounds one glowing rice cake; each impact sends a ring through space, replacing flour-dusted work clothes with pearl gauntlets and a crater-patterned cape.
c004-p007: >-
  Nothing sparkles. Black ink leaks from the librarian’s fingertips, draws a severe silhouette around her, then peels from the page as a raven-feather uniform.
c004-p008: >-
  Midair costume change for a wheelchair-using heroine: wheels open into golden sun discs, lap blanket becomes a pleated orange mantle, and gloved hands steer arcs of daylight.
c004-p009: >-
  A tiny frog familiar pulls the emergency cord. Its anxious owner is wrapped by green pond rings, lily-pad shoulder guards, and a translucent rain cloak seconds before impact.
c004-p010: >-
  Her grandmother’s quilt rises from the bed in colored squares. Each patch settles over the teenage protector as soft armor, preserving faded embroidery and one old tea stain.
c004-p011: >-
  Transformation through sound: a cellist’s low note forms indigo bands around bowed shoulders; higher harmonics become silver boots, a high collar, and vibrating strings of light.
c004-p012: >-
  A cook slams a pot lid like a gong. Steam draws a white dragon around her stocky body, the apron hardens into ceramic plates, and two ladles become crescent blades.
c004-p013: >-
  Close to the ground, a skateboarding witch kicks through a chalk circle. Graffiti colors climb the board, socks, jacket, and hair while the concrete opens into a star field.
c004-p014: >-
  The prince transforms into a magical girl without changing gender or body. Rose-gold armor blooms over formal trousers; long ribbons frame his delighted, unguarded grin.
c004-p015: >-
  Autumn leaves do not circle politely; they strike like a storm. An elderly park keeper braces as red foliage assembles into fox-eared armor and a broad rake-spear.
c004-p016: >-
  A mechanic turns a socket wrench once. Six translucent machine diagrams rotate around her, snapping teal exoskeleton pieces into place while grease marks remain visible beneath the visor.
c004-p017: >-
  Inside a dark train tunnel, window reflections detach from a commuter and dress each reflected version differently. She chooses the plain silver one by touching its hand through glass.
c004-p018: >-
  Transformation interrupted: one boot is celestial armor, the other still a fuzzy slipper. The sleepy heroine hops through the kitchen as a meteor approaches the apartment window.
c004-p019: >-
  A desert child opens an empty canteen. The last drop becomes a turquoise ribbon, winding upward into flowing water sleeves, glass sandals, and a protective halo shaped like a well.
c004-p020: >-
  Moth-wing cape, velvet antennae, charcoal bodice, lamp-gold eyes. Show the nocturnal guardian emerging slowly from a cocoon made of her own oversized winter coat.
c004-p021: >-
  A deaf heroine signs her activation phrase. Each precise hand shape leaves a glowing geometric afterimage; those shapes lock together as coral-and-white armor around her.
c004-p022: >-
  The transformation resembles mending, not magic. Invisible needles repair a battered rescue uniform with constellations of gold thread while its exhausted owner keeps walking into rain.
c004-p023: >-
  A capybara bath attendant lifts one yuzu like a sacred orb. Citrus slices orbit the round body, forming yellow spa robes, wooden sandals, and a fragrant steam crown.
c004-p024: >-
  Portrait of the exact instant a scarecrow becomes a storm knight: straw hair lifts vertically, stitched eyes ignite blue, and rain-dark metal grows between patches of burlap.
c004-p025: >-
  A botanist drinks terrible vending-machine coffee. The crumpled cup expands into a white flower cannon; her lab coat sprouts leaf epaulets and caffeine-bright emerald wings.
c004-p026: >-
  Use flat paper-cut shapes. A child folds her red umbrella inward; the panels rearrange as a round shield, hooded cape, and six hovering waterproof familiars.
c004-p027: >-
  A solar eclipse crosses the heroine from head to toe. Daylight costume fades into black glass, then a thin corona traces every seam against the suddenly dim playground.
c004-p028: >-
  Make the magical change almost invisible: a tired office worker loosens her tie, and its navy stripe continues around the body until ordinary clothes resolve into quiet midnight armor.
c004-p029: >-
  A young fisher throws a net skyward. It catches stars rather than fish, tightening into a silver mesh dress while cork floats become orbiting amber shields.
c004-p030: >-
  The cat transforms first and looks magnificent. Its owner remains in pajamas, staring at the animal’s jeweled lion armor while her own wand displays an apologetic error symbol.
c004-p031: >-
  Seven soap bubbles land on a laundromat attendant: helmet, shoulder guards, gloves, belt, knee plates, boots. Rainbow film holds until she steps through the automatic door.
c004-p032: >-
  A mountain climber’s emergency blanket catches aurora light. Foil unfolds into green-violet wings, crampons sharpen into ice stars, and braided rope forms a luminous safety halo.
c004-p033: >-
  Show a magical grandmother transforming by removing hairpins. Each released silver coil becomes a crescent blade; her floral house dress lengthens into a midnight robe.
c004-p034: >-
  A broken arcade cabinet chooses its repair technician. Pixel hearts flood from the screen, converting her coveralls into blocky magenta armor with a health bar hovering at one percent.
c004-p035: >-
  During an exam, equations escape the page and orbit a panicked student. Fractions become pleats, graph axes become a staff, and the answer key forms transparent blue wings.
c004-p036: >-
  A bee swarm outlines the heroine without touching her. Honey light fills the silhouette from boots upward, leaving hexagonal amber armor when the insects disperse.
c004-p037: >-
  Transformation in reverse: after the battle, jeweled plates dissolve into bathwater around a bruised young woman. She exhales as the final tiara becomes an ordinary hair clip.
c004-p038: >-
  A snowball thrown by a child expands around her teenage sister. It opens as white feather armor, blue mitt gauntlets, and an absurdly long scarf already tied for combat.
c004-p039: >-
  The opera singer holds one impossible note. Cracks race across her plain black dress, revealing a molten-gold stage costume beneath without changing her steady stance.
c004-p040: >-
  Four-panel manga page: timid minotaur finds a lipstick wand, checks the label twice, transforms into rose-plated guardian, then cries happily at the matching horn ribbons.
c004-p041: >-
  A painter drags one vermilion brushstroke around her body. Wet color becomes a broad sash, lacquered boots, fox mask, and two calligraphic tails that never stop moving.
c004-p042: >-
  An astronaut’s tether loops into a glowing infinity sign. Vacuum-safe armor unfurls like white petals while Earth occupies the lower curve of the composition.
c004-p043: >-
  No complete figure—only successive footprints changing across wet pavement: sensible loafers, barefoot sparks, silver armored soles, then two small craters where the heroine launches.
c004-p044: >-
  A violin repairer draws a bow across loose horsehair. The vibrating strands wrap her in amber varnish light and assemble an elegant wooden cuirass with f-hole motifs.
c004-p045: >-
  The dragon girl sneezes mid-transformation. Flame ribbons tangle, one wing is enormous, one boot remains a sock, and the familiar frantically reads instructions.
c004-p046: >-
  A subway map glows through the station cleaner’s gloves. Colored routes climb the broom, skirt, and jacket, converging at a radiant hub over her heart.
c004-p047: >-
  When a young healer activates her power, every scar becomes a thin gold branch. Leaves spread outward to form armor but never erase the healed skin beneath.
c004-p048: >-
  A black sheep stamps once on a hilltop. Wool whirls away, twists into cloud armor, and returns as a thunderous mane around its tiny determined face.
c004-p049: >-
  The lighthouse keeper raises an old lantern. Its beam wraps horizontally around her broad body, hardening into white-and-red bands and a glass beacon crown.
c004-p050: >-
  Transformation costume inspired by carpentry: measuring tape circles the waist, pencil marks become seams, wood shavings curl into pauldrons, and a folding ruler opens as golden wings.
c004-p051: >-
  An introverted princess whispers the phrase too quietly. Magic leans close like curious smoke, then settles into a modest moss cloak and soft armor rather than expected spectacle.
c004-p052: >-
  A wheelchair basketball captain spins once; court markings lift from the floor and wrap both wheels, jersey, arms, and backrest in sharp red-white energy bands.
c004-p053: >-
  Her tears fall upward before she does. Each droplet becomes a clear scale, assembling aquatic armor around a runaway bride while the abandoned veil transforms into fins.
c004-p054: >-
  A pastry chef pipes one spiral of cream into the air. It expands as a white ruff, strawberry shoulder gems, wafer skirt panels, and caramel boots—delicious-looking but battle-ready.
c004-p055: >-
  On a rooftop garden, a shy boy touches a tomato leaf. Vines trace his limbs into emerald armor, red fruit becomes floating shields, and his glasses remain stubbornly ordinary.
c004-p056: >-
  A cracked porcelain doll asks to fight for herself. Painted flowers lift from her cheeks, cover fractures in blue armor, and assemble a sword from discarded ceramic shards.
c004-p057: >-
  Show the heroine reflected in six rain puddles, each holding one stage of the change. The real girl stands between them in plain clothes, uncertain which reflection to enter.
c004-p058: >-
  A traffic officer raises a glowing baton. Crosswalk stripes peel from the asphalt into a monochrome cape; signal colors lock into red, amber, and green gauntlets.
c004-p059: >-
  The magical outfit grows by fermentation: a baker opens a crock, warm bubbles float upward, and patterned layers slowly expand like living sourdough around her.
c004-p060: >-
  A wolf grandmother howls one low note. Moonlight combs gray fur into silver braids, wraps a practical indigo tunic around her, and sharpens a walking stick into a spear.
c004-p061: >-
  During a power outage, an anxious child clicks a cheap star projector. Plastic constellations cover the bedroom, then detach as tiny armor plates and a rotating night-sky skirt.
c004-p062: >-
  A detective’s transformation is concealed inside closing blinds. Through alternating slats, trench coat becomes feathered armor, magnifier becomes a moon lens, and weary eyes turn bright violet.
c004-p063: >-
  A gardener plunges both hands into compost. Dark earth spirals upward as rich brown armor crowded with roots, beetles, and one proud mushroom crest.
c004-p064: >-
  Futuristic magical-girl activation through medical braces: supports around a runner’s knees illuminate, unfold safely, and become a lightweight exosuit with lavender shock-absorbing ribbons.
c004-p065: >-
  A raccoon laundress discovers one sock is enchanted. It stretches into a striped cape, the clothespin basket becomes a crown, and soap foam supplies shining round armor.
c004-p066: >-
  The heroine’s shadow transforms while she does not. On the wall, it grows antlers, armor, and wings; she steps backward into that silhouette and emerges changed.
c004-p067: >-
  A red-haired engineer is assembled into battle dress by tiny maintenance robots. They argue over instructions, install mismatched shoulder plates, and leave one warning label on her forehead.
c004-p068: >-
  Magic travels along a deafblind woman’s cane as tactile golden pulses. Her coat reorganizes into protective layered petals, each seam marked by raised constellations.
c004-p069: >-
  At low tide, a shell collector arranges seven finds in a circle. They open simultaneously, projecting pearlescent garments and a spiral staff around her wet rolled trousers.
c004-p070: >-
  A tiny office plant chooses the stern accountant beside it. Leaves explode across gray cubicles, tailoring an extravagant green uniform while she keeps hold of the spreadsheet.
c004-p071: >-
  A magical boy activates a compact shaped like a train pass. Platform wind lifts his long coat into wing panels; glowing rails converge as silver boots.
c004-p072: >-
  Instead of ribbons, use carpenter ants. They carry gold segments into place over the entomologist’s field clothes, building delicate jointed armor with busy precision.
c004-p073: >-
  Transformation by erasure: a charcoal figure rubs away her old outline with one palm, revealing vivid coral clothing and luminous blue skin beneath the gray dust.
c004-p074: >-
  A round moon appears inside the washing machine. When the door opens, the waiting student is dressed in a clean white sailor coat with orbiting soap-bubble planets.
c004-p075: >-
  The retired hero’s transformation takes longer now. Show her patiently waiting while one stubborn knee guard loads, tea steaming in hand, familiar asleep on the sofa.
c004-p076: >-
  A young priest rings two handbells; sound waves become transparent circular sleeves, bronze greaves, and a halo that vibrates without casting light.
c004-p077: >-
  A fish-market porter cuts the twine around a crate. The cord whips into red knots across a navy uniform while silver scales assemble as flexible protective plates.
c004-p078: >-
  Mid-transformation silhouette against white: afro expanding into a star field, strong arms crossed, gold bands forming from elbows inward, long violet coat still only half solid.
c004-p079: >-
  A magical librarian summons armor from overdue notices. Stamped dates become patterned panels, red reminder slips form the cape, and a barcode wand scans the darkness.
c004-p080: >-
  The caterpillar heroine begins as six tiny boots. Her body elongates upright, cocoon silk tailors a velvet suit, and new stained wings remain bashfully folded behind.
c004-p081: >-
  A construction worker draws a safety triangle in the air. Fluorescent lines expand into a protective orange coat, hard-light helmet, and striped barrier staff.
c004-p082: >-
  Rain writes the costume directly onto a cyclist. Every drop leaves a reflective blue mark until jacket, wheel guards, and finlike cape become complete at full speed.
c004-p083: >-
  A shrine fox steals the wand and transforms into the heroine instead. Nine oversized ribbon tails fill the frame while the human owner points indignantly from below.
c004-p084: >-
  Painted on rough plaster: a baker’s daughter spins through airborne flour, which sketches white armor before oven heat fires it into warm terracotta plates.
c004-p085: >-
  The new guardian is a middle-aged janitor who activates power by wringing out a mop. Dirty water turns clear in midair and weaves itself into flowing turquoise mail.
c004-p086: >-
  A cautious botanist tests the transformation on one hand first. Bark gauntlet, glowing sap, tiny leaves; the rest of her body waits in practical field clothes.
c004-p087: >-
  A child’s crayon self-portrait climbs off the refrigerator and wraps around its creator. Wax-red boots, uneven star dress, purple hair outside the lines, unstoppable pride.
c004-p088: >-
  The costume emerges from reflected sunset on office windows. Orange rectangles slide over an architect’s body, stacking into a crystalline city-shaped gown.
c004-p089: >-
  A spider seamstress transforms a nervous giant one thread at a time. Silver webbing reinforces soft blue cloth while he crouches carefully to avoid breaking the rooftop.
c004-p090: >-
  A snowplow driver raises the ignition key. White road spray curves into winglike shields, reflective jacket becomes polar armor, and the vehicle lights form a crown behind her.
c004-p091: >-
  Show only the changing braid of an unseen heroine: plain brown hair receives beads of light, becomes a star map, then swings upward as a glowing whip.
c004-p092: >-
  Transformation caused by kindness—a stranger returns the lost glove, and warmth races from the heroine’s hand into amber armor shaped like layered mittens.
c004-p093: >-
  A sea-witch grandmother cracks her knuckles before activating. Foam coils around practical black swimwear, building shell pauldrons and a long cape of dark green kelp.
c004-p094: >-
