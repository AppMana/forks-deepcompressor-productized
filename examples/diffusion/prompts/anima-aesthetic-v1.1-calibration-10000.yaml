c003-p036: >-
  Loose gouache sketch of a street vendor hurrying through summer rain. Chartreuse apron over flowered pajamas, sandals, clear poncho ballooning backward, basket of bread protected beneath the chin.
c003-p037: >-
  A stone golem tries on a delicate lace collar. Its monumental gray body remains undecorated elsewhere; full frontal stance, tiny tailor on a ladder implied only by one entering hand.
c003-p038: >-
  Cold-weather school fashion in a rural station: wool shorts over thermal leggings, giant rust scarf, duffel coat covered in club pins, snow boots. The student stamps warmth into both feet.
c003-p039: >-
  An elegant witch’s suit uses no black: saffron blazer, sea-green waistcoat, plum bell trousers, ivory pointed hat. She strides through pale fog carrying a folded broom like an umbrella.
c003-p040: >-
  Full-length study of a wheelchair racer’s formal attire. Tailored copper jacket follows the seated posture; long split overskirt clears carbon wheels, embroidered gloves rest lightly on the rims.
c003-p041: >-
  A penguin bellhop wears a perfectly fitted burgundy uniform with brass buttons and a cap balanced above one eye. Small suitcase in each flipper, brisk walk across a tiled lobby.
c003-p042: >-
  Autumn layers built entirely from repurposed sailcloth wrap a solitary harbor child. Blue-white panels, rope toggles, striped leggings, yellow cap; wind reveals old numbers stamped inside the coat.
c003-p043: >-
  Against a rough violet wall, an elderly bodybuilder models a sleeveless peach evening dress and heavy work boots. Her relaxed arms, silver hair, and delighted posture defeat the severity of the setting.
c003-p044: >-
  A masked courier pauses on a rooftop wearing modular urban armor over a soft pleated skirt. Hard graphite plates stop at one knee; the other leg carries patterned tights and a bright prosthetic foot.
c003-p045: >-
