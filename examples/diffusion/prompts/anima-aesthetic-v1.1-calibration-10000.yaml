c004-p096: >-
  1girl, transformation, short silver curls, dark skin, strong build; concentric paper rings folding into vermilion armor, loose blue pencil underdrawing left visible, surprised smile.
c004-p097: >-
  A young archivist blows dust from an old badge. The cloud turns into sepia silhouettes of former guardians, whose overlapping capes settle into her new uniform.
c004-p098: >-
  A magical-girl duo has one body: conjoined sisters transform in opposite directions, dawn gold on the left and midnight blue on the right, joined by a shared silver sash.
c004-p099: >-
  After the incantation, nothing happens—until the heroine notices her reflection wearing magnificent armor and gesturing urgently for her to step through the mirror.
c004-p100: >-
  End quietly: a hospital volunteer closes her eyes, clips on a plain star brooch, and opens them wearing soft white protective robes. No explosion, only bedside lamps brightening one by one.

c005-p001: >-
