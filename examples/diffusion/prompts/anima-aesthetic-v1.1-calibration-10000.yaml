c003-p057: >-
  A frog courier’s rainy-season uniform includes leaf-shaped cape, high yellow gaiters, waterproof satchel, and acorn helmet. Capture a long midair leap rather than a static pose.
c003-p058: >-
  Market-day clothing for twins shown as one back-to-back silhouette: mirrored indigo tunics, opposite striped sleeves, shared circular basket, red shoes pointing toward different streets.
c003-p059: >-
  A beekeeper attends a wedding without abandoning protective gear. Cream mesh veil flows into a layered gown, amber gloves hold wildflowers, sturdy boots remain visible beneath the embroidered hem.
c003-p060: >-
  Draw a slim robot in secondhand human clothes: oversized university sweatshirt, plaid kilt, one roller skate, one hiking boot. Loose cables imitate a scarf as it practices a runway turn.
c003-p061: >-
  A desert nomad’s evening layers are designed around sudden cold—deep violet blanket coat, copper clasps, quilted hood, soft tall boots. She squats by unseen warmth, fabric forming a compact pyramid.
c003-p062: >-
  Bright flat-color ensemble for an urban dog walker: lime shorts suit, orange rain hat, six color-coded leashes around the waist, striped socks. Dogs remain beyond every edge, pulling the pose into a star.
