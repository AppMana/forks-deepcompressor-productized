c003-p050: >-
  Split the page vertically: the same dancer in rehearsal sweats and in finished stage costume. One slouched body aligns with its jeweled, extended counterpart at the spine.
c003-p051: >-
  Forest ranger uniform designed for a centaur: cropped weatherproof jacket, chest map case, saddlebags integrated into a quilted blanket, reflective fetlock wraps. Three-quarter rear view on a narrow trail.
c003-p052: >-
  A stylish grandmother waits for the bus in a tomato-red cocoon coat, lilac tights, transparent cane, and towering gray beehive hair. Passing headlights stripe the complete silhouette.
c003-p053: >-
  Catwalk absurdity: a stoic man carries an architectural hat shaped like six stacked balconies, each occupied by tiny potted plants. His clothing below is a perfectly plain beige column.
c003-p054: >-
  Full figure of a young fisher in a hand-painted waterproof set—loose turquoise trousers, coral jacket, white boots, bucket hat dotted with sardines—hauling an empty net at blue dawn.
c003-p055: >-
  An armored librarian wears articulated brass shelves around the hips, book-spine breastplate, soft leather gloves, and quiet brown robes. She reaches overhead without disturbing the portable collection.
