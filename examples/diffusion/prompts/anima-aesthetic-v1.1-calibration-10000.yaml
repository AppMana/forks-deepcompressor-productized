c005-p016: >-
  A crane-folded paper warrior unfolds its own arm into a blade. Inked armor creases, calligraphy forms the eyes, and a child’s desktop becomes a vast pale arena.
c005-p017: >-
  In a snowbound inn, three swords lean by the stove while their owners sleep offscreen. Meltwater gathers beneath distinct scabbards; firelight suggests the travelers through wear alone.
c005-p018: >-
  Close-range anime action: a stocky guard catches an incoming spear between twin short swords, teeth clenched, copper curls flying, market awnings collapsing into bright diagonal shapes behind her.
c005-p019: >-
  The prince’s fencing tutor is ninety years old and half his height. She uses a plain cane sword, impeccable posture, and one raised eyebrow to stop his jeweled lunge.
c005-p020: >-
  A salamander knight warms its blade in a volcanic crack before patrol. Orange body, obsidian plates, black sword turning red at the edge; side profile against gray ash.
c005-p021: >-
  Quiet character sheet for a traveling sword polisher: kneeling work pose, stone selection, water bucket, wrapped blades, scarred fingertips, magnifying lens, and a patient lined face.
c005-p022: >-
  Her sword is made from frozen river water. A fisher stands ankle-deep at blue dusk, watching small silver minnows continue swimming inside the transparent blade.
c005-p023: >-
  A masked palace guard sneezes during perfect formation. The long spear-sword wobbles, black plume collapses over the visor, and only her row breaks discipline.
c005-p024: >-
  Ink wash: wandering swordsman and enormous empty landscape. He occupies one lower corner, straw cape bent by rain, blade reduced to a single dry horizontal stroke.
c005-p025: >-
  A young woman teaches a scarecrow to fence. Its branch arm holds the practice blade surprisingly well; she leans back as the straw pupil scores its first touch.
c005-p026: >-
  Depict surrender without humiliation. A broad troll commander lays a massive cleaver on spring grass, opens both stone hands, and meets the unseen victor’s eyes calmly.
c005-p027: >-
  The swordsmith tests balance by resting one finished blade across two fingertips. Her infant sleeps against her back; forge sparks remain soft and distant.
c005-p028: >-
  Fashionable city swordsman waiting for the tram: coral suit, narrow boots, antique saber in a floral grocery bag, earbuds, bored expression. Everyone else is blurred morning motion.
c005-p029: >-
  A rabbit ronin washes one long ear in a roadside basin before washing the sword. Travel hat, patched vest, tiny spectacles; meticulous dignity beneath summer cicadas.
c005-p030: >-
  Two-handed grip adapted for six fingers on each hand. Show a quiet alien guard rehearsing the unfamiliar human weapon under instructional holograms in an empty cargo bay.
c005-p031: >-
  During a sandstorm, only the red scarf and curved sword remain readable. The rider has dismounted; her camel shelters both as their silhouettes lean into one another.
c005-p032: >-
  A ceremonial blade shaped like a crescent moon is passed from grandmother to granddaughter across a kitchen table. Aprons and sliced pears replace courtly surroundings.
c005-p033: >-
  The ghost swordswoman cannot lift physical steel, so frost traces her grip and creates a pale blade around the rusted weapon left at her shrine.
c005-p034: >-
  Full-body poster of a muscular merman fencing upright in a wheeled water tank. Pearl rapier, seaweed sash, competitive grin; attendants remain outside the graphic turquoise frame.
c005-p035: >-
  A novice has polished the sword until it reflects an entire mountain range. He stares into the impossible depth, rag and oil bottle still held awkwardly.
c005-p036: >-
  Courtroom fantasy: the prosecutor’s blade is a long transparent ruler laid across evidence maps. Severe navy robes, white gloves, silver hair, controlled overhead composition.
c005-p037: >-
  A cat knight drags a sword through fresh snow, carving a meandering line that accidentally reveals a buried stone circle. Its irritation turns to wary curiosity.
c005-p038: >-
  The retired hero uses her greatsword as a garden trellis. Scarlet beans climb the edge while she prunes leaves in work clothes and old armor boots.
c005-p039: >-
  Eight rapid panels follow a bamboo practice sword leaving its rack, rotating through a crowded dojo, and landing safely in a startled child’s hands without showing who threw it.
c005-p040: >-
  A moonlit albino deer carries a sheathed sword tied gently between its antlers. No rider appears; blue bells and old ribbons imply a message traveling alone.
c005-p041: >-
  An anxious bodyguard checks the ceremonial saber beneath a restaurant table during a birthday dinner. Armor hidden under a yellow sweater, paper hat slightly crooked.
c005-p042: >-
  A swordsman made of smoke attempts to grasp a mirrored blade. Fingers pass through the hilt, but his reflection holds it firmly and adopts a challenging stance.
c005-p043: >-
  Winter practice for conjoined twins: four hands share one broad sword, red and blue coats move differently, breath clouds overlap as they learn a common rhythm.
c005-p044: >-
  A village barber trims bangs with a legendary sword because every smaller blade has gone missing. The customer sits perfectly still; one enormous lock floats down.
c005-p045: >-
